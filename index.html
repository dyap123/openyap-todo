<style>
:root {
  --bg:#111122;--card:rgba(20,20,40,0.7);
  --panel-1:rgba(20,20,40,0.8);--panel-2:rgba(15,12,30,0.85);
  --accent1:#8B5CF6;--accent2:#3B82F6;--accent3:#ec4899;
  --accent1-10:rgba(139,92,246,0.10);--accent1-06:rgba(139,92,246,0.06);
  --card-border:rgba(139,92,246,0.08);--card-hover:rgba(139,92,246,0.18);
  --red:#ef4444;--yellow:#eab308;--gray:#64748b;--text:#e8e6f0;--text-body:#b0adc0;--text-muted:#666;
  --border:rgba(255,255,255,0.07);--radius:16px;--ease:cubic-bezier(0.16,1,0.3,1);
  --blue:var(--accent2);--pink:var(--accent3);--purple:var(--accent1);
  --glow1:rgba(139,92,246,0.09);--glow2:rgba(59,130,246,0.08);--glow3:rgba(236,72,153,0.06);
  --body-bg:linear-gradient(160deg,#111122 0%,#161428 40%,#1a1230 70%,#141020 100%);
  --hdr-bg:rgba(17,17,34,0.88);--sidebar-bg:rgba(17,17,34,0.95);
  --cat-work-bg:rgba(59,130,246,0.1);--cat-work-fg:rgba(59,130,246,0.7);
  --cat-pers-bg:rgba(139,92,246,0.1);--cat-pers-fg:rgba(139,92,246,0.7);
  --cat-proj-bg:rgba(236,72,153,0.1);--cat-proj-fg:rgba(236,72,153,0.7);
}
/* ── Themes ── */
body.t-ocean{--card:rgba(10,22,36,0.7);--panel-1:rgba(12,25,40,0.8);--panel-2:rgba(8,18,30,0.88);--accent1:#0ea5e9;--accent2:#f97316;--accent3:#06b6d4;--accent1-10:rgba(14,165,233,0.1);--accent1-06:rgba(14,165,233,0.06);--card-border:rgba(14,165,233,0.06);--card-hover:rgba(14,165,233,0.12);--text:#e0eef4;--text-body:#a8bcc8;--text-muted:#5a7080;--glow1:rgba(14,165,233,0.09);--glow2:rgba(249,115,22,0.07);--glow3:rgba(6,182,212,0.06);--body-bg:linear-gradient(160deg,#0c1520 0%,#101e2a 40%,#0a1a28 70%,#0e1420 100%);--hdr-bg:rgba(12,21,32,0.88);--sidebar-bg:rgba(12,21,32,0.95);--cat-work-bg:rgba(249,115,22,0.1);--cat-work-fg:rgba(249,115,22,0.6);--cat-pers-bg:rgba(14,165,233,0.1);--cat-pers-fg:rgba(14,165,233,0.6);--cat-proj-bg:rgba(6,182,212,0.1);--cat-proj-fg:rgba(6,182,212,0.6)}
body.t-forest{--card:rgba(24,34,28,0.55);--panel-1:rgba(30,42,34,0.65);--panel-2:rgba(24,34,28,0.72);--accent1:#8fc8a3;--accent2:#a8b8b2;--accent3:#b5d7bf;--accent1-10:rgba(143,200,163,0.08);--accent1-06:rgba(143,200,163,0.04);--card-border:rgba(143,200,163,0.08);--card-hover:rgba(143,200,163,0.14);--text:#e8f0ea;--text-body:#b4c4b8;--text-muted:#6a7a6c;--glow1:rgba(143,200,163,0.05);--glow2:rgba(168,184,178,0.04);--glow3:rgba(181,215,191,0.04);--body-bg:linear-gradient(160deg,#1a2420 0%,#202c25 40%,#1d2822 70%,#1b2420 100%);--hdr-bg:rgba(26,36,32,0.85);--sidebar-bg:rgba(26,36,32,0.92);--cat-work-bg:rgba(168,184,178,0.12);--cat-work-fg:rgba(168,184,178,0.75);--cat-pers-bg:rgba(143,200,163,0.12);--cat-pers-fg:rgba(143,200,163,0.8);--cat-proj-bg:rgba(181,215,191,0.12);--cat-proj-fg:rgba(181,215,191,0.8)}
body.t-sunset{--card:rgba(30,18,14,0.7);--panel-1:rgba(32,20,16,0.82);--panel-2:rgba(24,14,12,0.88);--accent1:#f97316;--accent2:#ec4899;--accent3:#fbbf24;--accent1-10:rgba(249,115,22,0.1);--accent1-06:rgba(249,115,22,0.06);--card-border:rgba(249,115,22,0.06);--card-hover:rgba(249,115,22,0.12);--text:#f0e8e0;--text-body:#c0b0a8;--text-muted:#7a6860;--glow1:rgba(249,115,22,0.09);--glow2:rgba(236,72,153,0.07);--glow3:rgba(251,191,36,0.06);--body-bg:linear-gradient(160deg,#1a1210 0%,#201614 40%,#1c1012 70%,#181010 100%);--hdr-bg:rgba(26,18,16,0.88);--sidebar-bg:rgba(26,18,16,0.95);--cat-work-bg:rgba(236,72,153,0.1);--cat-work-fg:rgba(236,72,153,0.6);--cat-pers-bg:rgba(249,115,22,0.1);--cat-pers-fg:rgba(249,115,22,0.6);--cat-proj-bg:rgba(251,191,36,0.1);--cat-proj-fg:rgba(251,191,36,0.6)}
body.t-mono{--card:rgba(18,18,22,0.7);--panel-1:rgba(20,20,24,0.82);--panel-2:rgba(14,14,18,0.88);--accent1:#a8a8b8;--accent2:#d4d4e0;--accent3:#78788a;--accent1-10:rgba(168,168,184,0.08);--accent1-06:rgba(168,168,184,0.04);--card-border:rgba(168,168,184,0.04);--card-hover:rgba(168,168,184,0.08);--text:#d8d8e0;--text-body:#a0a0b0;--text-muted:#555;--glow1:rgba(168,168,184,0.06);--glow2:rgba(212,212,224,0.05);--glow3:rgba(120,120,138,0.04);--body-bg:linear-gradient(160deg,#111114 0%,#161618 40%,#131316 70%,#101012 100%);--hdr-bg:rgba(17,17,20,0.88);--sidebar-bg:rgba(17,17,20,0.95);--cat-work-bg:rgba(212,212,224,0.08);--cat-work-fg:rgba(212,212,224,0.5);--cat-pers-bg:rgba(168,168,184,0.08);--cat-pers-fg:rgba(168,168,184,0.5);--cat-proj-bg:rgba(120,120,138,0.08);--cat-proj-fg:rgba(120,120,138,0.5)}
body.t-sakura{--card:rgba(28,14,24,0.7);--panel-1:rgba(32,16,26,0.82);--panel-2:rgba(22,12,20,0.88);--accent1:#f472b6;--accent2:#c084fc;--accent3:#fda4af;--accent1-10:rgba(244,114,182,0.1);--accent1-06:rgba(244,114,182,0.06);--card-border:rgba(244,114,182,0.06);--card-hover:rgba(244,114,182,0.12);--text:#f0e0ea;--text-body:#c0a8b8;--text-muted:#7a5a6a;--glow1:rgba(244,114,182,0.08);--glow2:rgba(192,132,252,0.07);--glow3:rgba(253,164,175,0.05);--body-bg:linear-gradient(160deg,#1a1018 0%,#1e1420 40%,#18101c 70%,#141018 100%);--hdr-bg:rgba(26,16,24,0.88);--sidebar-bg:rgba(26,16,24,0.95);--cat-work-bg:rgba(192,132,252,0.1);--cat-work-fg:rgba(192,132,252,0.6);--cat-pers-bg:rgba(244,114,182,0.1);--cat-pers-fg:rgba(244,114,182,0.6);--cat-proj-bg:rgba(253,164,175,0.1);--cat-proj-fg:rgba(253,164,175,0.6)}
/* Light theme — inverted with dark text on warm white */
body.t-light{
  --is-light:1;
  --bg:#f6f5fb;--card:rgba(255,255,255,0.78);
  --panel-1:rgba(255,255,255,0.95);--panel-2:rgba(248,247,253,0.92);
  --accent1:#7c3aed;--accent2:#2563eb;--accent3:#db2777;
  --accent1-10:rgba(124,58,237,0.10);--accent1-06:rgba(124,58,237,0.05);
  --card-border:rgba(124,58,237,0.12);--card-hover:rgba(124,58,237,0.22);
  --text:#1a1a2e;--text-body:#525266;--text-muted:#8a8aa0;
  --border:rgba(0,0,0,0.06);
  --glow1:rgba(124,58,237,0.06);--glow2:rgba(37,99,235,0.05);--glow3:rgba(219,39,119,0.04);
  --body-bg:linear-gradient(160deg,#f6f5fb 0%,#efebf7 35%,#f0e9f4 70%,#f2eef8 100%);
  --hdr-bg:rgba(246,245,251,0.88);--sidebar-bg:rgba(246,245,251,0.95);
  --cat-work-bg:rgba(37,99,235,0.10);--cat-work-fg:rgba(37,99,235,0.85);
  --cat-pers-bg:rgba(124,58,237,0.10);--cat-pers-fg:rgba(124,58,237,0.85);
  --cat-proj-bg:rgba(219,39,119,0.10);--cat-proj-fg:rgba(219,39,119,0.85);
}
/* Light-mode overrides for elements using rgba(255,255,255,...) directly */
body.t-light .ck{border-color:rgba(0,0,0,0.22)}
body.t-light .fp,body.t-light .sort-btn{border-color:rgba(0,0,0,0.08);color:rgba(0,0,0,0.55)}
body.t-light .tab-btn{color:rgba(0,0,0,0.55)}
body.t-light .ob{border-color:rgba(0,0,0,0.08);color:rgba(0,0,0,0.45)}
body.t-light .ob:hover{color:rgba(0,0,0,0.7)}
body.t-light .tex textarea,body.t-light .tex-row select,body.t-light .tex-row input,body.t-light .tex-title{background:rgba(0,0,0,0.03);border-color:rgba(0,0,0,0.08);color:var(--text)}
body.t-light .input-card input[type="text"],body.t-light .notes-row textarea,body.t-light .input-card input[type="text"]::placeholder{color:var(--text)}
body.t-light .input-card input[type="text"]::placeholder,body.t-light .notes-row textarea::placeholder{color:rgba(0,0,0,0.35)}
body.t-light .t-rank{color:rgba(0,0,0,0.18)}
body.t-light .pd.medium{background:var(--accent1)}
body.t-light .pd.low{background:var(--gray)}
body.t-light .stats{color:rgba(124,58,237,0.4)}
body.t-light .empty-bubble{color:var(--text)}
body.t-light .empty-bubble::before{background:rgba(255,255,255,0.78)}
body.t-light .ai-row input{color:var(--text)}
body.t-light .am.user{color:var(--text)}
body.t-light #alfredSidebar{background:rgba(246,245,251,0.95)}
body.t-light #celebText{filter:drop-shadow(0 4px 24px rgba(124,58,237,0.3))}
body.t-light .celeb-sub{color:rgba(0,0,0,0.55)}
body.t-light .mascot{filter:grayscale(0.4) brightness(0.85);opacity:0.18}
body.t-light .mascot:hover{filter:grayscale(0) brightness(1);opacity:0.7}
body.t-light .mascot-mini{filter:grayscale(0.7) brightness(0.7);opacity:0.06}
body.t-light .stat-emoji{filter:grayscale(0.5) brightness(0.85)}
body.t-light .bg-mesh::before{opacity:0.6}
/* Light Sisyphus canvas */
body.t-light #sisCanvas{background:linear-gradient(180deg,#e8e4f5 0%,#d8d0ee 60%,#cec3e8 100%) !important;border-color:rgba(124,58,237,0.18) !important;box-shadow:0 4px 20px rgba(124,58,237,0.2),0 0 32px rgba(124,58,237,0.15),0 0 72px rgba(124,58,237,0.08),inset 0 1px 0 rgba(255,255,255,0.6) !important;animation:sisGlowLight 4.5s ease-in-out infinite !important}
@keyframes sisGlowLight{0%,100%{box-shadow:0 4px 20px rgba(124,58,237,0.15),0 0 32px rgba(124,58,237,0.12),0 0 72px rgba(124,58,237,0.06),inset 0 1px 0 rgba(255,255,255,0.6)}50%{box-shadow:0 4px 24px rgba(124,58,237,0.22),0 0 48px rgba(124,58,237,0.22),0 0 110px rgba(124,58,237,0.15),0 0 160px rgba(124,58,237,0.08),inset 0 1px 0 rgba(255,255,255,0.6)}}
/* Sisyphus wrapper + canvas — nearly transparent, body-bg shows through */
.sis-wrap{position:relative;margin-bottom:12px}
#sisCanvas{background:linear-gradient(180deg,rgba(0,0,0,0.12),rgba(0,0,0,0.22)) !important;border-color:var(--card-border) !important;box-shadow:0 4px 18px rgba(0,0,0,0.22),0 0 30px var(--accent1-10),0 0 72px var(--accent1-06),inset 0 1px 0 rgba(255,255,255,0.04) !important;animation:sisGlow 4.5s ease-in-out infinite;backdrop-filter:blur(2px)}
@keyframes sisGlow{0%,100%{box-shadow:0 4px 18px rgba(0,0,0,0.22),0 0 30px var(--accent1-10),0 0 72px var(--accent1-06),inset 0 1px 0 rgba(255,255,255,0.04)}50%{box-shadow:0 4px 22px rgba(0,0,0,0.22),0 0 50px var(--accent1-10),0 0 120px var(--accent1-10),0 0 180px var(--accent1-06),inset 0 1px 0 rgba(255,255,255,0.06)}}
.sis-wrap:hover #sisCanvas{animation-duration:2.2s}

/* Mascot — blended, subtle, alive */
.mascot{position:fixed;bottom:20px;left:20px;font-size:32px;z-index:10;opacity:0.12;transition:all .4s var(--ease);cursor:pointer;filter:grayscale(0.5) brightness(0.7);animation:mascotFloat 5s ease-in-out infinite}
.mascot:hover{opacity:0.7;filter:grayscale(0) brightness(1);animation:mascotWiggle .5s var(--ease)}
@keyframes mascotFloat{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-8px) rotate(2deg)}}
@keyframes mascotWiggle{0%{transform:rotate(0) scale(1)}15%{transform:rotate(-12deg) scale(1.2)}30%{transform:rotate(10deg) scale(1.3)}45%{transform:rotate(-8deg) scale(1.25)}60%{transform:rotate(5deg) scale(1.2)}75%{transform:rotate(-3deg) scale(1.15)}100%{transform:rotate(0) scale(1.15)}}
.mascot-mini{position:fixed;font-size:18px;z-index:5;opacity:0.05;pointer-events:auto;cursor:pointer;filter:grayscale(0.7) brightness(0.5);animation:miniDrift 8s ease-in-out infinite;transition:all .3s var(--ease)}
.mascot-mini:hover{opacity:0.6;filter:grayscale(0) brightness(1);animation:miniPop .4s var(--ease)}
@keyframes miniDrift{0%,100%{transform:translate(0,0) rotate(0)}25%{transform:translate(5px,-6px) rotate(4deg)}50%{transform:translate(-3px,-2px) rotate(-2deg)}75%{transform:translate(-5px,4px) rotate(3deg)}}
@keyframes miniPop{0%{transform:scale(1) rotate(0)}30%{transform:scale(1.6) rotate(-15deg)}60%{transform:scale(1.4) rotate(10deg)}100%{transform:scale(1.3) rotate(0)}}

/* Theme picker */
.theme-picker{position:relative;display:inline-block}
.theme-dots{display:none;position:absolute;top:100%;right:0;margin-top:6px;background:var(--card);backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:12px;padding:8px;gap:6px;display:none;flex-wrap:wrap;width:160px;z-index:200;box-shadow:0 8px 24px rgba(0,0,0,0.3)}
.theme-dots.show{display:flex}
.theme-dot{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .2s;display:flex;align-items:center;justify-content:center;font-size:12px}
.theme-dot:hover{transform:scale(1.15)}
.theme-dot.active{border-color:var(--accent1);box-shadow:0 0 8px rgba(255,255,255,0.1)}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--body-bg);color:var(--text-body);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh;transition:margin-right .3s var(--ease);overflow-x:hidden}
::selection{background:var(--card-hover)}
input,select,textarea,button{font-family:inherit}

/* Animated gradient mesh background */
.bg-mesh{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.bg-mesh::before{content:'';position:absolute;width:140%;height:140%;top:-20%;left:-20%;background:radial-gradient(ellipse 600px 500px at 25% 35%,var(--glow2) 0%,transparent 70%),radial-gradient(ellipse 500px 600px at 75% 60%,var(--glow1) 0%,transparent 70%),radial-gradient(ellipse 500px 400px at 50% 80%,var(--glow3) 0%,transparent 70%);will-change:transform;transform:translateZ(0);animation:meshDrift 60s linear infinite alternate}
@keyframes meshDrift{0%{transform:translate3d(0,0,0)}100%{transform:translate3d(-10px,6px,0)}}
.bg-mesh::after{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,0.025) 1px,transparent 1px);background-size:32px 32px}

/* Gradient line accents */
.glow-line{position:fixed;height:1px;z-index:0;pointer-events:none;opacity:0.15}
.glow-line.top{top:48px;left:0;right:0;background:linear-gradient(90deg,transparent,var(--accent1),var(--accent3),var(--accent2),transparent)}
.glow-line.mid{top:50%;left:10%;right:10%;background:linear-gradient(90deg,transparent,var(--glow1),transparent);animation:glowPulse 4s ease-in-out infinite}
@keyframes glowPulse{0%,100%{opacity:0.08}50%{opacity:0.2}}

/* Header */
.header{position:sticky;top:0;z-index:50;background:var(--hdr-bg);backdrop-filter:blur(24px) saturate(180%);-webkit-backdrop-filter:blur(24px) saturate(180%);border-bottom:1px solid var(--card-border)}
.header-inner{max-width:680px;margin:0 auto;padding:0 20px;height:48px;display:flex;align-items:center;justify-content:space-between}
.app-title{font-weight:300;font-size:11px;letter-spacing:.3em;color:var(--accent1);opacity:0.6;text-transform:uppercase}
.header-right{display:flex;gap:8px;align-items:center}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--accent1);box-shadow:0 0 8px var(--accent1-10);animation:syncPulse 2s ease-in-out infinite}
@keyframes syncPulse{0%,100%{opacity:1}50%{opacity:0.4}}
.sync-label{font-size:9px;color:var(--accent1);opacity:0.3;letter-spacing:1px;font-weight:600}

/* Main */
.main{max-width:680px;margin:0 auto;padding:20px 20px 100px;position:relative;z-index:1}

/* Input Card */
.input-card{background:var(--card);backdrop-filter:blur(16px);border:1px solid var(--card-border);border-radius:var(--radius);padding:16px;margin-bottom:20px;transition:border-color .3s}
.input-card:focus-within{border-color:var(--card-hover);box-shadow:0 0 30px rgba(139,92,246,0.04)}
.input-card input[type="text"]{width:100%;background:transparent;border:none;font-size:15px;color:var(--text);outline:none;margin-bottom:12px}
.input-card input[type="text"]::placeholder{color:rgba(168,164,184,0.4)}
.input-opts{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.opt-grp{display:flex;gap:3px}
.ob{padding:5px 12px;border-radius:14px;font-size:10px;font-weight:600;border:1px solid rgba(255,255,255,0.06);background:transparent;color:rgba(255,255,255,0.25);cursor:pointer;transition:all .15s}
.ob:hover{color:rgba(255,255,255,0.45)}
.ob.s{color:#fff}
.ob.s[data-c="work"]{background:rgba(59,130,246,0.15);border-color:rgba(59,130,246,0.25);color:var(--blue)}
.ob.s[data-c="personal"]{background:var(--card-hover);border-color:var(--card-hover);color:var(--purple)}
.ob.s[data-c="project"]{background:rgba(236,72,153,0.12);border-color:rgba(236,72,153,0.2);color:var(--pink)}
.ob.s[data-p="high"]{background:rgba(239,68,68,0.1);border-color:rgba(239,68,68,0.2);color:var(--red)}
.ob.s[data-p="medium"]{background:var(--accent1-10);border-color:var(--card-hover);color:var(--purple)}
.ob.s[data-p="low"]{background:rgba(100,116,139,0.12);border-color:rgba(100,116,139,0.2);color:var(--gray)}
.add-btn{padding:6px 20px;border-radius:14px;margin-left:auto;background:linear-gradient(135deg,var(--card-hover),rgba(59,130,246,0.15));color:var(--purple);border:1px solid var(--card-hover);font-weight:700;font-size:12px;cursor:pointer;transition:all .2s var(--ease)}
.add-btn:hover{background:linear-gradient(135deg,rgba(139,92,246,0.3),rgba(59,130,246,0.25));transform:translateY(-1px);box-shadow:0 4px 16px var(--card-hover)}

/* Date button */
.date-btn{padding:5px 12px;border-radius:12px;font-size:10px;font-weight:600;border:1px solid rgba(255,255,255,0.06);background:transparent;color:rgba(255,255,255,0.25);cursor:pointer;transition:all .15s;position:relative;display:inline-flex;align-items:center;gap:4px}
.date-btn::before{content:'📅';font-size:11px;filter:grayscale(0.4);opacity:.7}
.date-btn:hover{color:rgba(255,255,255,0.6);border-color:var(--card-hover);background:var(--accent1-06)}
.date-btn.has-date{background:var(--accent1-10);border-color:var(--card-hover);color:var(--accent1)}
.date-btn.has-date::before{filter:none;opacity:1}
.date-btn input[type="date"]{display:none}
/* ── Custom date picker popover ── */
.dp-pop{position:fixed;z-index:9999;width:280px;background:linear-gradient(160deg,var(--panel-1),var(--panel-2));backdrop-filter:blur(24px);border:1.5px solid transparent;background-clip:padding-box;border-radius:18px;padding:14px;box-shadow:0 16px 48px rgba(0,0,0,0.5),0 0 48px var(--accent1-10),0 0 96px var(--accent1-06);animation:dpIn .3s var(--ease)}
.dp-pop::before{content:'';position:absolute;inset:-1.5px;border-radius:18px;padding:1.5px;background:linear-gradient(135deg,var(--accent1),var(--accent3),var(--accent2));-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;opacity:.55}
@keyframes dpIn{from{opacity:0;transform:translateY(-8px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
.dp-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;position:relative}
.dp-title{font-size:14px;font-weight:800;letter-spacing:-.3px;background:linear-gradient(135deg,var(--accent1),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.dp-nav{width:26px;height:26px;border-radius:8px;border:1px solid var(--card-border);background:var(--accent1-06);color:var(--accent1);font-size:14px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.dp-nav:hover{background:var(--accent1-10);border-color:var(--accent1);transform:scale(1.08)}
.dp-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:8px;position:relative}
.dp-dow{font-size:8px;font-weight:700;text-transform:uppercase;color:var(--text-muted);text-align:center;padding:4px 0;letter-spacing:.5px}
.dp-day{font-size:11px;font-weight:600;color:var(--text-body);aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:8px;cursor:pointer;transition:all .15s var(--ease);border:1px solid transparent;position:relative}
.dp-day:hover{background:var(--accent1-10);color:var(--accent1);border-color:var(--card-hover);transform:scale(1.06)}
.dp-day.blank{cursor:default;pointer-events:none}
.dp-day.today{color:var(--accent1);font-weight:800;background:var(--accent1-06)}
.dp-day.today::after{content:'';position:absolute;bottom:2px;width:4px;height:4px;border-radius:50%;background:var(--accent1);box-shadow:0 0 6px var(--accent1)}
.dp-day.selected{background:linear-gradient(135deg,var(--accent1),var(--accent2));color:#fff;border-color:var(--accent1);box-shadow:0 2px 12px var(--accent1-10)}
.dp-day.selected::after{background:#fff;box-shadow:0 0 6px #fff}
.dp-day.past{opacity:.45}
.dp-day.has-tasks{background:var(--accent1-06);border-color:var(--card-border)}
.dp-day-count{position:absolute;top:1px;right:1px;font-size:7px;font-weight:800;color:var(--accent1);background:var(--accent1-10);border:1px solid var(--card-hover);border-radius:8px;min-width:12px;height:12px;padding:0 3px;display:flex;align-items:center;justify-content:center;line-height:1;pointer-events:none}
.dp-day-count.overdue{color:var(--red);background:rgba(239,68,68,0.12);border-color:rgba(239,68,68,0.3)}
.dp-quick{display:flex;gap:4px;padding-top:10px;border-top:1px solid var(--card-border);position:relative}
.dp-quick button{flex:1;padding:6px 4px;border-radius:8px;border:1px solid var(--card-border);background:rgba(255,255,255,0.03);color:var(--text-muted);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;transition:all .2s;font-family:inherit}
.dp-quick button:hover{background:var(--accent1-10);color:var(--accent1);border-color:var(--card-hover)}
.dp-quick button.clear:hover{background:rgba(239,68,68,0.1);color:var(--red);border-color:rgba(239,68,68,0.3)}
/* Theme native inputs */
input[type="date"],select{color-scheme:dark}
input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(0.7)}
.fp.a{background:var(--accent1-10);color:var(--accent1);border-color:var(--card-hover)}
.sort-btn.a{background:var(--accent1-10);color:var(--accent1);border-color:var(--card-hover)}

/* Notes input */
.notes-row{margin-top:8px}
.notes-row textarea{width:100%;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.04);border-radius:10px;padding:8px 12px;color:var(--text-body);font-size:12px;resize:none;height:36px;outline:none;transition:all .2s}
.notes-row textarea:focus{height:70px;border-color:var(--card-hover)}
.notes-row textarea::placeholder{color:rgba(168,164,184,0.25)}
/* Difficulty buttons */
.ob.s[data-d="easy"]{background:rgba(74,222,128,0.12);border-color:rgba(74,222,128,0.3);color:#4ade80}
.ob.s[data-d="medium"]{background:rgba(251,191,36,0.12);border-color:rgba(251,191,36,0.3);color:#fbbf24}
.ob.s[data-d="hard"]{background:rgba(249,115,22,0.12);border-color:rgba(249,115,22,0.3);color:#f97316}
.ob.s[data-d="epic"]{background:rgba(236,72,153,0.15);border-color:rgba(236,72,153,0.35);color:var(--accent3)}
.ob.s[data-r="none"]{background:rgba(255,255,255,0.04);border-color:rgba(255,255,255,0.08);color:rgba(255,255,255,0.5)}
.ob.s[data-r="daily"],.ob.s[data-r="weekly"],.ob.s[data-r="monthly"]{background:var(--accent1-10);border-color:var(--card-hover);color:var(--accent1)}
.ob[data-r]:not(.s):hover{color:var(--accent1)}
.t-repeat{display:inline-flex;align-items:center;gap:3px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:2px 7px;border-radius:10px;background:var(--accent1-10);color:var(--accent1);border:1px solid var(--accent1-10)}
.t-repeat::before{content:'↻';font-size:10px}
/* Difficulty stars on task card */
.t-diff{display:inline-flex;gap:1px;font-size:9px;line-height:1;letter-spacing:0;color:rgba(255,255,255,0.2)}
.t-diff.easy{color:#4ade80}.t-diff.medium{color:#fbbf24}.t-diff.hard{color:#f97316}.t-diff.epic{color:var(--accent3)}
/* Progress slider on task card */
.t-prog{display:flex;align-items:center;gap:6px;margin-top:6px;padding:4px 0;touch-action:pan-y}
.t-prog-bar{flex:1;height:7px;border-radius:4px;background:rgba(255,255,255,0.06);overflow:hidden;cursor:ew-resize;position:relative;border:1px solid rgba(255,255,255,0.03);transition:height .2s var(--ease),border-color .2s}
.t-prog-bar:hover{height:9px;border-color:var(--card-hover)}
.t-prog-bar.dragging{height:9px;border-color:var(--accent1);box-shadow:0 0 12px var(--accent1-10)}
.t-prog-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--accent2),var(--accent1),var(--accent3));transition:width .25s var(--ease);position:relative;box-shadow:0 0 8px var(--accent1-10)}
.t-prog-bar.dragging .t-prog-fill{transition:none}
.t-prog-fill::after{content:'';position:absolute;right:0;top:-2px;bottom:-2px;width:3px;border-radius:2px;background:var(--accent1);box-shadow:0 0 8px var(--accent1);opacity:0;transition:opacity .2s}
.t-prog-bar:hover .t-prog-fill::after,.t-prog-bar.dragging .t-prog-fill::after{opacity:1}
.t-prog-val{font-size:9px;font-weight:700;color:var(--text-muted);min-width:28px;text-align:right;font-variant-numeric:tabular-nums}
.t-prog-bar:hover~.t-prog-val,.t-prog-bar.dragging~.t-prog-val{color:var(--accent1)}
.t-prog-input{width:100%;background:rgba(255,255,255,0.02);border:1px solid var(--card-border);border-radius:8px;padding:5px 8px;color:var(--text-body);font-size:11px;outline:none}
.t-prog-input:focus{border-color:var(--card-hover)}
/* Celebration overlay */
#celebOverlay{position:fixed;inset:0;z-index:9999;pointer-events:none;display:none}
#celebOverlay.show{display:block}
#celebCanvas{position:absolute;inset:0;width:100%;height:100%}
.celeb-text{position:absolute;top:35%;left:50%;transform:translateX(-50%);font-size:48px;font-weight:900;letter-spacing:-1.5px;background:linear-gradient(135deg,var(--accent1),var(--accent2),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;animation:celebTextIn 2.2s var(--ease) both;text-shadow:0 0 40px rgba(139,92,246,0.4);filter:drop-shadow(0 4px 24px rgba(0,0,0,0.6))}
.celeb-sub{display:block;font-size:14px;font-weight:600;color:rgba(255,255,255,0.5);letter-spacing:3px;text-transform:uppercase;margin-top:8px;-webkit-text-fill-color:rgba(255,255,255,0.5);background:none}
@keyframes celebTextIn{0%{opacity:0;transform:translateX(-50%) translateY(20px) scale(0.8)}15%{opacity:1;transform:translateX(-50%) translateY(0) scale(1.15)}30%{transform:translateX(-50%) translateY(0) scale(1)}80%{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}100%{opacity:0;transform:translateX(-50%) translateY(-20px) scale(1)}}

/* Search */
.search-wrap{position:relative;margin-bottom:10px;display:flex;align-items:center}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:12px;opacity:.5;pointer-events:none;filter:grayscale(.3)}
.search-input{flex:1;padding:9px 34px 9px 34px;border-radius:12px;border:1px solid var(--card-border);background:var(--card);backdrop-filter:blur(10px);color:var(--text);font-size:12px;font-family:inherit;outline:none;transition:border-color .25s var(--ease),box-shadow .25s var(--ease),background .25s var(--ease)}
.search-input::placeholder{color:var(--text-muted)}
.search-input:focus{border-color:var(--accent1);background:var(--accent1-06);box-shadow:0 0 24px var(--accent1-10),0 2px 12px rgba(0,0,0,0.15)}
.search-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:22px;height:22px;border-radius:50%;border:none;background:rgba(255,255,255,0.06);color:var(--text-muted);cursor:pointer;font-size:15px;line-height:1;display:flex;align-items:center;justify-content:center;transition:all .2s}
.search-clear:hover{background:var(--accent1-10);color:var(--accent1);transform:translateY(-50%) rotate(90deg)}
/* Highlight matched text */
.search-hl{background:var(--accent1-10);color:var(--accent1);font-weight:700;padding:0 1px;border-radius:2px;box-shadow:0 0 6px var(--accent1-10)}
/* Filters */
.filters{display:flex;gap:5px;margin-bottom:16px;flex-wrap:wrap}
.fp{padding:4px 12px;border-radius:14px;font-size:10px;font-weight:600;border:1px solid rgba(255,255,255,0.06);background:transparent;color:rgba(255,255,255,0.5);cursor:pointer;transition:all .15s}
.fp:hover{color:rgba(255,255,255,0.4)}

/* Task Cards */
.task-list{display:flex;flex-direction:column;gap:10px}
.tc{position:relative;background:var(--card);backdrop-filter:blur(12px);border:1px solid var(--accent1-06);border-radius:14px;padding:12px 14px;display:flex;align-items:flex-start;gap:10px;transition:transform .35s var(--ease),border-color .35s var(--ease),box-shadow .55s var(--ease),backdrop-filter .35s var(--ease);animation:ti .35s var(--ease) both}
/* External halo — sits BEHIND the card, same approach as the verdict card */
.tc::before{content:'';position:absolute;inset:-8px;border-radius:20px;background:radial-gradient(ellipse at center,var(--accent1) 0%,transparent 60%);opacity:0;filter:blur(22px);transition:opacity .55s var(--ease);pointer-events:none;z-index:-1}
.tc:hover::before{opacity:.35}
.tc:hover{border-color:var(--accent1);box-shadow:0 10px 32px rgba(0,0,0,0.4),0 0 36px var(--accent1-10),0 0 72px var(--accent1-06),0 0 110px var(--accent1-06),inset 0 1px 0 rgba(255,255,255,0.06);transform:translateY(-2px) scale(1.006);backdrop-filter:blur(18px)}
@keyframes shine{0%{transform:translateX(-100%) skewX(-15deg)}100%{transform:translateX(200%) skewX(-15deg)}}
.tc.celebrating{box-shadow:0 0 30px var(--accent1-10),0 0 60px var(--accent1-10),0 0 100px var(--accent1-10);overflow:hidden}
.tc.celebrating::after{content:'';position:absolute;top:0;bottom:0;left:0;width:60%;background:linear-gradient(105deg,transparent 30%,rgba(255,255,255,0.22) 50%,transparent 70%);pointer-events:none;animation:shine 0.9s var(--ease) both;z-index:5}
/* Empty state */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;text-align:center;animation:emptyIn .5s var(--ease)}
@keyframes emptyIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.empty-mascot{font-size:64px;line-height:1;animation:emptyBob 4s ease-in-out infinite;filter:grayscale(0.3) brightness(0.85);opacity:0.8}
@keyframes emptyBob{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-10px) rotate(3deg)}}
.empty-bubble{margin-top:18px;padding:10px 18px;border-radius:18px;font-size:12px;font-weight:600;letter-spacing:0.5px;color:var(--text-body);background:var(--card);backdrop-filter:blur(12px);border:1px solid var(--accent1-10);position:relative}
.empty-bubble::before{content:'';position:absolute;top:-6px;left:50%;transform:translateX(-50%) rotate(45deg);width:10px;height:10px;background:var(--card);border-left:1px solid var(--accent1-10);border-top:1px solid var(--accent1-10)}
.tc.done{opacity:.3}
.tc.done .tt{text-decoration:line-through;color:var(--text-muted)}
@keyframes ti{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.ck{width:22px;height:22px;border-radius:50%;flex-shrink:0;margin-top:2px;border:2px solid rgba(255,255,255,0.18);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s var(--ease);color:transparent;font-size:12px}
.ck:hover{border-color:var(--accent1);background:var(--accent1-10);box-shadow:0 0 10px var(--accent1-10)}
.tc.done .ck{border-color:var(--accent1);background:var(--accent1);color:#fff}
.tb{flex:1;min-width:0}
.tt{font-size:14px;font-weight:500;color:var(--text);line-height:1.4;cursor:pointer}
.t-notes{font-size:11px;color:rgba(168,164,184,0.5);margin-top:2px;white-space:pre-wrap}
.tm{display:flex;gap:5px;margin-top:4px;flex-wrap:wrap;align-items:center}
.pd{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.pd.high{background:var(--red);box-shadow:0 0 6px rgba(239,68,68,0.4)}
.pd.medium{background:var(--purple);box-shadow:0 0 4px rgba(139,92,246,0.3)}
.pd.low{background:var(--gray)}
.cat{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:2px 8px;border-radius:10px}
.cat.work{background:var(--cat-work-bg);color:var(--cat-work-fg)}
.cat.personal{background:var(--cat-pers-bg);color:var(--cat-pers-fg)}
.cat.project{background:var(--cat-proj-bg);color:var(--cat-proj-fg)}
.dl{font-size:10px;color:var(--text-muted)}
.dl.od{color:var(--red)}
.ta{display:flex;gap:4px;flex-shrink:0;opacity:0;transition:opacity .2s}
.tc:hover .ta{opacity:1}
.tab{width:26px;height:26px;border-radius:8px;border:none;background:rgba(255,255,255,0.03);color:rgba(255,255,255,0.25);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.tab:hover{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.5)}
.tab.del:hover{background:rgba(239,68,68,0.08);color:var(--red)}

/* Expand */
.tex{margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,0.04);display:flex;flex-direction:column;gap:6px}
.tex textarea{width:100%;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.04);border-radius:10px;padding:8px 10px;color:var(--text-body);font-size:12px;resize:vertical;min-height:50px;outline:none}
.tex textarea:focus{border-color:var(--card-hover)}
.tex-title{width:100%;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:8px 10px;color:var(--text);font-size:14px;font-weight:500;outline:none;font-family:inherit}
.tex-title:focus{border-color:var(--card-hover)}
.tex-row{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.tex-row select,.tex-row input[type="date"]{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:8px;padding:5px 8px;font-size:11px;color:var(--text-body);outline:none}

/* Dashboard Metrics */
.dash{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:20px}
.dash-card{position:relative;background:linear-gradient(135deg,var(--panel-1),var(--panel-2));backdrop-filter:blur(12px);border:1.5px solid transparent;background-clip:padding-box;border-radius:14px;padding:14px 12px;text-align:center;transition:transform .35s var(--ease),box-shadow .55s var(--ease)}
/* Gradient border ring */
.dash-card::before{content:'';position:absolute;inset:-1.5px;border-radius:14px;padding:1.5px;background:linear-gradient(135deg,var(--accent1),var(--accent3),var(--accent2));-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;opacity:0.35;transition:opacity .35s}
/* External halo glow — matches verdict-card style */
.dash-card::after{content:'';position:absolute;inset:-10px;border-radius:22px;background:radial-gradient(ellipse at center,var(--accent1) 0%,transparent 60%);opacity:0;filter:blur(24px);transition:opacity .55s var(--ease);pointer-events:none;z-index:-1}
.dash-card:hover::after{opacity:.35}
.dash-card:hover{transform:translateY(-3px);box-shadow:0 10px 32px rgba(0,0,0,0.35),0 0 40px var(--accent1-10),0 0 80px var(--accent1-06)}
.dash-card:hover::before{opacity:0.95}
.dash-val{font-size:26px;font-weight:900;line-height:1;letter-spacing:-1px;background:linear-gradient(135deg,var(--accent1),var(--accent3),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 2px 12px var(--accent1-10))}
.dash-val.green{background:linear-gradient(135deg,#34d399,var(--accent1),#34d399);-webkit-background-clip:text;background-clip:text}
.dash-label{font-size:8px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);margin-top:4px}
.dash-bar{height:3px;border-radius:2px;background:rgba(255,255,255,0.04);margin-top:8px;overflow:hidden}
.dash-bar-fill{height:100%;border-radius:2px;transition:width .6s var(--ease)}
/* Streak / Stats row */
.stat-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.stat-chip{position:relative;background:var(--card);backdrop-filter:blur(12px);border:1px solid var(--card-border);border-radius:12px;padding:10px 14px;display:flex;align-items:center;gap:8px;flex:1;min-width:140px;transition:transform .35s var(--ease),box-shadow .55s var(--ease),border-color .35s var(--ease)}
/* External halo matching dash-card / verdict-card */
.stat-chip::before{content:'';position:absolute;inset:-8px;border-radius:18px;background:radial-gradient(ellipse at center,var(--accent1) 0%,transparent 60%);opacity:0;filter:blur(20px);transition:opacity .55s var(--ease);pointer-events:none;z-index:-1}
.stat-chip:hover::before{opacity:.3}
.stat-chip:hover{border-color:var(--accent1);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.3),0 0 32px var(--accent1-10),0 0 64px var(--accent1-06)}
.stat-emoji{font-size:18px;filter:grayscale(0.5) brightness(0.8);opacity:0.6;transition:all .3s var(--ease);animation:statPulse 3s ease-in-out infinite}
.stat-chip:hover .stat-emoji{filter:grayscale(0) brightness(1);opacity:1;transform:scale(1.15)}
@keyframes statPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.stat-info{display:flex;flex-direction:column}
.stat-val{font-size:16px;font-weight:800;color:var(--text);line-height:1}
.stat-desc{font-size:8px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.stats{margin-top:24px;text-align:center;font-size:10px;color:var(--card-hover);letter-spacing:1px;font-weight:600}
@media(max-width:500px){.dash{grid-template-columns:repeat(2,1fr)}}

/* Alfred Sidebar */
#alfredToggle{position:fixed;right:0;top:50%;z-index:99;transform:translateY(-50%);width:36px;height:72px;background:var(--card-border);backdrop-filter:blur(16px);border:1px solid var(--card-hover);border-right:none;border-radius:10px 0 0 10px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s;box-shadow:0 0 20px rgba(139,92,246,0.04)}
#alfredToggle:hover{background:var(--card-hover);border-color:rgba(139,92,246,0.3)}
#alfredSidebar{position:fixed;top:0;right:0;bottom:0;width:340px;z-index:100;background:var(--sidebar-bg);backdrop-filter:blur(24px);border-left:1px solid var(--accent1-06);transform:translateX(100%);transition:transform .35s var(--ease);display:flex;flex-direction:column;box-shadow:-8px 0 40px rgba(0,0,0,0.3)}
#alfredSidebar.open{transform:translateX(0)}
@media(max-width:640px){#alfredSidebar{width:100vw}}
.ah{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--accent1-06)}
.ah-t{font-size:10px;font-weight:700;letter-spacing:.25em;color:var(--card-hover)}
.ah-x{background:none;border:none;color:rgba(255,255,255,0.15);cursor:pointer;font-size:18px}.ah-x:hover{color:rgba(255,255,255,0.4)}
.ab{height:130px;background:rgba(6,6,16,0.8);border-bottom:1px solid rgba(139,92,246,0.04);position:relative;overflow:hidden}
#alfBrain{width:100%;height:100%;display:block}
.am-wrap{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:5px;scrollbar-width:thin}
.am{padding:7px 11px;border-radius:10px;font-size:12px;line-height:1.6;word-wrap:break-word;white-space:pre-wrap;animation:mi .3s var(--ease) both;position:relative}
@keyframes mi{from{opacity:0;transform:translateY(4px)}}
.am.u{background:var(--card-border);color:rgba(232,230,240,0.7);max-width:80%;margin-left:auto;border:1px solid var(--accent1-10)}
/* Alfred — plain text, futuristic font, no bubble */
.am.ai{color:var(--text);font-family:'Space Grotesk',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:400;font-size:13px;line-height:1.6;letter-spacing:-.1px;background:none;border:none;padding:6px 4px 8px;max-width:100%}
.am.ai p{margin:0 0 6px}
.am.ai p:last-child{margin-bottom:0}
.am.ai strong{color:var(--text);font-weight:700;letter-spacing:-.2px}
.am.ai em{color:var(--accent1);font-style:italic}
.am.ai code{font-family:'JetBrains Mono','SF Mono','Menlo',monospace;font-size:11px;color:var(--accent1);background:var(--accent1-06);padding:1px 5px;border-radius:4px}
.am.ai pre{font-family:'JetBrains Mono','SF Mono','Menlo',monospace;font-size:11px;color:var(--text);background:rgba(0,0,0,0.22);border-left:2px solid var(--accent1);padding:8px 10px;margin:6px 0;overflow-x:auto;border-radius:4px}
.am.ai pre code{background:none;padding:0;color:inherit}
.am.ai ul,.am.ai ol{margin:4px 0 6px 18px;padding:0}
.am.ai li{margin:2px 0}
.am.ai ul li{list-style:disc}
.am.ai ol li{list-style:decimal}
.am.ai ul li::marker,.am.ai ol li::marker{color:var(--accent1)}
.am.ai h3,.am.ai h4{color:var(--text);font-weight:700;font-size:14px;margin:8px 0 4px;letter-spacing:-.3px}
.am.ai h3:first-child,.am.ai h4:first-child{margin-top:0}
.am.ai a{color:var(--accent2);text-decoration:none;border-bottom:1px solid var(--accent1-10)}
.am.ai a:hover{border-bottom-color:var(--accent1)}
.am.ai hr{border:none;border-top:1px solid var(--card-border);margin:8px 0}
/* Word-by-word reveal animation during streaming */
.alf-word{display:inline-block;white-space:pre}
.alf-word.reveal{animation:alfWord .7s cubic-bezier(0.16,1,0.3,1) both}
@keyframes alfWord{0%{opacity:0;filter:blur(6px);transform:translateY(4px)}100%{opacity:1;filter:blur(0);transform:translateY(0)}}
/* Streaming caret */
.am.ai .alf-caret{display:inline-block;width:2px;height:1em;margin-left:2px;background:var(--accent1);vertical-align:text-bottom;animation:alfCaret 1s ease-in-out infinite;border-radius:1px;box-shadow:0 0 8px var(--accent1)}
@keyframes alfCaret{0%,100%{opacity:.15}50%{opacity:1}}
/* Thinking dots — shown before first token */
.alf-dots{display:inline-flex;gap:5px;align-items:center;padding:3px 2px}
.alf-dots span{width:6px;height:6px;border-radius:50%;background:var(--accent1);box-shadow:0 0 8px var(--accent1-10);animation:alfDot 1.3s ease-in-out infinite}
.alf-dots span:nth-child(2){animation-delay:.15s}
.alf-dots span:nth-child(3){animation-delay:.3s}
@keyframes alfDot{0%,70%,100%{opacity:.25;transform:translateY(0) scale(.8)}35%{opacity:1;transform:translateY(-5px) scale(1)}}
.ai-row{padding:10px 12px;display:flex;gap:8px;border-top:1px solid rgba(139,92,246,0.04);background:rgba(10,10,20,0.8)}
.ai-row input{flex:1;background:rgba(255,255,255,0.02);border:1px solid var(--accent1-06);border-radius:10px;padding:10px 14px;font-size:12px;color:rgba(232,230,240,0.7);outline:none}
.ai-row input::placeholder{color:var(--card-hover)}
.ai-row input:focus{border-color:var(--card-hover)}
.ai-send{padding:10px 14px;border-radius:10px;background:var(--accent1-06);color:rgba(139,92,246,0.35);border:1px solid var(--card-border);font-weight:700;font-size:12px;cursor:pointer;transition:all .2s}
.ai-send:hover{background:var(--card-hover);color:rgba(139,92,246,0.5)}

/* Blackjack Sidebar */
#bjToggle{position:fixed;left:0;top:50%;z-index:99;transform:translateY(-50%);width:36px;height:72px;background:rgba(236,72,153,0.08);backdrop-filter:blur(16px);border:1px solid rgba(236,72,153,0.15);border-left:none;border-radius:0 10px 10px 0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s}
#bjToggle:hover{background:rgba(236,72,153,0.15);border-color:rgba(236,72,153,0.3)}
#bjPanel{position:fixed;top:0;left:0;bottom:0;width:320px;z-index:100;background:rgba(17,17,34,0.95);backdrop-filter:blur(20px);border-right:1px solid rgba(236,72,153,0.06);transform:translateX(-100%);transition:transform .35s var(--ease);display:flex;flex-direction:column}
#bjPanel.open{transform:translateX(0)}
@media(max-width:640px){#bjPanel{width:100vw}}
.bj-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;background:radial-gradient(ellipse at 50% 40%,rgba(236,72,153,0.04),transparent 70%)}
.bj-head{display:flex;align-items:center;justify-content:space-between;width:100%;padding:8px 14px;border-bottom:1px solid rgba(236,72,153,0.06)}
.bj-title{font-size:10px;font-weight:700;letter-spacing:.2em;color:rgba(236,72,153,0.25)}
.bj-card-w{display:inline-block;perspective:600px;margin:3px}
.bj-card{width:48px;height:66px;border-radius:8px;font-size:16px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-direction:column;position:relative;transform-style:preserve-3d;box-shadow:0 2px 8px rgba(0,0,0,0.3)}
.bj-card.r{background:linear-gradient(145deg,#1a1520,#12101a);color:#ff4d6a;border:1px solid rgba(255,77,106,0.12)}
.bj-card.b{background:linear-gradient(145deg,#1a1a22,#12121a);color:#d4d0e0;border:1px solid rgba(255,255,255,0.06)}
.bj-card.h{background:linear-gradient(145deg,#1a1028,#0d0818);color:transparent;border:1px solid var(--card-hover)}
.bj-card.h::after{content:'Y';font-size:16px;color:var(--accent1-10);font-weight:900}
@keyframes bjIn{from{opacity:0;transform:translateX(-80px) rotate(-12deg)}to{opacity:1;transform:none}}
.bj-deal{animation:bjIn .6s var(--ease) both}
.bj-score{font-size:11px;font-weight:700;color:rgba(255,255,255,0.4);margin:4px 0}
.bj-label{font-size:8px;font-weight:600;letter-spacing:1px;color:rgba(255,255,255,0.15);text-transform:uppercase}
.bj-result{font-size:16px;font-weight:900;letter-spacing:1px;margin:8px 0;min-height:24px}
.bj-actions{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-top:8px}
.bj-btn{padding:6px 16px;border-radius:10px;font-size:11px;font-weight:700;border:1px solid rgba(255,255,255,0.06);background:transparent;color:rgba(255,255,255,0.3);cursor:pointer;transition:all .15s}
.bj-btn:hover{color:rgba(255,255,255,0.6);border-color:rgba(255,255,255,0.12)}
.bj-btn.deal{background:rgba(236,72,153,0.1);border-color:rgba(236,72,153,0.2);color:var(--pink)}
.bj-btn.deal:hover{background:rgba(236,72,153,0.18)}
.bj-chips{display:flex;align-items:center;gap:8px;margin-top:12px}
.bj-chips-val{font-size:14px;font-weight:800;color:var(--pink)}
.bj-bet-ctrl{display:flex;align-items:center;gap:4px}
.bj-bet-btn{width:24px;height:24px;border-radius:50%;border:1px solid rgba(255,255,255,0.06);background:transparent;color:rgba(255,255,255,0.3);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center}
.bj-bet-val{font-size:12px;font-weight:700;color:var(--purple);min-width:28px;text-align:center}

/* Tabs */
.tab-btn{padding:5px 14px;border-radius:16px;font-size:10px;font-weight:600;border:none;cursor:pointer;transition:all .2s var(--ease);background:transparent;color:rgba(255,255,255,0.5)}
.tab-btn:hover{color:rgba(255,255,255,0.5)}
.tab-btn.active{background:var(--accent1-10);color:var(--accent1)}
.view{display:none}.view.active{display:block}

/* Calendar */
.cal-wrap{max-width:780px;margin:0 auto;padding:20px 20px 100px;position:relative;z-index:1}
.cal-wrap::before{content:'';position:absolute;top:-40px;left:50%;transform:translateX(-50%);width:640px;height:640px;max-width:120%;background:radial-gradient(circle,var(--accent1-10) 0%,transparent 60%);pointer-events:none;z-index:-1;animation:calAurora 14s ease-in-out infinite}
@keyframes calAurora{0%,100%{transform:translateX(-50%) scale(1)}50%{transform:translateX(-50%) scale(1.15)}}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;padding:10px 16px;background:var(--card);backdrop-filter:blur(14px);border:1px solid var(--card-border);border-radius:16px;box-shadow:0 6px 22px rgba(0,0,0,0.2),0 0 28px var(--accent1-06)}
.cal-month{font-size:20px;font-weight:800;letter-spacing:-.5px;background:linear-gradient(135deg,var(--accent1),var(--accent2),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.cal-arrow{width:36px;height:36px;border-radius:12px;border:1px solid var(--card-border);background:var(--accent1-06);color:var(--accent1);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .25s var(--ease)}
.cal-arrow:hover{background:var(--accent1-10);border-color:var(--accent1);box-shadow:0 0 16px var(--accent1-10);transform:scale(1.05)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.cal-day-head{text-align:center;font-size:9px;font-weight:800;color:var(--accent1);text-transform:uppercase;letter-spacing:2px;padding:6px 0;opacity:.7}
.cal-day{position:relative;background:linear-gradient(160deg,var(--card),rgba(0,0,0,0.12));backdrop-filter:blur(10px);border:1px solid var(--card-border);border-radius:14px;min-height:92px;padding:8px;cursor:pointer;transition:transform .35s var(--ease),border-color .35s var(--ease),box-shadow .45s var(--ease);overflow:hidden;--cmx:50%;--cmy:50%}
/* Aurora glow layer — cursor tracked via JS */
.cal-day::before{content:'';position:absolute;inset:0;border-radius:inherit;background:radial-gradient(180px circle at var(--cmx) var(--cmy),var(--accent1-10),transparent 60%);opacity:0;transition:opacity .4s var(--ease);pointer-events:none;mix-blend-mode:screen}
.cal-day:hover::before{opacity:1}
/* Subtle shimmer sheen on hover */
.cal-day::after{content:'';position:absolute;top:0;bottom:0;left:-80%;width:60%;background:linear-gradient(110deg,transparent 30%,rgba(255,255,255,0.06) 50%,transparent 70%);pointer-events:none;opacity:0;transition:opacity .3s var(--ease)}
.cal-day:hover::after{opacity:1;animation:hoverSheen 1.2s var(--ease)}
.cal-day>*{position:relative;z-index:2}
.cal-day:hover{border-color:var(--accent1);transform:translateY(-3px) scale(1.02);box-shadow:0 12px 30px rgba(0,0,0,0.35),0 0 30px var(--accent1-10),inset 0 1px 0 rgba(255,255,255,0.06)}
.cal-day.today{border-color:var(--accent1);background:linear-gradient(160deg,var(--accent1-10),rgba(0,0,0,0.15));box-shadow:0 0 22px var(--accent1-10),inset 0 0 0 1px var(--accent1-10);animation:calTodayPulse 3.5s ease-in-out infinite}
@keyframes calTodayPulse{0%,100%{box-shadow:0 0 22px var(--accent1-10),inset 0 0 0 1px var(--accent1-10)}50%{box-shadow:0 0 32px var(--accent1-10),0 0 56px var(--accent1-06),inset 0 0 0 1px var(--card-hover)}}
.cal-day.other{opacity:.3;filter:saturate(.5)}
.cal-num{font-size:13px;font-weight:800;color:var(--text-muted);margin-bottom:3px;display:inline-block;line-height:1}
.cal-day.today .cal-num{color:var(--accent1);text-shadow:0 0 12px var(--accent1-10);font-size:15px}
.cal-day[data-done="1"]{box-shadow:inset 0 0 18px var(--accent1-10),0 4px 16px rgba(0,0,0,0.2)}
.cal-day[data-done="2"]{box-shadow:inset 0 0 24px var(--accent1-10),inset 0 0 8px var(--card-hover),0 4px 18px rgba(0,0,0,0.22)}
.cal-day[data-done="3"]{box-shadow:inset 0 0 30px var(--accent1-10),inset 0 0 14px var(--card-hover),0 0 18px var(--accent1-10),0 6px 22px rgba(0,0,0,0.25);border-color:var(--accent1);animation:calHotPulse 2.6s ease-in-out infinite}
@keyframes calHotPulse{0%,100%{filter:brightness(1)}50%{filter:brightness(1.12) saturate(1.15)}}
/* Mini task dots row at bottom of day cell */
.cal-dots{display:flex;gap:3px;position:absolute;bottom:6px;left:8px;right:8px;flex-wrap:wrap}
.cal-dot{width:5px;height:5px;border-radius:50%;background:var(--accent1);box-shadow:0 0 6px var(--accent1);opacity:.8}
.cal-dot.work{background:var(--accent2);box-shadow:0 0 6px var(--accent2)}
.cal-dot.personal{background:var(--accent1);box-shadow:0 0 6px var(--accent1)}
.cal-dot.project{background:var(--accent3);box-shadow:0 0 6px var(--accent3)}
.cal-dot.done{opacity:.25;box-shadow:none}
.cal-count{position:absolute;top:6px;right:8px;font-size:8px;font-weight:800;color:var(--accent1);background:var(--accent1-10);padding:1px 6px;border-radius:10px;border:1px solid var(--accent1-10);backdrop-filter:blur(4px)}
.cal-count.has-overdue{color:var(--red);background:rgba(239,68,68,0.12);border-color:rgba(239,68,68,0.3);animation:calOverduePulse 2s ease-in-out infinite}
@keyframes calOverduePulse{0%,100%{box-shadow:0 0 0 rgba(239,68,68,0)}50%{box-shadow:0 0 12px rgba(239,68,68,0.4)}}
/* Day popup modal */
/* Day modal — immersive popup matching the verdict-card aesthetic */
.day-modal{position:fixed;inset:0;z-index:300;background:radial-gradient(ellipse at center,rgba(0,0,0,0.7) 0%,rgba(0,0,0,0.85) 100%);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;animation:fadeIn .3s var(--ease);padding:20px}
.day-modal::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 40%,var(--accent1-10) 0%,transparent 50%);pointer-events:none;animation:modalAurora 8s ease-in-out infinite}
@keyframes modalAurora{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.1)}}
.day-modal-card{position:relative;background:linear-gradient(160deg,var(--panel-1),var(--panel-2));backdrop-filter:blur(24px);border:1.5px solid transparent;background-clip:padding-box;border-radius:22px;padding:24px;max-width:520px;width:100%;max-height:80vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,0.5),0 0 60px var(--accent1-10),0 0 120px var(--accent1-06);animation:modalSpringUp .45s var(--ease)}
.day-modal-card::before{content:'';position:absolute;inset:-1.5px;border-radius:22px;padding:1.5px;background:linear-gradient(135deg,var(--accent1),var(--accent3),var(--accent2));-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;opacity:.5}
@keyframes modalSpringUp{0%{opacity:0;transform:translateY(40px) scale(0.92)}60%{opacity:1;transform:translateY(-4px) scale(1.01)}100%{opacity:1;transform:translateY(0) scale(1)}}
.day-modal-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--card-border);position:relative}
.day-modal-date{font-size:24px;font-weight:900;letter-spacing:-1px;line-height:1;background:linear-gradient(135deg,var(--accent1),var(--accent3),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 2px 12px var(--accent1-10))}
.day-modal-day{font-size:10px;color:var(--text-muted);font-weight:700;text-transform:uppercase;letter-spacing:1.5px;margin-top:6px}
.day-modal-day .today-pill{display:inline-block;margin-left:6px;padding:2px 8px;border-radius:10px;background:var(--accent1-10);color:var(--accent1);border:1px solid var(--card-hover);font-size:8px;letter-spacing:1px;animation:todayPillPulse 2.4s ease-in-out infinite}
@keyframes todayPillPulse{0%,100%{box-shadow:0 0 0 rgba(0,0,0,0)}50%{box-shadow:0 0 12px var(--accent1-10)}}
.day-modal-x{width:32px;height:32px;border-radius:10px;background:rgba(255,255,255,0.04);border:1px solid var(--card-border);color:rgba(255,255,255,0.5);cursor:pointer;font-size:18px;line-height:1;display:flex;align-items:center;justify-content:center;transition:all .2s var(--ease)}
.day-modal-x:hover{background:rgba(239,68,68,0.12);border-color:rgba(239,68,68,0.3);color:var(--red);transform:rotate(90deg)}
/* Stats strip */
.day-modal-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.day-stat{background:rgba(255,255,255,0.03);border:1px solid var(--card-border);border-radius:12px;padding:10px 8px;text-align:center;transition:all .25s var(--ease)}
.day-stat:hover{border-color:var(--card-hover);transform:translateY(-1px)}
.day-stat-val{font-size:20px;font-weight:900;color:var(--text);line-height:1;letter-spacing:-.5px}
.day-stat-val.accent{background:linear-gradient(135deg,var(--accent1),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.day-stat-val.red{color:var(--red)}
.day-stat-val.done{color:#4ade80}
.day-stat-label{font-size:7px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-top:3px}
.day-modal-empty{text-align:center;padding:40px 20px;color:var(--text-muted);font-size:12px;animation:emptyIn .4s var(--ease)}
.day-modal-empty-emoji{font-size:48px;opacity:.5;margin-bottom:12px;display:block;animation:emptyBob 4s ease-in-out infinite;filter:grayscale(.3)}
.day-modal-empty-text{font-weight:600;letter-spacing:.3px}
/* Task list inside modal — tighter spacing */
.day-modal-tasks{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
/* Inline add-task input */
.day-modal-add-wrap{display:flex;gap:8px;align-items:center;padding:10px 12px;background:rgba(255,255,255,0.03);border:1px solid var(--card-border);border-radius:14px;transition:all .25s var(--ease);margin-top:4px}
.day-modal-add-wrap:focus-within{border-color:var(--accent1);background:var(--accent1-06);box-shadow:0 0 24px var(--accent1-10)}
.day-modal-add-input{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-size:13px;font-family:inherit;font-weight:500}
.day-modal-add-input::placeholder{color:var(--text-muted)}
.day-modal-add-btn{padding:6px 14px;border-radius:10px;background:linear-gradient(135deg,var(--accent1),var(--accent2));color:#fff;border:none;font-weight:700;font-size:10px;cursor:pointer;transition:all .2s var(--ease);text-transform:uppercase;letter-spacing:.5px}
.day-modal-add-btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px var(--accent1-10)}
.day-modal-add-btn:active{transform:translateY(0)}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.cal-task{font-size:7px;font-weight:600;padding:2px 4px;border-radius:4px;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
.cal-task.work{background:var(--cat-work-bg);color:var(--cat-work-fg)}
.cal-task.personal{background:var(--cat-pers-bg);color:var(--cat-pers-fg)}
.cal-task.project{background:var(--cat-proj-bg);color:var(--cat-proj-fg)}
.cal-task.done{opacity:.3;text-decoration:line-through}

/* Stats View */
.stats-wrap{max-width:680px;margin:0 auto;padding:20px 20px 100px;position:relative;z-index:1}
.stats-section{margin-bottom:20px}
.stats-title{font-size:12px;font-weight:700;color:var(--accent1);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.stat-big{position:relative;background:linear-gradient(135deg,var(--panel-1),var(--panel-2));backdrop-filter:blur(12px);border:1.5px solid transparent;background-clip:padding-box;border-radius:14px;padding:18px 16px;text-align:center;overflow:hidden;transition:all .3s var(--ease)}
.stat-big::before{content:'';position:absolute;inset:-1.5px;border-radius:14px;padding:1.5px;background:linear-gradient(135deg,var(--accent1),var(--accent3),var(--accent2));-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;opacity:0.4;transition:opacity .3s}
.stat-big:hover{transform:translateY(-3px);box-shadow:0 8px 30px rgba(0,0,0,0.3),0 0 30px var(--accent1-10)}
.stat-big:hover::before{opacity:0.9}
.stat-big-val{font-size:34px;font-weight:900;line-height:1;letter-spacing:-1px;background:linear-gradient(135deg,var(--accent1),var(--accent3),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 2px 12px var(--accent1-10))}
/* Verdict card */
.verdict-card{position:relative;border-radius:18px;padding:24px 20px;text-align:center;overflow:hidden;background:linear-gradient(135deg,var(--panel-1),var(--panel-2));border:1.5px solid transparent;background-clip:padding-box}
.verdict-card::before{content:'';position:absolute;inset:-1.5px;border-radius:18px;padding:1.5px;background:linear-gradient(135deg,var(--accent1),var(--accent3),var(--accent2));-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;opacity:0.4}
.verdict-card.locked::before,.verdict-card.him::before{opacity:1}
.verdict-card.him{animation:verdictPulse 2.5s ease-in-out infinite}
@keyframes verdictPulse{0%,100%{box-shadow:0 0 20px var(--accent1-10),0 0 40px var(--accent1-10)}50%{box-shadow:0 0 40px var(--accent1-10),0 0 80px var(--accent1-10),0 0 120px var(--accent1-10)}}
.verdict-text{position:relative;font-size:42px;font-weight:900;letter-spacing:-1.5px;line-height:1;background:linear-gradient(135deg,var(--accent1),var(--accent3),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 2px 16px var(--accent1-10))}
.verdict-card.him .verdict-text{animation:vTextShine 3s ease-in-out infinite}
@keyframes vTextShine{0%,100%{filter:drop-shadow(0 2px 16px var(--accent1-10))}50%{filter:drop-shadow(0 4px 32px var(--accent1)) brightness(1.2)}}
.verdict-meta{font-size:11px;color:var(--text-muted);margin-top:6px;letter-spacing:0.3px}
.verdict-stats{display:flex;justify-content:center;gap:20px;margin-top:14px;position:relative}
.verdict-stat{display:flex;flex-direction:column;align-items:center;gap:2px}
.verdict-stat-val{font-size:20px;font-weight:800;line-height:1}
.verdict-stat-label{font-size:8px;font-weight:700;letter-spacing:1px;color:var(--text-muted);text-transform:uppercase}
.stat-big-label{font-size:8px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-top:4px}
.week-chart{display:flex;align-items:flex-end;gap:4px;height:100px;padding:12px 0}
.week-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.week-bar{width:100%;border-radius:6px 6px 2px 2px;transition:height .6s var(--ease);min-height:2px}
.week-bar-label{font-size:7px;font-weight:600;color:var(--text-muted)}
.cat-breakdown{display:flex;gap:8px;flex-wrap:wrap}
.cat-stat{background:var(--card);border:1px solid rgba(255,255,255,0.04);border-radius:12px;padding:10px 14px;display:flex;align-items:center;gap:8px;flex:1;min-width:120px}
.cat-dot{width:8px;height:8px;border-radius:50%}
.cat-stat-info{display:flex;flex-direction:column}

.cat-stat-name{font-size:8px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px}

/* Sort bar */
.sort-bar{display:flex;align-items:center;gap:4px;margin-bottom:12px}
.sort-label{font-size:8px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-right:4px}
.sort-btn{padding:3px 10px;border-radius:10px;font-size:9px;font-weight:600;border:1px solid rgba(255,255,255,0.06);background:transparent;color:rgba(255,255,255,0.45);cursor:pointer;transition:all .15s}
.sort-btn:hover{color:rgba(255,255,255,0.4)}
/* Task rank number */
.t-rank{font-size:9px;font-weight:700;color:rgba(255,255,255,0.1);min-width:16px;text-align:center;flex-shrink:0;margin-top:4px}
/* Reorder arrows */
.reorder{display:flex;flex-direction:column;gap:1px;flex-shrink:0;opacity:0;transition:opacity .2s}
.tc:hover .reorder{opacity:1}
.ro-btn{width:18px;height:14px;border:none;background:rgba(255,255,255,0.03);color:rgba(255,255,255,0.2);cursor:pointer;font-size:8px;display:flex;align-items:center;justify-content:center;border-radius:4px;transition:all .15s}

/* Drag reorder */
