<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenYap Todo</title>
<meta name="theme-color" content="#0a0a14">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>%E2%9C%93</text></svg>">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
:root {
  --bg:#111122;--card:rgba(20,20,40,0.7);
  --accent1:#8B5CF6;--accent2:#3B82F6;--accent3:#ec4899;
  --accent1-10:rgba(139,92,246,0.10);--accent1-06:rgba(139,92,246,0.06);
  --card-border:rgba(139,92,246,0.08);--card-hover:rgba(139,92,246,0.18);
  --red:#ef4444;--yellow:#eab308;--gray:#64748b;--text:#e8e6f0;--text-body:#b0adc0;--text-muted:#666;
  --border:rgba(255,255,255,0.07);--radius:16px;--ease:cubic-bezier(0.16,1,0.3,1);
  --blue:var(--accent2);--pink:var(--accent3);--purple:var(--accent1);
  --glow1:rgba(139,92,246,0.09);--glow2:rgba(59,130,246,0.08);--glow3:rgba(236,72,153,0.06);
  --body-bg:linear-gradient(160deg,#111122 0%,#161428 40%,#1a1230 70%,#141020 100%);
  --hdr-bg:rgba(17,17,34,0.88);--sidebar-bg:rgba(17,17,34,0.95);
  --cat-work-bg:rgba(59,130,246,0.1);--cat-work-fg:rgba(59,130,246,0.7);
  --cat-pers-bg:rgba(139,92,246,0.1);--cat-pers-fg:rgba(139,92,246,0.7);
  --cat-proj-bg:rgba(236,72,153,0.1);--cat-proj-fg:rgba(236,72,153,0.7);
}
/* ── Themes ── */
body.t-ocean{--card:rgba(10,22,36,0.7);--accent1:#0ea5e9;--accent2:#f97316;--accent3:#06b6d4;--accent1-10:rgba(14,165,233,0.1);--accent1-06:rgba(14,165,233,0.06);--card-border:rgba(14,165,233,0.06);--card-hover:rgba(14,165,233,0.12);--text:#e0eef4;--text-body:#a8bcc8;--text-muted:#5a7080;--glow1:rgba(14,165,233,0.09);--glow2:rgba(249,115,22,0.07);--glow3:rgba(6,182,212,0.06);--body-bg:linear-gradient(160deg,#0c1520 0%,#101e2a 40%,#0a1a28 70%,#0e1420 100%);--hdr-bg:rgba(12,21,32,0.88);--sidebar-bg:rgba(12,21,32,0.95);--cat-work-bg:rgba(249,115,22,0.1);--cat-work-fg:rgba(249,115,22,0.6);--cat-pers-bg:rgba(14,165,233,0.1);--cat-pers-fg:rgba(14,165,233,0.6);--cat-proj-bg:rgba(6,182,212,0.1);--cat-proj-fg:rgba(6,182,212,0.6)}
body.t-forest{--card:rgba(12,22,14,0.7);--accent1:#22c55e;--accent2:#94a3b8;--accent3:#4ade80;--accent1-10:rgba(34,197,94,0.1);--accent1-06:rgba(34,197,94,0.06);--card-border:rgba(34,197,94,0.06);--card-hover:rgba(34,197,94,0.12);--text:#e0f0e0;--text-body:#a8b8a8;--text-muted:#5a6a5a;--glow1:rgba(34,197,94,0.08);--glow2:rgba(148,163,184,0.07);--glow3:rgba(74,222,128,0.05);--body-bg:linear-gradient(160deg,#0e140e 0%,#121a14 40%,#0e1810 70%,#101410 100%);--hdr-bg:rgba(14,20,14,0.88);--sidebar-bg:rgba(14,20,14,0.95);--cat-work-bg:rgba(148,163,184,0.1);--cat-work-fg:rgba(148,163,184,0.6);--cat-pers-bg:rgba(34,197,94,0.1);--cat-pers-fg:rgba(34,197,94,0.6);--cat-proj-bg:rgba(74,222,128,0.1);--cat-proj-fg:rgba(74,222,128,0.6)}
body.t-sunset{--card:rgba(30,18,14,0.7);--accent1:#f97316;--accent2:#ec4899;--accent3:#fbbf24;--accent1-10:rgba(249,115,22,0.1);--accent1-06:rgba(249,115,22,0.06);--card-border:rgba(249,115,22,0.06);--card-hover:rgba(249,115,22,0.12);--text:#f0e8e0;--text-body:#c0b0a8;--text-muted:#7a6860;--glow1:rgba(249,115,22,0.09);--glow2:rgba(236,72,153,0.07);--glow3:rgba(251,191,36,0.06);--body-bg:linear-gradient(160deg,#1a1210 0%,#201614 40%,#1c1012 70%,#181010 100%);--hdr-bg:rgba(26,18,16,0.88);--sidebar-bg:rgba(26,18,16,0.95);--cat-work-bg:rgba(236,72,153,0.1);--cat-work-fg:rgba(236,72,153,0.6);--cat-pers-bg:rgba(249,115,22,0.1);--cat-pers-fg:rgba(249,115,22,0.6);--cat-proj-bg:rgba(251,191,36,0.1);--cat-proj-fg:rgba(251,191,36,0.6)}
body.t-mono{--card:rgba(18,18,22,0.7);--accent1:#a8a8b8;--accent2:#d4d4e0;--accent3:#78788a;--accent1-10:rgba(168,168,184,0.08);--accent1-06:rgba(168,168,184,0.04);--card-border:rgba(168,168,184,0.04);--card-hover:rgba(168,168,184,0.08);--text:#d8d8e0;--text-body:#a0a0b0;--text-muted:#555;--glow1:rgba(168,168,184,0.06);--glow2:rgba(212,212,224,0.05);--glow3:rgba(120,120,138,0.04);--body-bg:linear-gradient(160deg,#111114 0%,#161618 40%,#131316 70%,#101012 100%);--hdr-bg:rgba(17,17,20,0.88);--sidebar-bg:rgba(17,17,20,0.95);--cat-work-bg:rgba(212,212,224,0.08);--cat-work-fg:rgba(212,212,224,0.5);--cat-pers-bg:rgba(168,168,184,0.08);--cat-pers-fg:rgba(168,168,184,0.5);--cat-proj-bg:rgba(120,120,138,0.08);--cat-proj-fg:rgba(120,120,138,0.5)}
body.t-sakura{--card:rgba(28,14,24,0.7);--accent1:#f472b6;--accent2:#c084fc;--accent3:#fda4af;--accent1-10:rgba(244,114,182,0.1);--accent1-06:rgba(244,114,182,0.06);--card-border:rgba(244,114,182,0.06);--card-hover:rgba(244,114,182,0.12);--text:#f0e0ea;--text-body:#c0a8b8;--text-muted:#7a5a6a;--glow1:rgba(244,114,182,0.08);--glow2:rgba(192,132,252,0.07);--glow3:rgba(253,164,175,0.05);--body-bg:linear-gradient(160deg,#1a1018 0%,#1e1420 40%,#18101c 70%,#141018 100%);--hdr-bg:rgba(26,16,24,0.88);--sidebar-bg:rgba(26,16,24,0.95);--cat-work-bg:rgba(192,132,252,0.1);--cat-work-fg:rgba(192,132,252,0.6);--cat-pers-bg:rgba(244,114,182,0.1);--cat-pers-fg:rgba(244,114,182,0.6);--cat-proj-bg:rgba(253,164,175,0.1);--cat-proj-fg:rgba(253,164,175,0.6)}
/* Light theme — inverted with dark text on warm white */
body.t-light{
  --is-light:1;
  --bg:#f6f5fb;--card:rgba(255,255,255,0.78);
  --accent1:#7c3aed;--accent2:#2563eb;--accent3:#db2777;
  --accent1-10:rgba(124,58,237,0.10);--accent1-06:rgba(124,58,237,0.05);
  --card-border:rgba(124,58,237,0.12);--card-hover:rgba(124,58,237,0.22);
  --text:#1a1a2e;--text-body:#525266;--text-muted:#8a8aa0;
  --border:rgba(0,0,0,0.06);
  --glow1:rgba(124,58,237,0.06);--glow2:rgba(37,99,235,0.05);--glow3:rgba(219,39,119,0.04);
  --body-bg:linear-gradient(160deg,#f6f5fb 0%,#efebf7 35%,#f0e9f4 70%,#f2eef8 100%);
  --hdr-bg:rgba(246,245,251,0.88);--sidebar-bg:rgba(246,245,251,0.95);
  --cat-work-bg:rgba(37,99,235,0.10);--cat-work-fg:rgba(37,99,235,0.85);
  --cat-pers-bg:rgba(124,58,237,0.10);--cat-pers-fg:rgba(124,58,237,0.85);
  --cat-proj-bg:rgba(219,39,119,0.10);--cat-proj-fg:rgba(219,39,119,0.85);
}
/* Light-mode overrides for elements using rgba(255,255,255,...) directly */
body.t-light .ck{border-color:rgba(0,0,0,0.22)}
body.t-light .fp,body.t-light .sort-btn{border-color:rgba(0,0,0,0.08);color:rgba(0,0,0,0.55)}
body.t-light .tab-btn{color:rgba(0,0,0,0.55)}
body.t-light .ob{border-color:rgba(0,0,0,0.08);color:rgba(0,0,0,0.45)}
body.t-light .ob:hover{color:rgba(0,0,0,0.7)}
body.t-light .tex textarea,body.t-light .tex-row select,body.t-light .tex-row input,body.t-light .tex-title{background:rgba(0,0,0,0.03);border-color:rgba(0,0,0,0.08);color:var(--text)}
body.t-light .input-card input[type="text"],body.t-light .notes-row textarea,body.t-light .input-card input[type="text"]::placeholder{color:var(--text)}
body.t-light .input-card input[type="text"]::placeholder,body.t-light .notes-row textarea::placeholder{color:rgba(0,0,0,0.35)}
body.t-light .t-rank{color:rgba(0,0,0,0.18)}
body.t-light .pd.medium{background:var(--accent1)}
body.t-light .pd.low{background:var(--gray)}
body.t-light .stats{color:rgba(124,58,237,0.4)}
body.t-light .empty-bubble{color:var(--text)}
body.t-light .empty-bubble::before{background:rgba(255,255,255,0.78)}
body.t-light .verdict-card{background:linear-gradient(135deg,rgba(255,255,255,0.95),rgba(248,247,253,0.92))}
body.t-light .ai-row input{color:var(--text)}
body.t-light .am.user{color:var(--text)}
body.t-light #alfredSidebar{background:rgba(246,245,251,0.95)}
body.t-light #celebText{filter:drop-shadow(0 4px 24px rgba(124,58,237,0.3))}
body.t-light .celeb-sub{color:rgba(0,0,0,0.55)}
body.t-light .mascot{filter:grayscale(0.4) brightness(0.85);opacity:0.18}
body.t-light .mascot:hover{filter:grayscale(0) brightness(1);opacity:0.7}
body.t-light .mascot-mini{filter:grayscale(0.7) brightness(0.7);opacity:0.06}
body.t-light .stat-emoji{filter:grayscale(0.5) brightness(0.85)}
body.t-light .bg-mesh::before{opacity:0.6}
/* Light Sisyphus canvas */
body.t-light #sisCanvas{background:linear-gradient(180deg,#e8e4f5 0%,#d8d0ee 60%,#cec3e8 100%) !important;border-color:rgba(124,58,237,0.18) !important;box-shadow:0 4px 20px rgba(124,58,237,0.08),inset 0 1px 0 rgba(255,255,255,0.6) !important}

/* Mascot — blended, subtle, alive */
.mascot{position:fixed;bottom:20px;left:20px;font-size:32px;z-index:10;opacity:0.12;transition:all .4s var(--ease);cursor:pointer;filter:grayscale(0.5) brightness(0.7);animation:mascotFloat 5s ease-in-out infinite}
.mascot:hover{opacity:0.7;filter:grayscale(0) brightness(1);animation:mascotWiggle .5s var(--ease)}
@keyframes mascotFloat{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-8px) rotate(2deg)}}
@keyframes mascotWiggle{0%{transform:rotate(0) scale(1)}15%{transform:rotate(-12deg) scale(1.2)}30%{transform:rotate(10deg) scale(1.3)}45%{transform:rotate(-8deg) scale(1.25)}60%{transform:rotate(5deg) scale(1.2)}75%{transform:rotate(-3deg) scale(1.15)}100%{transform:rotate(0) scale(1.15)}}
.mascot-mini{position:fixed;font-size:18px;z-index:5;opacity:0.05;pointer-events:auto;cursor:pointer;filter:grayscale(0.7) brightness(0.5);animation:miniDrift 8s ease-in-out infinite;transition:all .3s var(--ease)}
.mascot-mini:hover{opacity:0.6;filter:grayscale(0) brightness(1);animation:miniPop .4s var(--ease)}
@keyframes miniDrift{0%,100%{transform:translate(0,0) rotate(0)}25%{transform:translate(5px,-6px) rotate(4deg)}50%{transform:translate(-3px,-2px) rotate(-2deg)}75%{transform:translate(-5px,4px) rotate(3deg)}}
@keyframes miniPop{0%{transform:scale(1) rotate(0)}30%{transform:scale(1.6) rotate(-15deg)}60%{transform:scale(1.4) rotate(10deg)}100%{transform:scale(1.3) rotate(0)}}

/* Theme picker */
.theme-picker{position:relative;display:inline-block}
.theme-dots{display:none;position:absolute;top:100%;right:0;margin-top:6px;background:var(--card);backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:12px;padding:8px;gap:6px;display:none;flex-wrap:wrap;width:160px;z-index:200;box-shadow:0 8px 24px rgba(0,0,0,0.3)}
.theme-dots.show{display:flex}
.theme-dot{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .2s;display:flex;align-items:center;justify-content:center;font-size:12px}
.theme-dot:hover{transform:scale(1.15)}
.theme-dot.active{border-color:var(--accent1);box-shadow:0 0 8px rgba(255,255,255,0.1)}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--body-bg);color:var(--text-body);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh;transition:margin-right .3s var(--ease);overflow-x:hidden}
::selection{background:var(--card-hover)}
input,select,textarea,button{font-family:inherit}

/* Animated gradient mesh background */
.bg-mesh{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.bg-mesh::before{content:'';position:absolute;width:150%;height:150%;top:-25%;left:-25%;background:radial-gradient(ellipse 600px 500px at 25% 35%,var(--glow2) 0%,transparent 70%),radial-gradient(ellipse 500px 600px at 75% 60%,var(--glow1) 0%,transparent 70%),radial-gradient(ellipse 500px 400px at 50% 80%,var(--glow3) 0%,transparent 70%);animation:meshDrift 20s ease-in-out infinite alternate}
@keyframes meshDrift{0%{transform:translate(0,0) rotate(0)}50%{transform:translate(-20px,15px) rotate(1.5deg)}100%{transform:translate(15px,-10px) rotate(-1deg)}}
.bg-mesh::after{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,0.025) 1px,transparent 1px);background-size:32px 32px}

/* Gradient line accents */
.glow-line{position:fixed;height:1px;z-index:0;pointer-events:none;opacity:0.15}
.glow-line.top{top:48px;left:0;right:0;background:linear-gradient(90deg,transparent,var(--accent1),var(--accent3),var(--accent2),transparent)}
.glow-line.mid{top:50%;left:10%;right:10%;background:linear-gradient(90deg,transparent,var(--glow1),transparent);animation:glowPulse 4s ease-in-out infinite}
@keyframes glowPulse{0%,100%{opacity:0.08}50%{opacity:0.2}}

/* Header */
.header{position:sticky;top:0;z-index:50;background:var(--hdr-bg);backdrop-filter:blur(24px) saturate(180%);-webkit-backdrop-filter:blur(24px) saturate(180%);border-bottom:1px solid var(--card-border)}
.header-inner{max-width:680px;margin:0 auto;padding:0 20px;height:48px;display:flex;align-items:center;justify-content:space-between}
.app-title{font-weight:300;font-size:11px;letter-spacing:.3em;color:var(--accent1);opacity:0.6;text-transform:uppercase}
.header-right{display:flex;gap:8px;align-items:center}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--accent1);box-shadow:0 0 8px var(--accent1-10);animation:syncPulse 2s ease-in-out infinite}
@keyframes syncPulse{0%,100%{opacity:1}50%{opacity:0.4}}
.sync-label{font-size:9px;color:var(--accent1);opacity:0.3;letter-spacing:1px;font-weight:600}

/* Main */
.main{max-width:680px;margin:0 auto;padding:20px 20px 100px;position:relative;z-index:1}

/* Input Card */
.input-card{background:var(--card);backdrop-filter:blur(16px);border:1px solid var(--card-border);border-radius:var(--radius);padding:16px;margin-bottom:20px;transition:border-color .3s}
.input-card:focus-within{border-color:var(--card-hover);box-shadow:0 0 30px rgba(139,92,246,0.04)}
.input-card input[type="text"]{width:100%;background:transparent;border:none;font-size:15px;color:var(--text);outline:none;margin-bottom:12px}
.input-card input[type="text"]::placeholder{color:rgba(168,164,184,0.4)}
.input-opts{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.opt-grp{display:flex;gap:3px}
.ob{padding:5px 12px;border-radius:14px;font-size:10px;font-weight:600;border:1px solid rgba(255,255,255,0.06);background:transparent;color:rgba(255,255,255,0.25);cursor:pointer;transition:all .15s}
.ob:hover{color:rgba(255,255,255,0.45)}
.ob.s{color:#fff}
.ob.s[data-c="work"]{background:rgba(59,130,246,0.15);border-color:rgba(59,130,246,0.25);color:var(--blue)}
.ob.s[data-c="personal"]{background:var(--card-hover);border-color:var(--card-hover);color:var(--purple)}
.ob.s[data-c="project"]{background:rgba(236,72,153,0.12);border-color:rgba(236,72,153,0.2);color:var(--pink)}
.ob.s[data-p="high"]{background:rgba(239,68,68,0.1);border-color:rgba(239,68,68,0.2);color:var(--red)}
.ob.s[data-p="medium"]{background:var(--accent1-10);border-color:var(--card-hover);color:var(--purple)}
.ob.s[data-p="low"]{background:rgba(100,116,139,0.12);border-color:rgba(100,116,139,0.2);color:var(--gray)}
.add-btn{padding:6px 20px;border-radius:14px;margin-left:auto;background:linear-gradient(135deg,var(--card-hover),rgba(59,130,246,0.15));color:var(--purple);border:1px solid var(--card-hover);font-weight:700;font-size:12px;cursor:pointer;transition:all .2s var(--ease)}
.add-btn:hover{background:linear-gradient(135deg,rgba(139,92,246,0.3),rgba(59,130,246,0.25));transform:translateY(-1px);box-shadow:0 4px 16px var(--card-hover)}

/* Date button */
.date-btn{padding:5px 12px;border-radius:12px;font-size:10px;font-weight:600;border:1px solid rgba(255,255,255,0.06);background:transparent;color:rgba(255,255,255,0.25);cursor:pointer;transition:all .15s;position:relative}
.date-btn:hover{color:rgba(255,255,255,0.5);border-color:rgba(255,255,255,0.12)}
.date-btn.has-date{background:var(--accent1-10);border-color:var(--card-hover);color:var(--purple)}
.date-btn input[type="date"]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
/* Theme native inputs */
input[type="date"],select{color-scheme:dark}
input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(0.7)}
.fp.a{background:var(--accent1-10);color:var(--accent1);border-color:var(--card-hover)}
.sort-btn.a{background:var(--accent1-10);color:var(--accent1);border-color:var(--card-hover)}

/* Notes input */
.notes-row{margin-top:8px}
.notes-row textarea{width:100%;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.04);border-radius:10px;padding:8px 12px;color:var(--text-body);font-size:12px;resize:none;height:36px;outline:none;transition:all .2s}
.notes-row textarea:focus{height:70px;border-color:var(--card-hover)}
.notes-row textarea::placeholder{color:rgba(168,164,184,0.25)}
/* Difficulty buttons */
.ob.s[data-d="easy"]{background:rgba(74,222,128,0.12);border-color:rgba(74,222,128,0.3);color:#4ade80}
.ob.s[data-d="medium"]{background:rgba(251,191,36,0.12);border-color:rgba(251,191,36,0.3);color:#fbbf24}
.ob.s[data-d="hard"]{background:rgba(249,115,22,0.12);border-color:rgba(249,115,22,0.3);color:#f97316}
.ob.s[data-d="epic"]{background:rgba(236,72,153,0.15);border-color:rgba(236,72,153,0.35);color:var(--accent3)}
/* Difficulty stars on task card */
.t-diff{display:inline-flex;gap:1px;font-size:9px;line-height:1;letter-spacing:0;color:rgba(255,255,255,0.2)}
.t-diff.easy{color:#4ade80}.t-diff.medium{color:#fbbf24}.t-diff.hard{color:#f97316}.t-diff.epic{color:var(--accent3)}
/* Progress slider on task card */
.t-prog{display:flex;align-items:center;gap:6px;margin-top:6px}
.t-prog-bar{flex:1;height:5px;border-radius:3px;background:rgba(255,255,255,0.05);overflow:hidden;cursor:pointer;position:relative}
.t-prog-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent2),var(--accent1),var(--accent3));transition:width .35s var(--ease)}
.t-prog-val{font-size:9px;font-weight:700;color:var(--text-muted);min-width:28px;text-align:right;font-variant-numeric:tabular-nums}
.t-prog-input{width:100%;background:rgba(255,255,255,0.02);border:1px solid var(--card-border);border-radius:8px;padding:5px 8px;color:var(--text-body);font-size:11px;outline:none}
.t-prog-input:focus{border-color:var(--card-hover)}
/* Celebration overlay */
#celebOverlay{position:fixed;inset:0;z-index:9999;pointer-events:none;display:none}
#celebOverlay.show{display:block}
#celebCanvas{position:absolute;inset:0;width:100%;height:100%}
.celeb-text{position:absolute;top:35%;left:50%;transform:translateX(-50%);font-size:48px;font-weight:900;letter-spacing:-1.5px;background:linear-gradient(135deg,var(--accent1),var(--accent2),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;animation:celebTextIn 2.2s var(--ease) both;text-shadow:0 0 40px rgba(139,92,246,0.4);filter:drop-shadow(0 4px 24px rgba(0,0,0,0.6))}
.celeb-sub{display:block;font-size:14px;font-weight:600;color:rgba(255,255,255,0.5);letter-spacing:3px;text-transform:uppercase;margin-top:8px;-webkit-text-fill-color:rgba(255,255,255,0.5);background:none}
@keyframes celebTextIn{0%{opacity:0;transform:translateX(-50%) translateY(20px) scale(0.8)}15%{opacity:1;transform:translateX(-50%) translateY(0) scale(1.15)}30%{transform:translateX(-50%) translateY(0) scale(1)}80%{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}100%{opacity:0;transform:translateX(-50%) translateY(-20px) scale(1)}}

/* Filters */
.filters{display:flex;gap:5px;margin-bottom:16px;flex-wrap:wrap}
.fp{padding:4px 12px;border-radius:14px;font-size:10px;font-weight:600;border:1px solid rgba(255,255,255,0.06);background:transparent;color:rgba(255,255,255,0.5);cursor:pointer;transition:all .15s}
.fp:hover{color:rgba(255,255,255,0.4)}

/* Task Cards */
.task-list{display:flex;flex-direction:column;gap:6px}
.tc{position:relative;overflow:hidden;background:var(--card);backdrop-filter:blur(12px);border:1px solid var(--accent1-06);border-radius:14px;padding:12px 14px;display:flex;align-items:flex-start;gap:10px;transition:all .3s var(--ease);animation:ti .35s var(--ease) both}
.tc:hover{border-color:var(--card-hover);box-shadow:0 4px 20px rgba(0,0,0,0.3),0 0 24px var(--accent1-10);transform:translateY(-1px);backdrop-filter:blur(16px)}
@keyframes shine{0%{transform:translateX(-100%) skewX(-15deg)}100%{transform:translateX(200%) skewX(-15deg)}}
.tc.celebrating::after{content:'';position:absolute;top:0;bottom:0;left:0;width:60%;background:linear-gradient(105deg,transparent 30%,rgba(255,255,255,0.18) 50%,transparent 70%);pointer-events:none;animation:shine 0.9s var(--ease) both;z-index:5}
.tc.celebrating{box-shadow:0 0 30px var(--accent1-10),0 0 60px var(--accent1-10)}
/* Empty state */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;text-align:center;animation:emptyIn .5s var(--ease)}
@keyframes emptyIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.empty-mascot{font-size:64px;line-height:1;animation:emptyBob 4s ease-in-out infinite;filter:grayscale(0.3) brightness(0.85);opacity:0.8}
@keyframes emptyBob{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-10px) rotate(3deg)}}
.empty-bubble{margin-top:18px;padding:10px 18px;border-radius:18px;font-size:12px;font-weight:600;letter-spacing:0.5px;color:var(--text-body);background:var(--card);backdrop-filter:blur(12px);border:1px solid var(--accent1-10);position:relative}
.empty-bubble::before{content:'';position:absolute;top:-6px;left:50%;transform:translateX(-50%) rotate(45deg);width:10px;height:10px;background:var(--card);border-left:1px solid var(--accent1-10);border-top:1px solid var(--accent1-10)}
.tc.done{opacity:.3}
.tc.done .tt{text-decoration:line-through;color:var(--text-muted)}
@keyframes ti{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.ck{width:22px;height:22px;border-radius:50%;flex-shrink:0;margin-top:2px;border:2px solid rgba(255,255,255,0.18);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s var(--ease);color:transparent;font-size:12px}
.ck:hover{border-color:var(--accent1);background:var(--accent1-10);box-shadow:0 0 10px var(--accent1-10)}
.tc.done .ck{border-color:var(--accent1);background:var(--accent1);color:#fff}
.tb{flex:1;min-width:0}
.tt{font-size:14px;font-weight:500;color:var(--text);line-height:1.4;cursor:pointer}
.t-notes{font-size:11px;color:rgba(168,164,184,0.5);margin-top:2px;white-space:pre-wrap}
.tm{display:flex;gap:5px;margin-top:4px;flex-wrap:wrap;align-items:center}
.pd{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.pd.high{background:var(--red);box-shadow:0 0 6px rgba(239,68,68,0.4)}
.pd.medium{background:var(--purple);box-shadow:0 0 4px rgba(139,92,246,0.3)}
.pd.low{background:var(--gray)}
.cat{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:2px 8px;border-radius:10px}
.cat.work{background:var(--cat-work-bg);color:var(--cat-work-fg)}
.cat.personal{background:var(--cat-pers-bg);color:var(--cat-pers-fg)}
.cat.project{background:var(--cat-proj-bg);color:var(--cat-proj-fg)}
.dl{font-size:10px;color:var(--text-muted)}
.dl.od{color:var(--red)}
.ta{display:flex;gap:4px;flex-shrink:0;opacity:0;transition:opacity .2s}
.tc:hover .ta{opacity:1}
.tab{width:26px;height:26px;border-radius:8px;border:none;background:rgba(255,255,255,0.03);color:rgba(255,255,255,0.25);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.tab:hover{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.5)}
.tab.del:hover{background:rgba(239,68,68,0.08);color:var(--red)}

/* Expand */
.tex{margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,0.04);display:flex;flex-direction:column;gap:6px}
.tex textarea{width:100%;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.04);border-radius:10px;padding:8px 10px;color:var(--text-body);font-size:12px;resize:vertical;min-height:50px;outline:none}
.tex textarea:focus{border-color:var(--card-hover)}
.tex-title{width:100%;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:8px 10px;color:var(--text);font-size:14px;font-weight:500;outline:none;font-family:inherit}
.tex-title:focus{border-color:var(--card-hover)}
.tex-row{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.tex-row select,.tex-row input[type="date"]{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:8px;padding:5px 8px;font-size:11px;color:var(--text-body);outline:none}

/* Dashboard Metrics */
.dash{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:20px}
.dash-card{position:relative;background:linear-gradient(135deg,rgba(20,20,40,0.8),rgba(15,12,30,0.85));backdrop-filter:blur(12px);border:1.5px solid transparent;background-clip:padding-box;border-radius:14px;padding:14px 12px;text-align:center;transition:all .3s var(--ease);overflow:hidden}
.dash-card::before{content:'';position:absolute;inset:-1.5px;border-radius:14px;padding:1.5px;background:linear-gradient(135deg,var(--accent1),var(--accent3),var(--accent2));-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;opacity:0.35;transition:opacity .3s}
.dash-card:hover{transform:translateY(-3px);box-shadow:0 8px 30px rgba(0,0,0,0.3),0 0 30px var(--accent1-10)}
.dash-card:hover::before{opacity:0.85}
body.t-light .dash-card{background:linear-gradient(135deg,rgba(255,255,255,0.95),rgba(248,247,253,0.92))}
.dash-val{font-size:26px;font-weight:900;line-height:1;letter-spacing:-1px;background:linear-gradient(135deg,var(--accent1),var(--accent3),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 2px 12px var(--accent1-10))}
.dash-val.green{background:linear-gradient(135deg,#34d399,var(--accent1),#34d399);-webkit-background-clip:text;background-clip:text}
.dash-label{font-size:8px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);margin-top:4px}
.dash-bar{height:3px;border-radius:2px;background:rgba(255,255,255,0.04);margin-top:8px;overflow:hidden}
.dash-bar-fill{height:100%;border-radius:2px;transition:width .6s var(--ease)}
/* Streak / Stats row */
.stat-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.stat-chip{background:var(--card);backdrop-filter:blur(12px);border:1px solid rgba(139,92,246,0.04);border-radius:12px;padding:8px 14px;display:flex;align-items:center;gap:8px;flex:1;min-width:140px;transition:all .3s var(--ease)}
.stat-chip:hover{border-color:var(--accent1-10)}
.stat-emoji{font-size:18px;filter:grayscale(0.5) brightness(0.8);opacity:0.6;transition:all .3s var(--ease);animation:statPulse 3s ease-in-out infinite}
.stat-chip:hover .stat-emoji{filter:grayscale(0) brightness(1);opacity:1;transform:scale(1.15)}
@keyframes statPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.stat-info{display:flex;flex-direction:column}
.stat-val{font-size:16px;font-weight:800;color:var(--text);line-height:1}
.stat-desc{font-size:8px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.stats{margin-top:24px;text-align:center;font-size:10px;color:var(--card-hover);letter-spacing:1px;font-weight:600}
@media(max-width:500px){.dash{grid-template-columns:repeat(2,1fr)}}

/* Alfred Sidebar */
#alfredToggle{position:fixed;right:0;top:50%;z-index:99;transform:translateY(-50%);width:36px;height:72px;background:var(--card-border);backdrop-filter:blur(16px);border:1px solid var(--card-hover);border-right:none;border-radius:10px 0 0 10px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s;box-shadow:0 0 20px rgba(139,92,246,0.04)}
#alfredToggle:hover{background:var(--card-hover);border-color:rgba(139,92,246,0.3)}
#alfredSidebar{position:fixed;top:0;right:0;bottom:0;width:340px;z-index:100;background:var(--sidebar-bg);backdrop-filter:blur(24px);border-left:1px solid var(--accent1-06);transform:translateX(100%);transition:transform .35s var(--ease);display:flex;flex-direction:column;box-shadow:-8px 0 40px rgba(0,0,0,0.3)}
#alfredSidebar.open{transform:translateX(0)}
@media(max-width:640px){#alfredSidebar{width:100vw}}
.ah{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--accent1-06)}
.ah-t{font-size:10px;font-weight:700;letter-spacing:.25em;color:var(--card-hover)}
.ah-x{background:none;border:none;color:rgba(255,255,255,0.15);cursor:pointer;font-size:18px}.ah-x:hover{color:rgba(255,255,255,0.4)}
.ab{height:130px;background:rgba(6,6,16,0.8);border-bottom:1px solid rgba(139,92,246,0.04);position:relative;overflow:hidden}
#alfBrain{width:100%;height:100%;display:block}
.am-wrap{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:5px;scrollbar-width:thin}
.am{padding:7px 11px;border-radius:10px;font-size:12px;line-height:1.6;word-wrap:break-word;white-space:pre-wrap;animation:mi .25s var(--ease) both}
@keyframes mi{from{opacity:0;transform:translateY(4px)}}
.am.u{background:var(--card-border);color:rgba(232,230,240,0.7);max-width:80%;margin-left:auto;border:1px solid var(--accent1-10)}
.am.ai{color:rgba(200,195,220,0.65)}
.am.ai.str{border-left:2px solid var(--card-hover);padding-left:10px}
.ai-row{padding:10px 12px;display:flex;gap:8px;border-top:1px solid rgba(139,92,246,0.04);background:rgba(10,10,20,0.8)}
.ai-row input{flex:1;background:rgba(255,255,255,0.02);border:1px solid var(--accent1-06);border-radius:10px;padding:10px 14px;font-size:12px;color:rgba(232,230,240,0.7);outline:none}
.ai-row input::placeholder{color:var(--card-hover)}
.ai-row input:focus{border-color:var(--card-hover)}
.ai-send{padding:10px 14px;border-radius:10px;background:var(--accent1-06);color:rgba(139,92,246,0.35);border:1px solid var(--card-border);font-weight:700;font-size:12px;cursor:pointer;transition:all .2s}
.ai-send:hover{background:var(--card-hover);color:rgba(139,92,246,0.5)}

/* Blackjack Sidebar */
#bjToggle{position:fixed;left:0;top:50%;z-index:99;transform:translateY(-50%);width:36px;height:72px;background:rgba(236,72,153,0.08);backdrop-filter:blur(16px);border:1px solid rgba(236,72,153,0.15);border-left:none;border-radius:0 10px 10px 0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s}
#bjToggle:hover{background:rgba(236,72,153,0.15);border-color:rgba(236,72,153,0.3)}
#bjPanel{position:fixed;top:0;left:0;bottom:0;width:320px;z-index:100;background:rgba(17,17,34,0.95);backdrop-filter:blur(20px);border-right:1px solid rgba(236,72,153,0.06);transform:translateX(-100%);transition:transform .35s var(--ease);display:flex;flex-direction:column}
#bjPanel.open{transform:translateX(0)}
@media(max-width:640px){#bjPanel{width:100vw}}
.bj-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;background:radial-gradient(ellipse at 50% 40%,rgba(236,72,153,0.04),transparent 70%)}
.bj-head{display:flex;align-items:center;justify-content:space-between;width:100%;padding:8px 14px;border-bottom:1px solid rgba(236,72,153,0.06)}
.bj-title{font-size:10px;font-weight:700;letter-spacing:.2em;color:rgba(236,72,153,0.25)}
.bj-card-w{display:inline-block;perspective:600px;margin:3px}
.bj-card{width:48px;height:66px;border-radius:8px;font-size:16px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-direction:column;position:relative;transform-style:preserve-3d;box-shadow:0 2px 8px rgba(0,0,0,0.3)}
.bj-card.r{background:linear-gradient(145deg,#1a1520,#12101a);color:#ff4d6a;border:1px solid rgba(255,77,106,0.12)}
.bj-card.b{background:linear-gradient(145deg,#1a1a22,#12121a);color:#d4d0e0;border:1px solid rgba(255,255,255,0.06)}
.bj-card.h{background:linear-gradient(145deg,#1a1028,#0d0818);color:transparent;border:1px solid var(--card-hover)}
.bj-card.h::after{content:'Y';font-size:16px;color:var(--accent1-10);font-weight:900}
@keyframes bjIn{from{opacity:0;transform:translateX(-80px) rotate(-12deg)}to{opacity:1;transform:none}}
.bj-deal{animation:bjIn .6s var(--ease) both}
.bj-score{font-size:11px;font-weight:700;color:rgba(255,255,255,0.4);margin:4px 0}
.bj-label{font-size:8px;font-weight:600;letter-spacing:1px;color:rgba(255,255,255,0.15);text-transform:uppercase}
.bj-result{font-size:16px;font-weight:900;letter-spacing:1px;margin:8px 0;min-height:24px}
.bj-actions{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-top:8px}
.bj-btn{padding:6px 16px;border-radius:10px;font-size:11px;font-weight:700;border:1px solid rgba(255,255,255,0.06);background:transparent;color:rgba(255,255,255,0.3);cursor:pointer;transition:all .15s}
.bj-btn:hover{color:rgba(255,255,255,0.6);border-color:rgba(255,255,255,0.12)}
.bj-btn.deal{background:rgba(236,72,153,0.1);border-color:rgba(236,72,153,0.2);color:var(--pink)}
.bj-btn.deal:hover{background:rgba(236,72,153,0.18)}
.bj-chips{display:flex;align-items:center;gap:8px;margin-top:12px}
.bj-chips-val{font-size:14px;font-weight:800;color:var(--pink)}
.bj-bet-ctrl{display:flex;align-items:center;gap:4px}
.bj-bet-btn{width:24px;height:24px;border-radius:50%;border:1px solid rgba(255,255,255,0.06);background:transparent;color:rgba(255,255,255,0.3);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center}
.bj-bet-val{font-size:12px;font-weight:700;color:var(--purple);min-width:28px;text-align:center}

/* Tabs */
.tab-btn{padding:5px 14px;border-radius:16px;font-size:10px;font-weight:600;border:none;cursor:pointer;transition:all .2s var(--ease);background:transparent;color:rgba(255,255,255,0.5)}
.tab-btn:hover{color:rgba(255,255,255,0.5)}
.tab-btn.active{background:var(--accent1-10);color:var(--accent1)}
.view{display:none}.view.active{display:block}

/* Calendar */
.cal-wrap{max-width:680px;margin:0 auto;padding:20px 20px 100px;position:relative;z-index:1}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-month{font-size:16px;font-weight:700;color:var(--text);letter-spacing:-.5px}
.cal-arrow{width:30px;height:30px;border-radius:10px;border:1px solid var(--border);background:transparent;color:rgba(255,255,255,0.3);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.cal-arrow:hover{color:rgba(255,255,255,0.6);background:rgba(255,255,255,0.04)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-day-head{text-align:center;font-size:8px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;padding:4px 0}
.cal-day{background:var(--card);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.03);border-radius:10px;min-height:70px;padding:6px;cursor:pointer;transition:all .2s var(--ease);position:relative}
.cal-day:hover{border-color:var(--card-hover)}
.cal-day.today{border-color:var(--card-hover);box-shadow:0 0 12px var(--accent1-10)}
.cal-day.other{opacity:.3}
.cal-num{font-size:10px;font-weight:700;color:rgba(255,255,255,0.3);margin-bottom:2px}
.cal-day.today .cal-num{color:var(--accent1)}
.cal-day[data-done="1"]{box-shadow:inset 0 0 14px var(--accent1-10)}
.cal-day[data-done="2"]{box-shadow:inset 0 0 18px var(--accent1-10),inset 0 0 6px rgba(139,92,246,0.18)}
.cal-day[data-done="3"]{box-shadow:inset 0 0 22px var(--accent1-10),inset 0 0 10px rgba(139,92,246,0.22),0 0 12px var(--accent1-10);border-color:var(--card-hover)}
/* Day popup modal */
.day-modal{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;animation:fadeIn .2s var(--ease);padding:20px}
.day-modal-card{background:var(--card);backdrop-filter:blur(20px);border:1px solid var(--card-hover);border-radius:18px;padding:20px;max-width:480px;width:100%;max-height:80vh;overflow-y:auto;box-shadow:0 16px 48px rgba(0,0,0,0.4),0 0 40px var(--accent1-10);animation:slideUp .35s var(--ease)}
.day-modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--card-border)}
.day-modal-date{font-size:18px;font-weight:800;color:var(--text);letter-spacing:-.5px}
.day-modal-day{font-size:10px;color:var(--accent1);font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-top:2px}
.day-modal-x{background:none;border:none;color:rgba(255,255,255,0.3);cursor:pointer;font-size:22px;line-height:1}
.day-modal-x:hover{color:var(--text)}
.day-modal-empty{text-align:center;padding:30px;color:var(--text-muted);font-size:13px}
.day-modal-add{padding:8px 14px;border-radius:10px;background:var(--accent1-10);color:var(--accent1);border:1px solid var(--card-hover);font-weight:600;font-size:11px;cursor:pointer;transition:all .2s;margin-top:10px;width:100%}
.day-modal-add:hover{background:var(--card-hover)}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.cal-task{font-size:7px;font-weight:600;padding:2px 4px;border-radius:4px;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
.cal-task.work{background:var(--cat-work-bg);color:var(--cat-work-fg)}
.cal-task.personal{background:var(--cat-pers-bg);color:var(--cat-pers-fg)}
.cal-task.project{background:var(--cat-proj-bg);color:var(--cat-proj-fg)}
.cal-task.done{opacity:.3;text-decoration:line-through}

/* Stats View */
.stats-wrap{max-width:680px;margin:0 auto;padding:20px 20px 100px;position:relative;z-index:1}
.stats-section{margin-bottom:20px}
.stats-title{font-size:12px;font-weight:700;color:var(--accent1);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.stat-big{position:relative;background:linear-gradient(135deg,rgba(20,20,40,0.8),rgba(15,12,30,0.85));backdrop-filter:blur(12px);border:1.5px solid transparent;background-clip:padding-box;border-radius:14px;padding:18px 16px;text-align:center;overflow:hidden;transition:all .3s var(--ease)}

.stat-big:hover{transform:translateY(-3px);box-shadow:0 8px 30px rgba(0,0,0,0.3),0 0 30px var(--accent1-10)}
.stat-big:hover::before{opacity:0.9}

.stat-big-val{font-size:34px;font-weight:900;line-height:1;letter-spacing:-1px;background:linear-gradient(135deg,var(--accent1),var(--accent3),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 2px 12px var(--accent1-10))}
/* Verdict card */
.verdict-card{position:relative;border-radius:18px;padding:24px 20px;text-align:center;overflow:hidden;background:linear-gradient(135deg,rgba(20,20,40,0.85),rgba(15,12,30,0.9));border:1.5px solid transparent;background-clip:padding-box}
.verdict-card::before{content:'';position:absolute;inset:-1.5px;border-radius:18px;padding:1.5px;background:linear-gradient(135deg,var(--accent1),var(--accent3),var(--accent2));-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;opacity:0.4}
.verdict-card.locked::before,.verdict-card.him::before{opacity:1}
.verdict-card.him{animation:verdictPulse 2.5s ease-in-out infinite}
@keyframes verdictPulse{0%,100%{box-shadow:0 0 20px var(--accent1-10),0 0 40px var(--accent1-10)}50%{box-shadow:0 0 40px var(--accent1-10),0 0 80px var(--accent1-10),0 0 120px var(--accent1-10)}}
.verdict-text{position:relative;font-size:42px;font-weight:900;letter-spacing:-1.5px;line-height:1;background:linear-gradient(135deg,var(--accent1),var(--accent3),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 2px 16px var(--accent1-10))}
.verdict-card.him .verdict-text{animation:vTextShine 3s ease-in-out infinite}
@keyframes vTextShine{0%,100%{filter:drop-shadow(0 2px 16px var(--accent1-10))}50%{filter:drop-shadow(0 4px 32px var(--accent1)) brightness(1.2)}}
.verdict-meta{font-size:11px;color:var(--text-muted);margin-top:6px;letter-spacing:0.3px}
.verdict-stats{display:flex;justify-content:center;gap:20px;margin-top:14px;position:relative}
.verdict-stat{display:flex;flex-direction:column;align-items:center;gap:2px}
.verdict-stat-val{font-size:20px;font-weight:800;line-height:1}
.verdict-stat-label{font-size:8px;font-weight:700;letter-spacing:1px;color:var(--text-muted);text-transform:uppercase}
.stat-big-label{font-size:8px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-top:4px}
.week-chart{display:flex;align-items:flex-end;gap:4px;height:100px;padding:12px 0}
.week-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.week-bar{width:100%;border-radius:6px 6px 2px 2px;transition:height .6s var(--ease);min-height:2px}
.week-bar-label{font-size:7px;font-weight:600;color:var(--text-muted)}
.cat-breakdown{display:flex;gap:8px;flex-wrap:wrap}
.cat-stat{background:var(--card);border:1px solid rgba(255,255,255,0.04);border-radius:12px;padding:10px 14px;display:flex;align-items:center;gap:8px;flex:1;min-width:120px}
.cat-dot{width:8px;height:8px;border-radius:50%}
.cat-stat-info{display:flex;flex-direction:column}

/* Sort bar */
.sort-bar{display:flex;align-items:center;gap:4px;margin-bottom:12px}
.sort-label{font-size:8px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-right:4px}

.sort-btn:hover{color:rgba(255,255,255,0.4)}
/* Task rank number */

/* Reorder arrows */

<script>
// ═══════════════════════════════════════════
//  Firebase
// ═══════════════════════════════════════════
const DB_URL='https://gen-lang-client-0119642855-default-rtdb.firebaseio.com';
let db=null;
function initFB(){try{if(!firebase.apps.length)firebase.initializeApp({databaseURL:DB_URL});db=firebase.database();return true}catch(e){console.error('Firebase:',e);return false}}
function fbSet(p,d){if(db)return db.ref(p).set(d)}
function fbPush(p,d){if(db)return db.ref(p).push(d)}
function fbGet(p){if(db)return db.ref(p).once('value').then(s=>s.val());return Promise.resolve(null)}
function fbListen(p,cb){if(db)db.ref(p).on('value',s=>cb(s.val()))}

// ═══════════════════════════════════════════
//  State
// ═══════════════════════════════════════════
let tasks={},expanded=null,fStatus='all',fCat='all',newCat='work',newPri='medium',newDiff='medium',sortBy='manual';
// Difficulty point weights (used in dashboard + celebration intensity)
const DIFF_WEIGHTS={easy:1,medium:2,hard:4,epic:8};

function attachListeners(){
  fbListen('todo/tasks',val=>{tasks=val||{};renderTasks();if(currentView==='calendar')renderCalendar()});
}

// ═══════════════════════════════════════════
//  CRUD
// ═══════════════════════════════════════════
function setCat(c){
  newCat=c;
  document.querySelectorAll('.input-opts .ob[data-c]').forEach(b=>b.classList.toggle('s',b.dataset.c===c));
}
function setPri(p){
  newPri=p;
  document.querySelectorAll('.input-opts .ob[data-p]').forEach(b=>b.classList.toggle('s',b.dataset.p===p));
}
function setDiff(d){
  newDiff=d;
  document.querySelectorAll('.input-opts .ob[data-d]').forEach(b=>b.classList.toggle('s',b.dataset.d===d));
}
function updateDateBtn(){
  const el=document.getElementById('newDue');
  const wrap=document.getElementById('dateBtnWrap');
  const label=document.getElementById('dateBtnLabel');
  if(el.value){wrap.classList.add('has-date');label.textContent=el.value}
  else{wrap.classList.remove('has-date');label.textContent='Due date'}
}

function addTask(){
  const inp=document.getElementById('newTask');
  const t=inp.value.trim();if(!t)return;
  const notes=document.getElementById('newNotes').value.trim();
  fbPush('todo/tasks',{
    title:t,priority:newPri,category:newCat,difficulty:newDiff,progress:0,
    dueDate:document.getElementById('newDue').value||'',
    notes:notes,completed:false,completedAt:'',
    createdAt:new Date().toISOString(),order:Date.now()
  });
  inp.value='';document.getElementById('newDue').value='';document.getElementById('newNotes').value='';
  document.getElementById('dateBtnWrap').classList.remove('has-date');
  document.getElementById('dateBtnLabel').textContent='Due date';
}
function toggleDone(id){
  const t=tasks[id];if(!t)return;
  const wasDone=t.completed;
  // Find the card element BEFORE Firebase rerender clears it
  const card=document.querySelector(`.tc .ck[onclick*="'${id}'"]`)?.closest('.tc');
  fbSet(`todo/tasks/${id}/completed`,!wasDone);
  fbSet(`todo/tasks/${id}/completedAt`,!wasDone?new Date().toISOString():'');
  if(!wasDone){
    fbSet(`todo/tasks/${id}/progress`,100);
    if(card){
      card.classList.add('celebrating');
      feedSisyphus(card,t.difficulty||'medium');
      setTimeout(()=>card.classList.remove('celebrating'),900);
    }
    // Delay celebrate so the trail can complete first
    setTimeout(()=>celebrate(t.difficulty||'medium',t.title),650);
  }
}
function setProgress(id,val){
  const v=Math.max(0,Math.min(100,Math.round(parseFloat(val)||0)));
  fbSet(`todo/tasks/${id}/progress`,v);
  // Auto-mark complete at 100
  if(v>=100&&!tasks[id]?.completed){
    const t=tasks[id];
    const card=document.querySelector(`.tc .ck[onclick*="'${id}'"]`)?.closest('.tc');
    fbSet(`todo/tasks/${id}/completed`,true);
    fbSet(`todo/tasks/${id}/completedAt`,new Date().toISOString());
    if(card){
      card.classList.add('celebrating');
      feedSisyphus(card,t?.difficulty||'medium');
      setTimeout(()=>card.classList.remove('celebrating'),900);
    }
    setTimeout(()=>celebrate(t?.difficulty||'medium',t?.title),650);
  } else if(v<100&&tasks[id]?.completed){
    fbSet(`todo/tasks/${id}/completed`,false);
    fbSet(`todo/tasks/${id}/completedAt`,'');
  }
}
function updateTask(id,f,v){fbSet(`todo/tasks/${id}/${f}`,v)}
function deleteTask(id){fbSet(`todo/tasks/${id}`,null);if(expanded===id)expanded=null}
function toggleExpand(id){expanded=expanded===id?null:id;renderTasks()}

// ═══════════════════════════════════════════
//  Feeder trail — particles fly from task → Sisyphus
// ═══════════════════════════════════════════
function feedSisyphus(cardEl,difficulty){
  const sisCanvas=document.getElementById('sisCanvas');
  if(!sisCanvas||!cardEl)return;
  const card=cardEl.getBoundingClientRect();
  const sis=sisCanvas.getBoundingClientRect();
  const overlay=document.getElementById('celebOverlay');
  const canvas=document.getElementById('celebCanvas');
  const dpr=Math.min(window.devicePixelRatio,2);
  canvas.width=window.innerWidth*dpr;
  canvas.height=window.innerHeight*dpr;
  canvas.style.width=window.innerWidth+'px';
  canvas.style.height=window.innerHeight+'px';
  const ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);
  overlay.classList.add('show');

  const cs=getComputedStyle(document.body);
  const a1=cs.getPropertyValue('--accent1').trim()||'#8B5CF6';
  const a2=cs.getPropertyValue('--accent2').trim()||'#3B82F6';
  const a3=cs.getPropertyValue('--accent3').trim()||'#ec4899';
  const colors=[a1,a2,a3,a1,a2];

  const startX=card.left+card.width/2;
  const startY=card.top+card.height/2;
  const endX=sis.left+sis.width*0.5;
  const endY=sis.top+sis.height*0.7;
  const count={easy:8,medium:14,hard:22,epic:34}[difficulty]||14;
  const parts=[];
  for(let i=0;i<count;i++){
    parts.push({
      x:startX+(Math.random()-0.5)*card.width*0.6,
      y:startY+(Math.random()-0.5)*8,
      tx:endX+(Math.random()-0.5)*30,
      ty:endY+(Math.random()-0.5)*10,
      size:2+Math.random()*3,
      color:colors[Math.floor(Math.random()*colors.length)],
      life:1,
      delay:i*0.025,
      progress:0,
      curve:0.4+Math.random()*0.6,
    });
  }
  const start=Date.now();
  function frame(){
    const elapsed=(Date.now()-start)/1000;
    let alive=false;
    parts.forEach(p=>{
      if(elapsed<p.delay)return;
      p.progress=Math.min(1,(elapsed-p.delay)/0.7);
      if(p.progress<1)alive=true;
      // Bezier-ish arc
      const t=p.progress;
      const ease=1-Math.pow(1-t,3);
      const midX=(p.x+p.tx)/2;
      const midY=Math.min(p.y,p.ty)-60*p.curve;
      const x=(1-ease)*(1-ease)*p.x+2*(1-ease)*ease*midX+ease*ease*p.tx;
      const y=(1-ease)*(1-ease)*p.y+2*(1-ease)*ease*midY+ease*ease*p.ty;
      const fade=t<0.7?1:Math.max(0,1-(t-0.7)/0.3);
      ctx.globalAlpha=fade*0.85;
      ctx.shadowBlur=8;ctx.shadowColor=p.color;
      ctx.fillStyle=p.color;
      ctx.beginPath();ctx.arc(x,y,p.size*(1-t*0.3),0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0;
    });
    ctx.globalAlpha=1;
    if(alive){
      requestAnimationFrame(frame);
    }
    // Don't clear canvas here — celebrate() may also be running
  }
  // Start trail with a tiny delay so card celebrating class kicks in first
  setTimeout(frame,30);
}

// ═══════════════════════════════════════════
//  Celebration animation (scaled by difficulty)
// ═══════════════════════════════════════════
const CELEB_PRESETS={
  easy:{count:30,duration:1500,text:'Done',sub:'+ 1 PT',colors:['#4ade80','#22c55e','#a8a8b8']},
  medium:{count:80,duration:2000,text:'Nice!',sub:'+ 2 PTS',colors:['#fbbf24','#f59e0b','#8B5CF6','#3B82F6']},
  hard:{count:150,duration:2500,text:'Yes!',sub:'+ 4 PTS',colors:['#f97316','#ec4899','#8B5CF6','#3B82F6','#fbbf24']},
  epic:{count:280,duration:3200,text:'LEGENDARY',sub:'+ 8 PTS · YOU ARE HIM',colors:['#ec4899','#f97316','#fbbf24','#34d399','#3B82F6','#8B5CF6','#f472b6']},
};
function celebrate(difficulty,title){
  const cfg=CELEB_PRESETS[difficulty]||CELEB_PRESETS.medium;
  const overlay=document.getElementById('celebOverlay');
  const txt=document.getElementById('celebText');
  txt.innerHTML=cfg.text+'<span class="celeb-sub">'+cfg.sub+'</span>';
  // Restart animation
  txt.style.animation='none';
  void txt.offsetWidth;
  txt.style.animation='';
  overlay.classList.add('show');

  const canvas=document.getElementById('celebCanvas');
  const dpr=Math.min(window.devicePixelRatio,2);
  canvas.width=window.innerWidth*dpr;
  canvas.height=window.innerHeight*dpr;
  canvas.style.width=window.innerWidth+'px';
  canvas.style.height=window.innerHeight+'px';
  const ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);
  const W=window.innerWidth,H=window.innerHeight;

  // Confetti particles
  const parts=[];
  for(let i=0;i<cfg.count;i++){
    const angle=(Math.random()-0.5)*Math.PI*0.7-Math.PI/2;
    const speed=(difficulty==='epic'?12:difficulty==='hard'?9:difficulty==='medium'?6:4)+Math.random()*6;
    parts.push({
      x:W/2+(Math.random()-0.5)*100,
      y:H/2,
      vx:Math.cos(angle)*speed*(Math.random()*2-1),
      vy:Math.sin(angle)*speed-Math.random()*4,
      gravity:0.18+Math.random()*0.1,
      size:3+Math.random()*5,
      color:cfg.colors[Math.floor(Math.random()*cfg.colors.length)],
      rot:Math.random()*Math.PI*2,
      vrot:(Math.random()-0.5)*0.4,
      shape:Math.random()<0.4?'rect':'circle',
      life:1
    });
  }

  // Radial burst rings (epic only)
  const rings=[];
  if(difficulty==='hard'||difficulty==='epic'){
    const ringCount=difficulty==='epic'?5:2;
    for(let i=0;i<ringCount;i++) rings.push({r:0,maxR:Math.max(W,H)*0.6,color:cfg.colors[i%cfg.colors.length],delay:i*120,life:1});
  }

  const start=Date.now();
  function frame(){
    const elapsed=Date.now()-start;
    ctx.clearRect(0,0,W,H);
    // Rings
    rings.forEach(ring=>{
      if(elapsed<ring.delay)return;
      const t=(elapsed-ring.delay)/1200;
      if(t>1)return;
      ring.r=ring.maxR*t;
      ring.life=1-t;
      ctx.strokeStyle=ring.color+Math.round(ring.life*120).toString(16).padStart(2,'0');
      ctx.lineWidth=3*(1-t*0.5);
      ctx.beginPath();ctx.arc(W/2,H/2,ring.r,0,Math.PI*2);ctx.stroke();
    });
    // Confetti
    let alive=false;
    parts.forEach(p=>{
      if(p.life<=0)return;
      p.x+=p.vx;p.y+=p.vy;p.vy+=p.gravity;p.rot+=p.vrot;p.life-=0.008;
      if(p.life>0&&p.y<H+20)alive=true;
      ctx.save();
      ctx.translate(p.x,p.y);
      ctx.rotate(p.rot);
      ctx.globalAlpha=Math.max(0,p.life);
      ctx.fillStyle=p.color;
      if(p.shape==='rect'){
        ctx.fillRect(-p.size,-p.size*0.6,p.size*2,p.size*1.2);
      } else {
        ctx.beginPath();ctx.arc(0,0,p.size,0,Math.PI*2);ctx.fill();
      }
      ctx.restore();
    });
    ctx.globalAlpha=1;

    if(elapsed<cfg.duration||alive){
      requestAnimationFrame(frame);
    } else {
      overlay.classList.remove('show');
      ctx.clearRect(0,0,W,H);
    }
  }
  frame();
}

function renderDash(){
  const el=document.getElementById('dash');
  const entries=Object.values(tasks);
  const total=entries.length;
  const today=new Date().toISOString().slice(0,10);
  const overdue=entries.filter(t=>!t.completed&&t.dueDate&&t.dueDate<today).length;
  const high=entries.filter(t=>!t.completed&&t.priority==='high').length;

  // Difficulty-weighted points (sums task weights × completion %)
  let totalPts=0,donePts=0,activePts=0;
  entries.forEach(t=>{
    const w=DIFF_WEIGHTS[t.difficulty||'medium'];
    const pct=t.completed?100:(parseFloat(t.progress)||0);
    totalPts+=w;
    donePts+=w*(pct/100);
    if(!t.completed)activePts+=w*(1-pct/100);
  });
  const pctPts=totalPts?Math.round(donePts/totalPts*100):0;
  const activeRoundedPts=Math.round(activePts*10)/10;
  const donePtsRounded=Math.round(donePts*10)/10;

  el.innerHTML=`

      <div class="dash-val purple">${activeRoundedPts}</div>
      <div class="dash-label">Active Pts</div>
      <div class="dash-bar"><div class="dash-bar-fill" style="width:${totalPts?activePts/totalPts*100:0}%;background:var(--purple)"></div></div>
    </div>
    <div class="dash-card">
      <div class="dash-val green">${pctPts}%</div>
      <div class="dash-label">${donePtsRounded}/${totalPts} pts</div>
      <div class="dash-bar"><div class="dash-bar-fill" style="width:${pctPts}%;background:#34d399"></div></div>
    </div>
    <div class="dash-card">
      <div class="dash-val pink">${overdue}</div>
      <div class="dash-label">Overdue</div>
      <div class="dash-bar"><div class="dash-bar-fill" style="width:${total?overdue/total*100:0}%;background:var(--pink)"></div></div>
    </div>
    <div class="dash-card">
      <div class="dash-val blue">${high}</div>
      <div class="dash-label">High Pri</div>
      <div class="dash-bar"><div class="dash-bar-fill" style="width:${total?high/total*100:0}%;background:var(--blue)"></div></div>
    </div>`;
}
function calcStreak(){
  const completed=Object.values(tasks).filter(t=>t.completedAt).map(t=>t.completedAt.slice(0,10));
  if(!completed.length)return 0;
  const unique=[...new Set(completed)].sort().reverse();
  let streak=0;const d=new Date();
  for(let i=0;i<unique.length;i++){
    const check=new Date(d);check.setDate(check.getDate()-i);
    if(unique.includes(check.toISOString().slice(0,10)))streak++;else break;
  }
  return streak;
}

function renderFilters(){
  const el=document.getElementById('filters');
  let total=0,active=0,done=0;
  Object.values(tasks).forEach(t=>{total++;t.completed?done++:active++});
  el.innerHTML=['all','active','completed'].map(f=>
    `<button class="fp ${fStatus===f?'a':''}" onclick="fStatus='${f}';renderTasks()">${f}${f==='all'?' '+total:f==='active'?' '+active:' '+done}</button>`
  ).join('')+'&nbsp;'+['all','work','personal','project'].map(c=>
    `<button class="fp ${fCat===c?'a':''}" onclick="fCat='${c}';renderTasks()">${c==='all'?'all':c}</button>`
  ).join('');
}

function renderSortBar(){
  const el=document.getElementById('sortBar');
  const sorts=[['manual','Manual'],['priority','Priority'],['due','Due Date'],['category','Category'],['newest','Newest'],['oldest','Oldest']];
  el.innerHTML='<span class="sort-label">Sort</span>'+sorts.map(([k,l])=>
    `<button class="sort-btn ${sortBy===k?'a':''}" onclick="sortBy='${k}';renderTasks()">${l}</button>`
  ).join('');
}

function sortTasks(fl){
  const priVal={high:0,medium:1,low:2};
  switch(sortBy){
    case 'priority': fl.sort((a,b)=>(priVal[a[1].priority]||1)-(priVal[b[1].priority]||1)); break;
    case 'due': fl.sort((a,b)=>{const ad=a[1].dueDate||'9',bd=b[1].dueDate||'9';return ad.localeCompare(bd)}); break;
    case 'category': fl.sort((a,b)=>(a[1].category||'').localeCompare(b[1].category||'')); break;
    case 'newest': fl.sort((a,b)=>(b[1].order||0)-(a[1].order||0)); break;
    case 'oldest': fl.sort((a,b)=>(a[1].order||0)-(b[1].order||0)); break;
    default: fl.sort((a,b)=>(a[1].order||0)-(b[1].order||0)); // manual = by order field
  }
  // Always push completed to bottom
  fl.sort((a,b)=>{if(a[1].completed!==b[1].completed)return a[1].completed?1:-1;return 0});
  return fl;
}

function moveTask(id,dir){
  const fl=Object.entries(tasks).filter(([,t])=>!t.completed).sort((a,b)=>(a[1].order||0)-(b[1].order||0));
  const idx=fl.findIndex(([tid])=>tid===id);
  if(idx<0)return;
  const swapIdx=idx+dir;
  if(swapIdx<0||swapIdx>=fl.length)return;
  const myOrder=fl[idx][1].order||0;
  const theirOrder=fl[swapIdx][1].order||0;
  fbSet(`todo/tasks/${fl[idx][0]}/order`,theirOrder);
  fbSet(`todo/tasks/${fl[swapIdx][0]}/order`,myOrder);
}

function renderStatRow(){
  const el=document.getElementById('statRow');
  const all=Object.values(tasks);
  const done=all.filter(t=>t.completed);
  const today=new Date().toISOString().slice(0,10);

  // Deadline stats: completed tasks that had a due date
  const withDue=done.filter(t=>t.dueDate&&t.completedAt);
  let early=0,onTime=0,late=0;
  withDue.forEach(t=>{
    const comp=t.completedAt.slice(0,10);
    if(comp<t.dueDate)early++;
    else if(comp===t.dueDate)onTime++;
    else late++;
  });
  const totalDue=withDue.length;
  const beatPct=totalDue?Math.round((early+onTime)/totalDue*100):0;

  // Streak
  const streak=calcStreak();

  // Average completion time (days from created to completed)
  let avgDays=0;
  if(done.length){
    const total=done.reduce((s,t)=>{
      if(!t.createdAt||!t.completedAt)return s;
      return s+Math.max(0,(new Date(t.completedAt)-new Date(t.createdAt))/86400000);
    },0);
    avgDays=Math.round(total/done.length*10)/10;
  }

  // Themed emojis
  const curTheme=localStorage.getItem('oyt_theme')||'';
  const te=(THEMES[curTheme]||THEMES['']).stats;

  let verdict='',emoji='';
  if(beatPct>=90){verdict='YOU ARE HIM';emoji=te.him}
  else if(beatPct>=70){verdict='LOCKED IN';emoji=te.locked}
  else if(beatPct>=50){verdict='SOLID';emoji=te.solid}
  else if(totalDue>0){verdict='WORK HARDER';emoji=te.grind}
  else{verdict='NO DATA YET';emoji=te.nodata}

  el.innerHTML=`
    <div class="stat-chip">
      <span class="stat-emoji">${emoji}</span>
      <div class="stat-info"><span class="stat-val">${verdict}</span><span class="stat-desc">${beatPct}% deadlines met</span></div>
    </div>
    <div class="stat-chip">
      <span class="stat-emoji">${streak>=3?te.streak:streak>=1?te.streak:'💤'}</span>
      <div class="stat-info"><span class="stat-val">${streak} day${streak!==1?'s':''}</span><span class="stat-desc">Completion streak</span></div>
    </div>
    <div class="stat-chip">
      <span class="stat-emoji">${early>=late?te.early:te.late}</span>
      <div class="stat-info"><span class="stat-val">${early} early / ${late} late</span><span class="stat-desc">${onTime} on time</span></div>
    </div>
    <div class="stat-chip">
      <span class="stat-emoji">${te.time}</span>
      <div class="stat-info"><span class="stat-val">${avgDays}d avg</span><span class="stat-desc">Time to complete</span></div>
    </div>`;
}

let sisAnim=null;
function initSisyphus(){
  const canvas=document.getElementById('sisCanvas');
  if(!canvas)return;
  const dpr=Math.min(window.devicePixelRatio,2);
  const W=canvas.parentElement.clientWidth;
  canvas.width=W*dpr;canvas.height=88*dpr;
  canvas.style.width=W+'px';canvas.style.height='88px';

  let boulderAngle=0;
  let mascotBob=0;

  function draw(){
    const ctx=canvas.getContext('2d');
    const w=canvas.width,h=canvas.height;
    ctx.clearRect(0,0,w,h);
    ctx.save();
    ctx.scale(dpr,dpr);
    const cw=W,ch=88;

    // Theme colors from CSS variables — read EARLY so we can use them throughout
    const cs=getComputedStyle(document.body);
    const a1=cs.getPropertyValue('--accent1').trim()||'#8B5CF6';
    const a2=cs.getPropertyValue('--accent2').trim()||'#3B82F6';
    const a3=cs.getPropertyValue('--accent3').trim()||'#ec4899';
    const isLight=cs.getPropertyValue('--is-light').trim()==='1';
    // In light mode, use dark ink for hill/text/dust; in dark mode use white
    const ink=isLight?'rgba(40,30,70,':'rgba(255,255,255,';
    const inkLite=isLight?'rgba(80,60,120,':'rgba(255,255,255,';

    const all=Object.values(tasks);
    const total=all.length;
    const done=all.filter(t=>t.completed).length;
    // Weighted progress: harder tasks contribute more
    let totalPts=0,donePts=0;
    all.forEach(t=>{
      const w=DIFF_WEIGHTS[t.difficulty||'medium'];
      const p=t.completed?100:(parseFloat(t.progress)||0);
      totalPts+=w;
      donePts+=w*(p/100);
    });
    const pct=totalPts?donePts/totalPts:0;
    const allDone=totalPts>0&&pct>=1;

    // Get mascot
    const curTheme=localStorage.getItem('oyt_theme')||'';
    const mascot=(THEMES[curTheme]||THEMES['']).mascot;

    const time=Date.now()*.001;

    // ── Hill ──
    const hillStartX=30;
    const hillEndX=cw-40;
    const hillBottomY=ch-16;
    const hillTopY=24;
    const hillLen=hillEndX-hillStartX;

    // Slope — single clean line
    ctx.strokeStyle=ink+(isLight?'0.4)':'0.28)');
    ctx.lineWidth=2;
    ctx.lineCap='round';
    ctx.beginPath();
    ctx.moveTo(hillStartX,hillBottomY);
    ctx.lineTo(hillEndX,hillTopY);
    ctx.stroke();

    // Summit flag at top — only one flag
    const flagX=hillEndX;
    const flagY=hillTopY;
    ctx.strokeStyle=allDone?a1:ink+(isLight?'0.35)':'0.2)');
    ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(flagX,flagY);ctx.lineTo(flagX,flagY-16);ctx.stroke();
    // Flag pennant
    ctx.fillStyle=allDone?a1:ink+(isLight?'0.4)':'0.25)');
    if(allDone){ctx.shadowBlur=12;ctx.shadowColor=a1}
    ctx.beginPath();ctx.moveTo(flagX,flagY-16);ctx.lineTo(flagX+10,flagY-13);ctx.lineTo(flagX,flagY-10);ctx.closePath();ctx.fill();
    ctx.shadowBlur=0;

    // ── Boulder + Mascot positions ──
    // Add some left padding so boulder starts visible at 0%
    const startOffset=20;
    const usableLen=hillLen-startOffset;
    const bx2=hillStartX+startOffset+pct*usableLen;
    const by2=hillBottomY-(startOffset+pct*usableLen)*((hillBottomY-hillTopY)/hillLen);

    // ── Boulder — actually looks like a stone ──
    boulderAngle+=allDone?0:0.05;
    const boulderR=11;
    ctx.save();
    ctx.translate(bx2+18,by2-boulderR-2);
    ctx.rotate(boulderAngle);
    // Soft shadow under boulder
    ctx.fillStyle='rgba(0,0,0,0.25)';
    ctx.beginPath();ctx.ellipse(0,boulderR+2,boulderR*0.9,2.5,0,0,Math.PI*2);ctx.fill();
    // Stone body — radial from light gray to dark gray (subtle accent tint)
    const stoneCol=isLight?['#9b95ae','#6b6582','#4a4560']:['#6c6680','#4a4458','#2a2535'];
    const bg=ctx.createRadialGradient(-3,-3,1,0,0,boulderR);
    bg.addColorStop(0,stoneCol[0]);
    bg.addColorStop(0.55,stoneCol[1]);
    bg.addColorStop(1,stoneCol[2]);
    ctx.fillStyle=bg;
    ctx.beginPath();ctx.arc(0,0,boulderR,0,Math.PI*2);ctx.fill();
    // Single highlight to read as 3D
    ctx.fillStyle='rgba(255,255,255,0.18)';
    ctx.beginPath();ctx.arc(-3,-4,2,0,Math.PI*2);ctx.fill();
    ctx.restore();

    // ── Mascot ──
    mascotBob+=allDone?0.05:0.15;
    const mBob=Math.sin(mascotBob)*(allDone?1.5:2.5);
    const mLean=allDone?0:6;
    ctx.save();
    ctx.translate(bx2-2,by2-6+mBob);
    ctx.rotate(mLean*Math.PI/180);
    // Soft shadow
    ctx.fillStyle='rgba(0,0,0,0.2)';
    ctx.beginPath();ctx.ellipse(0,15,9,3,0,0,Math.PI*2);ctx.fill();
    // Character
    ctx.font='24px -apple-system,sans-serif';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText(mascot,0,0);
    ctx.restore();

    // Creative progress label — changes with completion
    const msgs={
      0:['THE BOULDER AWAITS','EVERY EMPIRE STARTS WITH ONE STEP','GREATNESS IS A DECISION','TIME TO COOK','THE GRIND BEGINS'],
      10:['BARELY MOVING','WARMING UP','ONE STEP AT A TIME','BABY STEPS','THE JOURNEY IS LONG'],
      25:['QUARTER WAY THERE','BUILDING MOMENTUM','PICKING UP STEAM','THE BOULDER LEARNS YOUR NAME','GRINDING'],
      40:['HALFWAY-ISH','THE MIDDLE IS THE HARDEST','PUSH PUSH PUSH','SWEAT EQUITY','LOCKED IN'],
      50:['HALFWAY UP THE MOUNTAIN','THE PEAK IS IN SIGHT','FINDING THE RHYTHM','UNSTOPPABLE','MIDPOINT MOMENTUM'],
      65:['MORE THAN HALF DONE','ALMOST OVER THE HILL','CLOSING IN','THE END IS NIGH','GETTING TASTY'],
      80:['HOME STRETCH','SO CLOSE','SUMMIT VISIBLE','ONE LAST PUSH','VICTORY APPROACHES'],
      90:['ALMOST THERE','FINAL ASCENT','SO. CLOSE.','LITERALLY ONE INCH LEFT','HE IS HIM'],
      100:['ALL TASKS DONE — YOU ARE HIM','THE BOULDER RESTS','LEGEND','MOUNTAIN CONQUERED','ABSOLUTE UNIT']
    };
    const buckets=[100,90,80,65,50,40,25,10,0];
    const bucket=buckets.find(b=>pct*100>=b)??0;
    const arr=msgs[bucket];
    // Stable per-render-cycle pick (changes every ~3s)
    const idx=Math.floor(Date.now()/3000)%arr.length;
    ctx.fillStyle=a1+'ee';
    ctx.font='700 9px -apple-system,sans-serif';
    ctx.textAlign='left';
    ctx.fillText(arr[idx],10,ch-5);
    // Percentage on the right
    ctx.fillStyle=a1+'bb';
    ctx.font='700 9px -apple-system,sans-serif';
    ctx.textAlign='right';
    ctx.fillText(Math.round(pct*100)+'% / '+done+' of '+total,cw-10,ch-5);

    ctx.restore();
    sisAnim=requestAnimationFrame(draw);
  }
  if(sisAnim)cancelAnimationFrame(sisAnim);
  draw();
}

          <span style="font-size:11px;font-weight:700;color:var(--accent1);min-width:36px;text-align:right">${prog}%</span>
        </div>
      </div>`}
    h+=`</div>
      ${!t.completed&&sortBy==='manual'?`<div class="reorder">
        <button class="ro-btn" onclick="moveTask('${id}',-1)">&#9650;</button>
        <button class="ro-btn" onclick="moveTask('${id}',1)">&#9660;</button>

        <button class="tab del" onclick="deleteTask('${id}')">&times;</button>
      </div>
    </div>`;return h}).join('');
  const total=entries.length,done=entries.filter(([,t])=>t.completed).length;
  stats.textContent=done+' of '+total+' completed';
}

async function sendAlfred(){
  const inp=document.getElementById('alfIn');const msg=inp.value.trim();
  if(!msg||alfStreaming)return;inp.value='';
  const key=await getKey();if(!key)return;
  alfStreaming=true;
  appendMsg('u',msg);alfHistory.push({role:'user',content:msg});flashAlfBrain();
  const el=appendMsg('ai','');el.classList.add('str');
  try{
    const res=await fetch(ALF_URL,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
      body:JSON.stringify({model:'MiniMax-M2.7',system:buildSys(),messages:alfHistory.slice(-12).filter(m=>m.role!=='system'),stream:true,max_tokens:1200})});
    if(!res.ok)throw new Error((await res.text()).slice(0,200));
    const reader=res.body.getReader(),decoder=new TextDecoder();let full='',buf='';
    while(true){const{done,value}=await reader.read();if(done)break;buf+=decoder.decode(value,{stream:true});const lines=buf.split('\n');buf=lines.pop()||'';
      for(const line of lines){if(!line.startsWith('data:'))continue;const d=line.slice(5).trim();if(!d)continue;
        try{const e=JSON.parse(d);if(e.type==='content_block_delta'&&e.delta?.type==='text_delta'&&e.delta?.text){full+=e.delta.text;el.textContent=full.replace(/```(?:task|done|edit|sheet)\s*\n[\s\S]*?\n```/g,'');scrollAlf()}}catch{}}}
    el.classList.remove('str');alfHistory.push({role:'assistant',content:full});
    const tm=full.match(/```task\s*\n?([\s\S]*?)\n?```/);
    if(tm){try{const c=JSON.parse(tm[1]);fbPush('todo/tasks',{title:c.title||'',priority:c.priority||'medium',category:c.category||'personal',difficulty:c.difficulty||'medium',progress:0,dueDate:c.dueDate||'',notes:c.notes||'',completed:false,completedAt:'',createdAt:new Date().toISOString(),order:Date.now()})}catch{}}
    const dm=full.match(/```done\s*\n?([\s\S]*?)\n?```/);
    if(dm){try{const c=JSON.parse(dm[1]);if(c.taskId){fbSet(`todo/tasks/${c.taskId}/completed`,true);fbSet(`todo/tasks/${c.taskId}/completedAt`,new Date().toISOString())}}catch{}}
    const em=full.match(/```edit\s*\n?([\s\S]*?)\n?```/);
    if(em){try{const c=JSON.parse(em[1]);if(c.taskId&&c.field)updateTask(c.taskId,c.field,c.value)}catch{}}
    const sm=full.match(/```sheet\s*\n?([\s\S]*?)\n?```/);
    if(sm){try{const c=JSON.parse(sm[1]);if(c.sheetId&&c.row)writeSheet(c.sheetId,c.tab||'Sheet1',c.row)}catch{}}
    el.textContent=full.replace(/```(?:task|done|edit|sheet)\s*\n[\s\S]*?\n```/g,'').trim();
  }catch(e){el.classList.remove('str');el.textContent='Error: '+e.message}
  alfStreaming=false;
}

// Alfred brain — clean minimal orbiting dots
function initAlfBrain(){
  alfBrainInit=true;const canvas=document.getElementById('alfBrain');
  const W=canvas.parentElement.clientWidth*2,H=canvas.parentElement.clientHeight*2;
  canvas.width=W;canvas.height=H;canvas.style.width=canvas.parentElement.clientWidth+'px';canvas.style.height=canvas.parentElement.clientHeight+'px';
  // 3 concentric rings of dots
  const colors=['#8B5CF6','#3B82F6','#ec4899'];
  [{n:5,r:14,sp:.003,sz:1.8},{n:4,r:26,sp:-.002,sz:1.4},{n:3,r:36,sp:.0015,sz:1}].forEach((ring,ri)=>{
    for(let i=0;i<ring.n;i++) alfNodes.push({angle:(i/ring.n)*Math.PI*2,r:ring.r,speed:ring.sp,size:ring.sz,color:colors[ri],glow:0});
  });
  alfBrainLoop();
}
function alfBrainLoop(){
  const c=document.getElementById('alfBrain');if(!c)return;
  const ctx=c.getContext('2d'),W=c.width,H=c.height,cx=W/2,cy=H/2;
  ctx.clearRect(0,0,W,H);
  // Subtle ring outlines
  [14,26,36].forEach(r=>{ctx.strokeStyle='rgba(139,92,246,0.04)';ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.stroke()});
  // Connections (only between adjacent rings)
  ctx.lineWidth=0.5;
  for(let i=0;i<alfNodes.length;i++){const a=alfNodes[i];a.angle+=a.speed;
    const ax=cx+Math.cos(a.angle)*a.r,ay=cy+Math.sin(a.angle)*a.r;
    for(let j=i+1;j<alfNodes.length;j++){const b=alfNodes[j];
      if(Math.abs(a.r-b.r)<15)continue; // skip same ring
      const bx=cx+Math.cos(b.angle)*b.r,by=cy+Math.sin(b.angle)*b.r;
      const d=Math.hypot(ax-bx,ay-by);
      if(d<30){ctx.strokeStyle='rgba(139,92,246,'+((1-d/30)*.08).toFixed(3)+')';ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(bx,by);ctx.stroke()}}
    // Dot
    const alpha=a.glow>0?1:.5;
    if(a.glow>0){a.glow-=.008;ctx.shadowBlur=10;ctx.shadowColor=a.color}else{ctx.shadowBlur=0}
    ctx.fillStyle=a.color;ctx.globalAlpha=alpha;
    ctx.beginPath();ctx.arc(ax,ay,a.size,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;ctx.shadowBlur=0;
  }
  // Center dot
  ctx.fillStyle='var(--card-hover)';ctx.beginPath();ctx.arc(cx,cy,3,0,Math.PI*2);ctx.fill();
  requestAnimationFrame(alfBrainLoop);
}
function flashAlfBrain(){alfNodes.forEach(n=>{n.glow=1;n.speed=n.speed>0?n.speed*4:-n.speed*4});setTimeout(()=>alfNodes.forEach((n,i)=>{const ring=i<5?0:i<9?1:2;n.speed=[.003,-.002,.0015][ring]}),2000)}

function renderCalendar(){
