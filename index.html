<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenYap Todo</title>
<meta name="theme-color" content="#000000">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>%E2%9C%93</text></svg>">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
/* ── Variables ── */
:root {
  --bg: #000000;
  --card: rgba(6,6,14,0.82);
  --card-solid: #0a0a14;
  --blue: #3B82F6;
  --green: #34D399;
  --purple: #8B5CF6;
  --red: #ef4444;
  --yellow: #eab308;
  --text: #FFFFFF;
  --text-body: #b0b0b0;
  --text-muted: #555555;
  --border: rgba(255,255,255,0.06);
  --border-blue: rgba(59,130,246,0.08);
  --radius: 16px;
  --ease: cubic-bezier(0.16, 1, 0.3, 1);
  --shadow: 0 16px 48px rgba(0,0,0,0.4);
}

/* ── Reset & Base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text-body);
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  transition: margin-right 0.3s var(--ease);
}
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: radial-gradient(circle, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 32px 32px;
  pointer-events: none;
  z-index: 0;
}
::selection { background: rgba(59,130,246,0.3); }
input, select, textarea, button { font-family: inherit; }
a { color: var(--blue); text-decoration: none; }

/* ── Aurora Background ── */
.aurora {
  position: fixed;
  inset: -20%;
  pointer-events: none;
  z-index: 0;
  background:
    radial-gradient(ellipse 600px 400px at 20% 50%, rgba(59,130,246,0.07) 0%, transparent 70%),
    radial-gradient(ellipse 500px 300px at 80% 30%, rgba(52,211,153,0.04) 0%, transparent 70%),
    radial-gradient(ellipse 400px 600px at 60% 80%, rgba(139,92,246,0.05) 0%, transparent 70%);
  animation: aurora 15s ease-in-out infinite alternate;
}
@keyframes aurora {
  0% { transform: translate(0,0) scale(1); }
  50% { transform: translate(-30px,20px) scale(1.05) rotate(2deg); }
  100% { transform: translate(20px,-10px) scale(0.98) rotate(-1deg); }
}

/* ── Tab Bar ── */
.tab-bar {
  position: sticky;
  top: 0;
  z-index: 50;
  background: rgba(6,8,16,0.85);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border-bottom: 1px solid var(--border);
}
.tab-bar-inner {
  max-width: 1000px;
  margin: 0 auto;
  padding: 0 20px;
  height: 52px;
  display: flex;
  align-items: center;
  gap: 16px;
}
.app-title {
  font-weight: 300;
  font-size: 11px;
  letter-spacing: 0.25em;
  color: rgba(140,170,210,0.3);
  text-transform: uppercase;
  flex-shrink: 0;
}
.tabs { display: flex; gap: 4px; }
.tab-btn {
  padding: 6px 16px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  border: none;
  cursor: pointer;
  transition: all 0.2s var(--ease);
  background: transparent;
  color: rgba(255,255,255,0.35);
}
.tab-btn:hover { color: rgba(255,255,255,0.6); }
.tab-btn.active { background: rgba(255,255,255,0.08); color: #fff; }
.tab-actions { margin-left: auto; display: flex; align-items: center; gap: 8px; }
.icon-btn {
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  color: rgba(255,255,255,0.3);
  padding: 4px 10px;
  border-radius: 8px;
  font-size: 10px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.icon-btn:hover { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.6); }

/* ── Views ── */
.view { display: none; position: relative; z-index: 1; }
.view.active { display: block; }

/* ── Tasks View ── */
.tasks-container {
  max-width: 700px;
  margin: 0 auto;
  padding: 24px 20px 80px;
}
.task-input-card {
  background: var(--card);
  backdrop-filter: blur(12px);
  border: 1px solid var(--border-blue);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 20px;
  transition: border-color 0.3s;
}
.task-input-card:focus-within { border-color: rgba(59,130,246,0.2); }
.task-input-card input[type="text"] {
  width: 100%;
  background: transparent;
  border: none;
  font-size: 15px;
  color: #fff;
  outline: none;
  margin-bottom: 12px;
}
.task-input-card input[type="text"]::placeholder { color: var(--text-muted); }
.task-input-options {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.opt-group { display: flex; gap: 3px; }
.opt-group-label { font-size: 9px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-right: 2px; align-self: center; }
.opt-btn {
  padding: 4px 10px; border-radius: 12px; font-size: 10px; font-weight: 600;
  border: 1px solid var(--border); background: transparent;
  color: rgba(255,255,255,0.3); cursor: pointer; transition: all 0.15s;
}
.opt-btn:hover { color: rgba(255,255,255,0.5); border-color: rgba(255,255,255,0.12); }
.opt-btn.sel { color: #fff; }
.opt-btn.sel.cat-work { background: rgba(59,130,246,0.15); border-color: rgba(59,130,246,0.3); color: var(--blue); }
.opt-btn.sel.cat-personal { background: rgba(139,92,246,0.15); border-color: rgba(139,92,246,0.3); color: var(--purple); }
.opt-btn.sel.cat-project { background: rgba(52,211,153,0.15); border-color: rgba(52,211,153,0.3); color: var(--green); }
.opt-btn.sel.pri-high { background: rgba(239,68,68,0.12); border-color: rgba(239,68,68,0.25); color: var(--red); }
.opt-btn.sel.pri-medium { background: rgba(234,179,8,0.12); border-color: rgba(234,179,8,0.25); color: var(--yellow); }
.opt-btn.sel.pri-low { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.12); color: var(--text-muted); }
.task-add-btn {
  padding: 6px 20px; border-radius: 12px; margin-left: auto;
  background: rgba(59,130,246,0.12); color: var(--blue);
  border: 1px solid rgba(59,130,246,0.2);
  font-weight: 700; font-size: 12px; cursor: pointer;
  transition: all 0.2s var(--ease);
}
.task-add-btn:hover { background: rgba(59,130,246,0.2); transform: translateY(-1px); }
.task-due-input {
  background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 8px;
  padding: 4px 8px; font-size: 10px; color: var(--text-body); outline: none;
}

.task-filters {
  display: flex;
  gap: 6px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.filter-pill {
  padding: 5px 14px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  border: 1px solid var(--border);
  background: transparent;
  color: rgba(255,255,255,0.3);
  cursor: pointer;
  transition: all 0.2s;
}
.filter-pill:hover { color: rgba(255,255,255,0.5); border-color: rgba(255,255,255,0.12); }
.filter-pill.active { background: rgba(255,255,255,0.08); color: #fff; border-color: rgba(255,255,255,0.15); }

.task-list { display: flex; flex-direction: column; gap: 6px; }

.task-card {
  background: var(--card);
  backdrop-filter: blur(12px);
  border: 1px solid var(--border-blue);
  border-radius: 14px;
  padding: 14px 16px;
  display: flex;
  align-items: flex-start;
  gap: 12px;
  transition: all 0.3s var(--ease);
  cursor: default;
  animation: taskIn 0.35s var(--ease) both;
}
.task-card:hover { border-color: rgba(59,130,246,0.15); box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
.task-card.completed { opacity: 0.4; }
.task-card.completed .task-title { text-decoration: line-through; color: var(--text-muted); }
@keyframes taskIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

.task-check {
  width: 20px; height: 20px; border-radius: 50%; flex-shrink: 0; margin-top: 2px;
  border: 2px solid rgba(255,255,255,0.15); background: transparent; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s var(--ease);
  color: transparent; font-size: 11px;
}
.task-check:hover { border-color: var(--green); }
.task-card.completed .task-check {
  border-color: var(--green); background: var(--green); color: #000;
}
.task-body { flex: 1; min-width: 0; }
.task-title { font-size: 14px; font-weight: 500; color: #fff; line-height: 1.4; }
.task-meta { display: flex; gap: 6px; margin-top: 4px; flex-wrap: wrap; align-items: center; }
.priority-dot {
  width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
}
.priority-dot.high { background: var(--red); box-shadow: 0 0 6px rgba(239,68,68,0.4); }
.priority-dot.medium { background: var(--yellow); }
.priority-dot.low { background: var(--text-muted); }
.cat-pill {
  font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
  padding: 2px 8px; border-radius: 10px;
}
.cat-pill.work { background: rgba(59,130,246,0.12); color: rgba(59,130,246,0.7); }
.cat-pill.personal { background: rgba(139,92,246,0.12); color: rgba(139,92,246,0.7); }
.cat-pill.project { background: rgba(52,211,153,0.12); color: rgba(52,211,153,0.7); }
.due-label { font-size: 10px; color: var(--text-muted); }
.due-label.overdue { color: var(--red); }
.task-actions {
  display: flex; gap: 4px; flex-shrink: 0; opacity: 0; transition: opacity 0.2s;
}
.task-card:hover .task-actions { opacity: 1; }
.task-action-btn {
  width: 28px; height: 28px; border-radius: 8px; border: none;
  background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.3);
  cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.task-action-btn:hover { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.6); }
.task-action-btn.delete:hover { background: rgba(239,68,68,0.1); color: var(--red); }

/* Expanded task edit */
.task-expand {
  margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border);
  display: flex; flex-direction: column; gap: 8px;
}
.task-expand textarea {
  width: 100%; background: rgba(255,255,255,0.02); border: 1px solid var(--border);
  border-radius: 10px; padding: 10px 12px; color: var(--text-body); font-size: 12px;
  resize: vertical; min-height: 60px; outline: none;
}
.task-expand textarea:focus { border-color: rgba(59,130,246,0.2); }
.task-expand-row { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.task-expand-row select, .task-expand-row input[type="date"] {
  background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 8px;
  padding: 6px 10px; font-size: 11px; color: var(--text-body); outline: none;
}

.task-stats {
  margin-top: 24px; text-align: center; font-size: 11px; color: var(--text-muted);
  letter-spacing: 0.5px;
}

/* ── Vault View ── */
.vault-layout {
  display: flex;
  height: calc(100vh - 52px);
}
.vault-sidebar {
  width: 280px;
  flex-shrink: 0;
  border-right: 1px solid var(--border);
  overflow-y: auto;
  background: rgba(4,6,12,0.6);
  scrollbar-width: thin;
}
.vault-search {
  padding: 12px;
  border-bottom: 1px solid var(--border);
}
.vault-search input {
  width: 100%;
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 8px 12px;
  font-size: 12px;
  color: #fff;
  outline: none;
}
.vault-search input:focus { border-color: rgba(59,130,246,0.2); }
.vault-folder-header {
  padding: 8px 14px;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-muted);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: color 0.2s;
}
.vault-folder-header:hover { color: var(--text-body); }
.vault-folder-header .folder-dot {
  width: 6px; height: 6px; border-radius: 50%;
}
.vault-folder-header .folder-count {
  margin-left: auto; font-size: 9px; color: rgba(255,255,255,0.15);
}
.vault-note-item {
  padding: 6px 14px 6px 24px;
  font-size: 12px;
  color: rgba(255,255,255,0.4);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.vault-note-item:hover { color: rgba(255,255,255,0.7); background: rgba(255,255,255,0.02); }
.vault-note-item.active { color: var(--blue); background: rgba(59,130,246,0.06); }
.vault-content {
  flex: 1;
  overflow-y: auto;
  padding: 24px 32px;
  scrollbar-width: thin;
}
.vault-empty {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--text-muted);
  font-size: 13px;
}
.vault-note-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}
.vault-note-title { font-size: 20px; font-weight: 700; color: #fff; }
.vault-note-path { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
.vault-edit-btn {
  padding: 6px 14px; border-radius: 8px; font-size: 11px; font-weight: 600;
  border: 1px solid var(--border); background: rgba(255,255,255,0.04);
  color: rgba(255,255,255,0.4); cursor: pointer; transition: all 0.2s;
}
.vault-edit-btn:hover { color: rgba(255,255,255,0.7); background: rgba(255,255,255,0.08); }
.vault-md { line-height: 1.8; font-size: 14px; color: var(--text-body); }
.vault-md h1 { font-size: 22px; font-weight: 700; color: #fff; margin: 20px 0 8px; }
.vault-md h2 { font-size: 18px; font-weight: 700; color: #fff; margin: 18px 0 6px; }
.vault-md h3 { font-size: 15px; font-weight: 600; color: rgba(255,255,255,0.85); margin: 14px 0 4px; }
.vault-md p { margin: 8px 0; }
.vault-md ul, .vault-md ol { padding-left: 20px; margin: 6px 0; }
.vault-md li { margin: 3px 0; }
.vault-md code { background: rgba(255,255,255,0.06); padding: 2px 6px; border-radius: 4px; font-size: 12px; color: var(--green); }
.vault-md pre { background: rgba(255,255,255,0.04); padding: 12px; border-radius: 10px; overflow-x: auto; margin: 10px 0; }
.vault-md pre code { background: none; padding: 0; }
.vault-md blockquote { border-left: 3px solid var(--purple); padding-left: 12px; color: rgba(255,255,255,0.5); margin: 10px 0; }
.vault-md hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
.vault-md .wikilink {
  color: var(--blue); cursor: pointer; border-bottom: 1px dashed rgba(59,130,246,0.3);
  transition: color 0.15s;
}
.vault-md .wikilink:hover { color: #6ba3ff; }
.vault-editor {
  width: 100%; min-height: 400px; background: rgba(255,255,255,0.02); border: 1px solid var(--border);
  border-radius: 12px; padding: 16px; color: var(--text-body); font-size: 13px;
  font-family: 'SF Mono', 'Fira Code', monospace; resize: vertical; outline: none; line-height: 1.7;
}
.vault-editor:focus { border-color: rgba(59,130,246,0.2); }

/* ── Alfred Sidebar ── */
#alfredToggle {
  position: fixed; right: 0; top: 50%; z-index: 99; transform: translateY(-50%);
  width: 36px; height: 72px;
  background: rgba(59,130,246,0.1); backdrop-filter: blur(16px);
  border: 1px solid rgba(59,130,246,0.2); border-right: none;
  border-radius: 10px 0 0 10px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.3s; box-shadow: 0 0 20px rgba(59,130,246,0.06);
}
#alfredToggle:hover { background: rgba(59,130,246,0.18); border-color: rgba(59,130,246,0.35); }
#alfredSidebar {
  position: fixed; top: 0; right: 0; bottom: 0; width: 340px; z-index: 100;
  background: rgba(6,6,14,0.94); backdrop-filter: blur(24px);
  border-left: 1px solid rgba(59,130,246,0.08);
  transform: translateX(100%); transition: transform 0.35s var(--ease);
  display: flex; flex-direction: column;
  box-shadow: -8px 0 40px rgba(0,0,0,0.3);
}
#alfredSidebar.open { transform: translateX(0); }
@media(max-width:640px) { #alfredSidebar { width: 100vw; } }

.alfred-header {
  padding: 10px 14px; display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border);
}
.alfred-header-title { font-size: 10px; font-weight: 700; letter-spacing: 0.2em; color: rgba(140,170,210,0.3); }
.alfred-close { background: none; border: none; color: rgba(255,255,255,0.15); cursor: pointer; font-size: 18px; }
.alfred-close:hover { color: rgba(255,255,255,0.4); }

.alfred-brain { height: 180px; background: rgba(4,6,12,0.8); border-bottom: 1px solid var(--border); position: relative; overflow: hidden; }
#brainCanvas { width: 100%; height: 100%; display: block; }

.alfred-messages {
  flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 6px;
  scrollbar-width: thin;
}
.alfred-msg {
  padding: 8px 12px; border-radius: 10px; font-size: 12px; line-height: 1.6;
  word-wrap: break-word; white-space: pre-wrap;
  animation: msgIn 0.25s var(--ease) both;
}
@keyframes msgIn { from { opacity: 0; transform: translateY(4px); } }
.alfred-msg.user {
  background: rgba(59,130,246,0.1); color: rgba(255,255,255,0.7);
  max-width: 80%; margin-left: auto; border: 1px solid rgba(59,130,246,0.12);
}
.alfred-msg.ai { color: rgba(200,215,235,0.7); }
.alfred-msg.ai.streaming { border-left: 2px solid rgba(59,130,246,0.3); padding-left: 10px; }

.alfred-input-row {
  padding: 10px 12px; display: flex; gap: 8px;
  border-top: 1px solid var(--border); background: rgba(6,6,14,0.8);
}
.alfred-input-row input {
  flex: 1; background: rgba(255,255,255,0.02); border: 1px solid rgba(50,80,130,0.1);
  border-radius: 10px; padding: 10px 14px; font-size: 12px; color: rgba(255,255,255,0.7);
  outline: none;
}
.alfred-input-row input::placeholder { color: rgba(255,255,255,0.15); }
.alfred-input-row input:focus { border-color: rgba(60,100,160,0.2); }
.alfred-send {
  padding: 10px 14px; border-radius: 10px; background: rgba(50,80,130,0.08);
  color: rgba(140,170,210,0.4); border: 1px solid rgba(50,80,130,0.1);
  font-weight: 700; font-size: 12px; cursor: pointer; transition: all 0.2s;
}
.alfred-send:hover { background: rgba(50,80,130,0.15); color: rgba(140,170,210,0.6); }

/* ── Responsive ── */
@media(max-width:768px) {
  .vault-sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--border); max-height: 40vh; }
  .vault-layout { flex-direction: column; }
  .vault-content { padding: 16px; }
  .tasks-container { padding: 16px 12px 80px; }
}
</style>
</head>
<body>

<!-- Aurora -->
<div class="aurora"></div>

<!-- Tab Bar -->
<nav class="tab-bar">
  <div class="tab-bar-inner">
    <span class="app-title">openyap</span>
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('tasks')">Tasks</button>
      <button class="tab-btn" onclick="switchTab('vault')">Vault</button>
    </div>
    <div class="tab-actions">
      <button class="icon-btn" onclick="promptFirebaseUrl()">DB</button>
    </div>
  </div>
</nav>

<!-- ═══ TASKS VIEW ═══ -->
<main id="tasksView" class="view active">
  <div class="tasks-container">
    <div class="task-input-card">
      <input id="newTaskInput" type="text" placeholder="What needs to be done?" onkeydown="if(event.key==='Enter')addTask()">
      <div class="task-input-options">
        <div class="opt-group">
          <button class="opt-btn sel cat-work" onclick="setNewCat('work',this)" data-cat="work">Work</button>
          <button class="opt-btn cat-personal" onclick="setNewCat('personal',this)" data-cat="personal">Personal</button>
          <button class="opt-btn cat-project" onclick="setNewCat('project',this)" data-cat="project">Project</button>
        </div>
        <div class="opt-group">
          <button class="opt-btn pri-high" onclick="setNewPri('high',this)" data-pri="high">High</button>
          <button class="opt-btn sel pri-medium" onclick="setNewPri('medium',this)" data-pri="medium">Med</button>
          <button class="opt-btn pri-low" onclick="setNewPri('low',this)" data-pri="low">Low</button>
        </div>
        <input type="date" id="newTaskDue" class="task-due-input">
        <button class="task-add-btn" onclick="addTask()">Add</button>
      </div>
    </div>
    <div class="task-filters" id="taskFilters"></div>
    <div class="task-list" id="taskList"></div>
    <div class="task-stats" id="taskStats"></div>
  </div>
</main>

<!-- ═══ VAULT VIEW ═══ -->
<main id="vaultView" class="view">
  <div class="vault-layout">
    <aside class="vault-sidebar">
      <div class="vault-search">
        <input id="vaultSearch" type="text" placeholder="Search notes..." oninput="renderVaultTree()">
      </div>
      <div id="vaultTree"></div>
    </aside>
    <div class="vault-content" id="vaultContent">
      <div class="vault-empty">Select a note to view</div>
    </div>
  </div>
</main>

<!-- ═══ ALFRED SIDEBAR ═══ -->
<div id="alfredToggle" onclick="toggleAlfred()">
  <span style="writing-mode:vertical-lr;font-size:9px;font-weight:700;letter-spacing:2px;color:rgba(59,130,246,0.4)">ALFRED</span>
</div>
<aside id="alfredSidebar">
  <div class="alfred-header">
    <span class="alfred-header-title">ALFRED</span>
    <button class="alfred-close" onclick="toggleAlfred()">&times;</button>
  </div>
  <div class="alfred-brain">
    <canvas id="brainCanvas"></canvas>
  </div>
  <div class="alfred-messages" id="alfredMessages">
    <div class="alfred-msg ai">What's on the agenda? I can help manage tasks or brainstorm from your vault.</div>
  </div>

    <input id="alfredInput" type="text" placeholder="Ask Alfred..." onkeydown="if(event.key==='Enter')sendAlfred()">
    <button class="alfred-send" onclick="sendAlfred()">Send</button>
  </div>
</aside>

<script>
// ══════════════════════════════════════════
//  Firebase
// ══════════════════════════════════════════
const FIREBASE_CONFIG = {
  databaseURL: localStorage.getItem('oyt_firebase_url') || ''
};
let db = null;

function initFirebase() {
  if (!FIREBASE_CONFIG.databaseURL) return false;
  try {
    if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.database();
    return true;
  } catch(e) { console.error('Firebase init:', e); return false; }
}
function fbSet(path, data) { if (db) return db.ref(path).set(data); }
function fbPush(path, data) { if (db) return db.ref(path).push(data); }
function fbGet(path) { if (db) return db.ref(path).once('value').then(s => s.val()); return Promise.resolve(null); }
function fbListen(path, cb) { if (db) db.ref(path).on('value', snap => cb(snap.val())); }

function promptFirebaseUrl() {
  const url = prompt('Firebase Realtime Database URL:', FIREBASE_CONFIG.databaseURL || 'https://your-project.firebaseio.com');
  if (url) {
    localStorage.setItem('oyt_firebase_url', url);
    FIREBASE_CONFIG.databaseURL = url;
    if (initFirebase()) {
      attachFirebaseListeners();
      renderTasks();
    }
  }
}

// ══════════════════════════════════════════
//  Task State
// ══════════════════════════════════════════
let tasks = {};
let expandedTask = null;
let activeFilter = 'all'; // all, active, completed
let activeCat = 'all';

function attachFirebaseListeners() {
  fbListen('tasks', (val) => {
    tasks = val || {};
    renderTasks();
  });
  attachVaultListener();
}

// ══════════════════════════════════════════
//  Task CRUD
// ══════════════════════════════════════════
let newCat = 'work';
let newPri = 'medium';

function setNewCat(cat, btn) {
  newCat = cat;
  document.querySelectorAll('.task-input-options .opt-btn[data-cat]').forEach(b => {
    b.classList.toggle('sel', b.dataset.cat === cat);
    b.classList.toggle('cat-' + b.dataset.cat, b.dataset.cat === cat);
  });
}
function setNewPri(pri, btn) {
  newPri = pri;
  document.querySelectorAll('.task-input-options .opt-btn[data-pri]').forEach(b => {
    b.classList.toggle('sel', b.dataset.pri === pri);
    b.classList.toggle('pri-' + b.dataset.pri, b.dataset.pri === pri);
  });
}

function addTask() {
  const input = document.getElementById('newTaskInput');
  const text = input.value.trim();
  if (!text) return;
  if (!db) { alert('Configure Firebase first (click DB button)'); return; }

  const dueDate = document.getElementById('newTaskDue')?.value || '';
  fbPush('tasks', {
    title: text,
    priority: newPri,
    category: newCat,
    dueDate,
    description: '',
    completed: false,
    completedAt: '',
    createdAt: new Date().toISOString(),
    order: Date.now(),
  });
  input.value = '';
  document.getElementById('newTaskDue').value = '';
}

function toggleComplete(id) {
  const t = tasks[id];
  if (!t) return;
  fbSet(`tasks/${id}/completed`, !t.completed);
  fbSet(`tasks/${id}/completedAt`, !t.completed ? new Date().toISOString() : '');
}

function updateTask(id, field, value) {
  fbSet(`tasks/${id}/${field}`, value);
}

function deleteTask(id) {
  fbSet(`tasks/${id}`, null);
  if (expandedTask === id) expandedTask = null;
}

function toggleExpand(id) {
  expandedTask = expandedTask === id ? null : id;
  renderTasks();
}

// ══════════════════════════════════════════
//  Task Rendering
// ══════════════════════════════════════════
function renderFilters() {
  const el = document.getElementById('taskFilters');
  const counts = { all: 0, active: 0, completed: 0, work: 0, personal: 0, project: 0 };
  Object.values(tasks).forEach(t => {
    counts.all++;
    if (t.completed) counts.completed++; else counts.active++;
    if (t.category) counts[t.category] = (counts[t.category]||0);
  });
  el.innerHTML = ['all','active','completed'].map(f =>
    `<button class="filter-pill ${activeFilter===f?'active':''}" onclick="activeFilter='${f}';renderTasks()">${f} ${counts[f]||''}</button>`
  ).join('') + '&nbsp;' + ['all','work','personal','project'].map(c =>
    `<button class="filter-pill ${activeCat===c?'active':''}" onclick="activeCat='${c}';renderTasks()">${c === 'all' ? 'all cats' : c}</button>`
  ).join('');
}

function renderTasks() {
  renderFilters();
  const list = document.getElementById('taskList');
  const stats = document.getElementById('taskStats');
  const entries = Object.entries(tasks);

  if (!entries.length) {
    list.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted);font-size:13px">No tasks yet. Add one above.</div>';
    stats.innerHTML = '';
    return;
  }

  // Filter
  let filtered = entries;
  if (activeFilter === 'active') filtered = filtered.filter(([,t]) => !t.completed);
  if (activeFilter === 'completed') filtered = filtered.filter(([,t]) => t.completed);
  if (activeCat !== 'all') filtered = filtered.filter(([,t]) => t.category === activeCat);

  // Sort: active by order desc, completed at bottom
  filtered.sort((a, b) => {
    if (a[1].completed !== b[1].completed) return a[1].completed ? 1 : -1;
    return (b[1].order || 0) - (a[1].order || 0);
  });

  list.innerHTML = filtered.map(([id, t], idx) => {
    const isExpanded = expandedTask === id;
    const today = new Date().toISOString().slice(0, 10);
    const overdue = t.dueDate && !t.completed && t.dueDate < today;
    const dueLabel = t.dueDate ? (overdue ? `Overdue: ${t.dueDate}` : `Due: ${t.dueDate}`) : '';

    const catColor = t.category === 'work' ? 'var(--blue)' : t.category === 'project' ? 'var(--green)' : 'var(--purple)';
    let html = `<div class="task-card ${t.completed ? 'completed' : ''}" style="animation-delay:${idx * 30}ms;border-left:3px solid ${catColor}">
      <button class="task-check" onclick="toggleComplete('${id}')">${t.completed ? '&#10003;' : ''}</button>
      <div class="task-body">
        <div class="task-title" onclick="toggleExpand('${id}')">${escHtml(t.title || 'Untitled')}</div>
        <div class="task-meta">
          <span class="priority-dot ${t.priority || 'medium'}"></span>
          <span class="cat-pill ${t.category || 'personal'}">${t.category || 'personal'}</span>
          ${dueLabel ? `<span class="due-label ${overdue ? 'overdue' : ''}">${dueLabel}</span>` : ''}
        </div>`;

    if (isExpanded) {
      html += `<div class="task-expand">
        <textarea placeholder="Description..." onblur="updateTask('${id}','description',this.value)">${escHtml(t.description || '')}</textarea>
        <div class="task-expand-row">
          <select onchange="updateTask('${id}','priority',this.value)">
            ${['high','medium','low'].map(p => `<option value="${p}" ${t.priority===p?'selected':''}>${p}</option>`).join('')}
          </select>
          <select onchange="updateTask('${id}','category',this.value)">
            ${['work','personal','project'].map(c => `<option value="${c}" ${t.category===c?'selected':''}>${c}</option>`).join('')}
          </select>
          <input type="date" value="${t.dueDate || ''}" onchange="updateTask('${id}','dueDate',this.value)">
        </div>
      </div>`;
    }

    html += `</div>
      <div class="task-actions">
        <button class="task-action-btn" onclick="toggleExpand('${id}')" title="Edit">${isExpanded ? '&minus;' : '&#9998;'}</button>
        <button class="task-action-btn delete" onclick="deleteTask('${id}')" title="Delete">&times;</button>
      </div>
    </div>`;
    return html;
  }).join('');

  // Stats
  const total = entries.length;
  const done = entries.filter(([,t]) => t.completed).length;
  stats.textContent = `${done} of ${total} completed`;
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ══════════════════════════════════════════
//  Vault (Firebase-backed)
// ══════════════════════════════════════════
let vaultNotes = {};  // {id: {title, folder, content, color, createdAt}}
let selectedNoteId = null;
let vaultEditMode = false;
let collapsedFolders = {};

const FOLDER_COLORS = {
  'Ideas': '#3b82f6',
  'Projects': '#34d399',
  'Personal': '#8b5cf6',
  'Work': '#f59e0b',
  'Reference': '#94a3b8',
  'Daily': '#6366f1',
};

function attachVaultListener() {
  fbListen('vault', (val) => {
    vaultNotes = val || {};
    renderVaultTree();
    if (selectedNoteId && vaultNotes[selectedNoteId]) {
      renderNoteView(selectedNoteId, vaultNotes[selectedNoteId]);
    }
  });
}

function loadVaultNotes() {
  // Already loaded via listener; just render
  renderVaultTree();
}

function renderVaultTree() {
  const el = document.getElementById('vaultTree');
  const query = (document.getElementById('vaultSearch')?.value || '').toLowerCase();
  const entries = Object.entries(vaultNotes);
  const filtered = query ? entries.filter(([,n]) => (n.title||'').toLowerCase().includes(query) || (n.folder||'').toLowerCase().includes(query)) : entries;

  // Group by folder
  const folders = {};
  filtered.forEach(([id, n]) => {
    const f = n.folder || 'Unfiled';
    if (!folders[f]) folders[f] = [];
    folders[f].push({ id, ...n });
  });

  // New note button
  let html = '<div style="padding:8px 12px"><button class="vault-edit-btn" style="width:100%;text-align:center" onclick="createNewNote()">+ New Note</button></div>';
  Object.entries(folders).sort((a,b) => a[0].localeCompare(b[0])).forEach(([folder, notes]) => {
    const color = FOLDER_COLORS[folder] || '#64748b';
    const collapsed = collapsedFolders[folder];
    html += `<div class="vault-folder-header" onclick="collapsedFolders['${folder}']=!collapsedFolders['${folder}'];renderVaultTree()">
      <span class="folder-dot" style="background:${color}"></span>
      ${collapsed ? '&#9654;' : '&#9660;'} ${folder}
      <span class="folder-count">${notes.length}</span>
    </div>`;
    if (!collapsed) {
      notes.sort((a,b) => (b.createdAt||'').localeCompare(a.createdAt||'')).forEach(n => {
        html += `<div class="vault-note-item ${selectedNoteId===n.id?'active':''}" onclick="selectNote('${n.id}')">${escHtml(n.title || 'Untitled')}</div>`;
      });
    }
  });
  el.innerHTML = entries.length ? html : html + '<div style="padding:16px;color:var(--text-muted);font-size:11px">No notes yet. Create one above.</div>';
}

function selectNote(id) {
  selectedNoteId = id;
  vaultEditMode = false;
  renderVaultTree();
  const note = vaultNotes[id];
  if (note) renderNoteView(id, note);
}

function createNewNote() {
  if (!db) { alert('Configure Firebase first'); return; }
  const folder = prompt('Folder (Ideas, Projects, Personal, Work, Reference, Daily):', 'Ideas');
  if (!folder) return;
  const title = prompt('Note title:');
  if (!title) return;
  const ref = fbPush('vault', {
    title,
    folder,
    content: `# ${title}\n\n`,
    color: FOLDER_COLORS[folder] || '#64748b',
    createdAt: new Date().toISOString(),
  });
}

function renderNoteView(id, note) {
  const content = document.getElementById('vaultContent');
  const raw = note.content || '';
  if (vaultEditMode) {
    content.innerHTML = `<div class="vault-note-header">
      <div>
        <div class="vault-note-title">${escHtml(note.title || '')}</div>
        <div class="vault-note-path">${escHtml(note.folder || '')}</div>
      </div>
      <div style="display:flex;gap:6px">
        <button class="vault-edit-btn" onclick="saveNoteEdit('${id}')">Save</button>
        <button class="vault-edit-btn" onclick="vaultEditMode=false;selectNote('${id}')">Cancel</button>
        <button class="vault-edit-btn" style="color:var(--red)" onclick="if(confirm('Delete this note?')){fbSet('vault/${id}',null);selectedNoteId=null;document.getElementById('vaultContent').innerHTML='<div class=vault-empty>Note deleted</div>'}">Delete</button>
      </div>
    </div>
    <div style="display:flex;gap:6px;margin-bottom:10px">
      <input type="text" value="${escHtml(note.title||'')}" onblur="fbSet('vault/${id}/title',this.value)" placeholder="Title" style="flex:1;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:8px;padding:6px 10px;font-size:13px;color:#fff;outline:none">
      <select onchange="fbSet('vault/${id}/folder',this.value)" style="background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:8px;padding:6px 10px;font-size:11px;color:var(--text-body);outline:none">
        ${['Ideas','Projects','Personal','Work','Reference','Daily'].map(f => `<option value="${f}" ${note.folder===f?'selected':''}>${f}</option>`).join('')}
      </select>
    </div>
    <textarea class="vault-editor" id="vaultEditor">${escHtml(raw)}</textarea>`;
  } else {
    content.innerHTML = `<div class="vault-note-header">
      <div>
        <div class="vault-note-title">${escHtml(note.title || '')}</div>
        <div class="vault-note-path" style="color:${FOLDER_COLORS[note.folder]||'var(--text-muted)'}">${escHtml(note.folder || '')}</div>
      </div>
      <button class="vault-edit-btn" onclick="vaultEditMode=true;renderNoteView('${id}',vaultNotes['${id}'])">Edit</button>
    </div>
    <div class="vault-md" id="vaultMd">${renderMarkdown(raw)}</div>`;
    wireWikilinks();
  }
}

function saveNoteEdit(id) {
  const ed = document.getElementById('vaultEditor');
  if (!ed) return;
  fbSet(`vault/${id}/content`, ed.value);
  // Update title from first heading if present
  const firstLine = ed.value.split('\n')[0].replace(/^#+\s*/, '').trim();
  if (firstLine) fbSet(`vault/${id}/title`, firstLine);
  vaultEditMode = false;
}

function renderMarkdown(text) {
  if (!text) return '';
  // Wikilinks
  let html = text.replace(/\[\[([^\]|]+)(?:\|([^\]]+))?\]\]/g, (_, name, alias) =>
    `<span class="wikilink" data-note="${escHtml(name)}">${escHtml(alias || name)}</span>`
  );
  // Code blocks
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Headers
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  // Bold, italic
  html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
  // Blockquote
  html = html.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
  // HR
  html = html.replace(/^---$/gm, '<hr>');
  // Lists
  html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>[\s\S]*?<\/li>)/g, '<ul>$1</ul>');
  html = html.replace(/<\/ul>\s*<ul>/g, '');
  // Paragraphs
  html = html.replace(/\n{2,}/g, '</p><p>');
  html = '<p>' + html + '</p>';
  html = html.replace(/<p>\s*(<h[123]|<pre|<ul|<blockquote|<hr)/g, '$1');
  html = html.replace(/(<\/h[123]>|<\/pre>|<\/ul>|<\/blockquote>|<hr>)\s*<\/p>/g, '$1');
  return html;
}

function wireWikilinks() {
  document.querySelectorAll('.wikilink').forEach(el => {
    el.addEventListener('click', () => {
      const name = el.dataset.note;
      const match = Object.entries(vaultNotes).find(([,n]) => n.title === name);
      if (match) selectNote(match[0]);
      enhanceBrainNode(name);
    });
  });
}

// ══════════════════════════════════════════
//  Alfred Chat (MiniMax M2.7 — direct API)
// ══════════════════════════════════════════
const ALFRED_API_URL = 'https://api.minimax.io/anthropic/v1/messages';
const ALFRED_MODEL = 'MiniMax-M2.7';
let alfredOpen = false;
let alfredHistory = [];
let alfredKey = null;
let isStreaming = false;

async function getAlfredKey() {
  if (alfredKey) return alfredKey;
  alfredKey = await fbGet('config/minimax_key');
  if (!alfredKey) alfredKey = localStorage.getItem('oyt_alfred_key');
  if (!alfredKey) {
    alfredKey = prompt('Enter MiniMax API key for Alfred:');
    if (alfredKey) { localStorage.setItem('oyt_alfred_key', alfredKey); fbSet('config/minimax_key', alfredKey); }
  }
  return alfredKey;
}

function toggleAlfred() {
  alfredOpen = !alfredOpen;
  document.getElementById('alfredSidebar').classList.toggle('open', alfredOpen);
  document.getElementById('alfredToggle').style.display = alfredOpen ? 'none' : '';
  const pad = (alfredOpen && window.innerWidth > 640) ? '320px' : '0';
  document.body.style.marginRight = pad;
  if (alfredOpen && !brainInit) initBrain();
}

function buildAlfredSystem() {
  let sys = `You are Alfred, a sharp productivity assistant for OpenYap Todo.
You help manage tasks and brainstorm using the user's Obsidian vault (~/openyap-vault).

PERSONALITY: Concise, witty, direct. Talk like a teammate. 1-3 sentences unless asked for detail.

COMMANDS (use these code blocks to execute actions):
\`\`\`task
{"title":"...", "priority":"high|medium|low", "category":"work|personal|project", "dueDate":"YYYY-MM-DD"}
\`\`\`
\`\`\`done
{"taskId":"..."}
\`\`\`
\`\`\`edit
{"taskId":"...", "field":"title|priority|category|dueDate|description", "value":"..."}
\`\`\`

To highlight a brain node, include [ENHANCE NodeName] in your response.

CURRENT TASKS:\n`;
  const entries = Object.entries(tasks);
  if (entries.length) {
    entries.slice(0, 30).forEach(([id, t]) => {
      sys += `- [${t.completed ? 'x' : ' '}] ${t.title} (${t.priority}, ${t.category}${t.dueDate ? ', due:' + t.dueDate : ''}) id:${id}\n`;
    });
  } else {
    sys += '(no tasks yet)\n';
  }
  // Vault context
  const vaultEntries = Object.entries(vaultNotes);
  if (vaultEntries.length) {
    sys += '\nVAULT NOTES:\n';
    vaultEntries.slice(0, 20).forEach(([id, n]) => {
      sys += `- ${n.title} (${n.folder}) id:${id}\n`;
    });
  }
  if (selectedNoteId && vaultNotes[selectedNoteId]) {
    const n = vaultNotes[selectedNoteId];
    sys += `\nCURRENT NOTE: ${n.title} (${n.folder})\n${(n.content||'').slice(0, 800)}\n`;
  }
  return sys;
}

async function sendAlfred() {
  const input = document.getElementById('alfredInput');
  const msg = input.value.trim();
  if (!msg || isStreaming) return;
  input.value = '';
  const key = await getAlfredKey();
  if (!key) return;
  isStreaming = true;

  appendAlfredMsg('user', msg);
  alfredHistory.push({ role: 'user', content: msg });
  flashBrainNodes();

  const el = appendAlfredMsg('ai', '');
  el.classList.add('streaming');

  try {
    const res = await fetch(ALFRED_API_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + key,
      },
      body: JSON.stringify({
        model: ALFRED_MODEL,
        system: buildAlfredSystem(),
        messages: alfredHistory.slice(-12).filter(m => m.role !== 'system'),
        stream: true,
        max_tokens: 1200,
      }),
    });

    if (!res.ok) {
      const err = await res.text();
      throw new Error(err.slice(0, 200));
    }

    // Read SSE stream (Anthropic format)
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let full = '';
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        if (!line.startsWith('data:')) continue;
        const data = line.slice(5).trim();
        if (!data) continue;
        try {
          const evt = JSON.parse(data);
          if (evt.type === 'content_block_delta' && evt.delta?.type === 'text_delta' && evt.delta?.text) {
            full += evt.delta.text;
            el.textContent = full.replace(/\[ENHANCE\s+[^\]]+\]/gi, '').replace(/```(?:task|done|edit)\s*\n[\s\S]*?\n```/g, '');
            scrollAlfred();
          }
        } catch {}
      }
    }

    el.classList.remove('streaming');
    alfredHistory.push({ role: 'assistant', content: full });

    // Parse [ENHANCE] commands
    const enhanceRe = /\[ENHANCE\s+([^\]]+)\]/gi;
    let em;
    while ((em = enhanceRe.exec(full)) !== null) {
      enhanceBrainNode(em[1].trim());
    }

    // Parse task/done/edit commands
    const taskMatch = full.match(/```task\s*\n?([\s\S]*?)\n?```/);
    if (taskMatch) {
      try {
        const cmd = JSON.parse(taskMatch[1]);
        fbPush('tasks', { title: cmd.title || '', priority: cmd.priority || 'medium', category: cmd.category || 'personal', dueDate: cmd.dueDate || '', description: cmd.description || '', completed: false, completedAt: '', createdAt: new Date().toISOString(), order: Date.now() });
      } catch {}
    }
    const doneMatch = full.match(/```done\s*\n?([\s\S]*?)\n?```/);
    if (doneMatch) {
      try { const cmd = JSON.parse(doneMatch[1]); if (cmd.taskId) { fbSet(`tasks/${cmd.taskId}/completed`, true); fbSet(`tasks/${cmd.taskId}/completedAt`, new Date().toISOString()); } } catch {}
    }
    const editMatch = full.match(/```edit\s*\n?([\s\S]*?)\n?```/);
    if (editMatch) {
      try { const cmd = JSON.parse(editMatch[1]); if (cmd.taskId && cmd.field) updateTask(cmd.taskId, cmd.field, cmd.value); } catch {}
    }

    // Clean display
    el.textContent = full.replace(/\[ENHANCE\s+[^\]]+\]/gi, '').replace(/```(?:task|done|edit)\s*\n[\s\S]*?\n```/g, '').trim();

  } catch(e) {
    el.classList.remove('streaming');
    el.textContent = 'Error: ' + e.message;
  }
  isStreaming = false;
}

function appendAlfredMsg(role, text) {
  const container = document.getElementById('alfredMessages');
  const div = document.createElement('div');
  div.className = 'alfred-msg ' + (role === 'user' ? 'user' : 'ai');
  div.textContent = text;
  container.appendChild(div);
  scrollAlfred();
  return div;
}

function scrollAlfred() {
  const c = document.getElementById('alfredMessages');
  c.scrollTop = c.scrollHeight;
}

// ══════════════════════════════════════════
//  Brain Canvas (Alfred visualization)
// ══════════════════════════════════════════
let brainInit = false;
let brainNodes = [];
let brainAnim = null;

function initBrain() {
  brainInit = true;
  const canvas = document.getElementById('brainCanvas');
  const W = canvas.parentElement.clientWidth * 2;
  const H = canvas.parentElement.clientHeight * 2;
  canvas.width = W;
  canvas.height = H;
  canvas.style.width = canvas.parentElement.clientWidth + 'px';
  canvas.style.height = canvas.parentElement.clientHeight + 'px';

  const cx = W / 2, cy = H / 2;
  const colors = ['#3B82F6', '#8B5CF6', '#34D399', '#f59e0b', '#ef4444', '#6366f1', '#ec4899', '#06b6d4'];

  // Create nodes: mix of task categories + vault folders
  const nodeNames = ['Tasks', 'Work', 'Personal', 'Projects', 'Vault', 'Goals', 'Ideas', 'Reference', 'OpenYap', 'Stocks', 'People', 'Wins', 'Daily'];
  nodeNames.forEach((name, i) => {
    const angle = (i / nodeNames.length) * Math.PI * 2;
    const r = 40 + Math.random() * (Math.min(W, H) * 0.25);
    brainNodes.push({
      name,
      angle,
      r,
      speed: 0.003 + Math.random() * 0.005,
      size: 4 + Math.random() * 5,
      color: colors[i % colors.length],
      glow: 0,
      enhancePulse: 0,
      x: cx + Math.cos(angle) * r,
      y: cy + Math.sin(angle) * r,
    });
  });

  brainLoop();
}

function brainLoop() {
  const canvas = document.getElementById('brainCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height, cx = W / 2, cy = H / 2;
  ctx.clearRect(0, 0, W, H);

  // Update positions
  brainNodes.forEach(n => {
    n.angle += n.speed;
    n.x = cx + Math.cos(n.angle) * n.r;
    n.y = cy + Math.sin(n.angle) * n.r;
  });

  // Connections
  ctx.lineWidth = 1;
  for (let i = 0; i < brainNodes.length; i++) {
    const a = brainNodes[i];
    for (let j = i + 1; j < brainNodes.length; j++) {
      const b = brainNodes[j];
      const d = Math.hypot(a.x - b.x, a.y - b.y);
      const maxDist = Math.min(W, H) * 0.35;
      if (d < maxDist) {
        const alpha = Math.round((1 - d / maxDist) * (a.glow > 0 || b.glow > 0 ? 60 : 30));
        ctx.strokeStyle = a.color + alpha.toString(16).padStart(2, '0');
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.stroke();
      }
    }
  }

  // Nodes
  brainNodes.forEach(n => {
    if (n.enhancePulse > 0) {
      n.enhancePulse -= 0.8;
      // Shockwave ring
      const ringR = n.size + (90 - n.enhancePulse) * 1.5;
      ctx.strokeStyle = n.color + Math.round(n.enhancePulse).toString(16).padStart(2, '0');
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(n.x, n.y, ringR, 0, Math.PI * 2);
      ctx.stroke();
      ctx.lineWidth = 1;
      // Bright node
      ctx.shadowBlur = 25;
      ctx.shadowColor = n.color;
      ctx.fillStyle = n.color;
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.size * 1.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    } else if (n.glow > 0) {
      n.glow -= 0.006;
      ctx.shadowBlur = 16;
      ctx.shadowColor = n.color;
      ctx.fillStyle = n.color;
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.size * (1 + n.glow * 0.6), 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = n.color + '33';
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.size * (1 + n.glow) + 6, 0, Math.PI * 2);
      ctx.stroke();
      ctx.shadowBlur = 0;
    } else {
      ctx.shadowBlur = 5;
      ctx.shadowColor = n.color;
      ctx.fillStyle = n.color + '99';
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.size, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }

    // Label (only for bigger nodes or enhanced)
    if (n.size > 6 || n.enhancePulse > 30) {
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      ctx.font = '16px -apple-system, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(n.name, n.x, n.y + n.size + 16);
    }
  });

  // Center glow
  const anyGlow = brainNodes.some(n => n.glow > 0 || n.enhancePulse > 0);
  const gr = ctx.createRadialGradient(cx, cy, 0, cx, cy, anyGlow ? 30 : 16);
  gr.addColorStop(0, anyGlow ? 'rgba(59,130,246,0.25)' : 'rgba(59,130,246,0.08)');
  gr.addColorStop(1, 'transparent');
  ctx.fillStyle = gr;
  ctx.beginPath();
  ctx.arc(cx, cy, anyGlow ? 30 : 16, 0, Math.PI * 2);
  ctx.fill();

  brainAnim = requestAnimationFrame(brainLoop);
}

function flashBrainNodes() {
  brainNodes.forEach(n => {
    n.glow = 1;
    n.speed = 0.015 + Math.random() * 0.01;
  });
  setTimeout(() => brainNodes.forEach(n => { n.speed = 0.003 + Math.random() * 0.005; }), 2500);
}

function enhanceBrainNode(name) {
  const node = brainNodes.find(n => n.name.toLowerCase() === name.toLowerCase());
  if (node) {
    node.enhancePulse = 90;
    // Pulse neighbors
    brainNodes.forEach(n => {
      if (n !== node) {
        const d = Math.hypot(n.x - node.x, n.y - node.y);
        if (d < 300) n.glow = Math.max(n.glow, 0.7);
      }
    });
  }
}

// ══════════════════════════════════════════
//  Tab Switching
// ══════════════════════════════════════════
let currentTab = 'tasks';
let vaultLoaded = false;

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(tab + 'View').classList.add('active');
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase() === tab));
  if (tab === 'vault' && !vaultLoaded) {
    vaultLoaded = true;
    loadVaultNotes();
  }
}

// ══════════════════════════════════════════
//  Swipe gestures for Alfred
// ══════════════════════════════════════════
let swipeStartX = 0;
document.addEventListener('touchstart', e => { swipeStartX = e.touches[0].clientX; }, { passive: true });
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - swipeStartX;
  const sw = window.innerWidth;
  if (!alfredOpen && swipeStartX > sw - 40 && dx < -60) toggleAlfred();
  if (alfredOpen && dx > 60) toggleAlfred();
}, { passive: true });

renderTasks();
