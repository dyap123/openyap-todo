// Build unique requester list from active (non-completed) tasks
function uniqueRequesters(){
  const m=new Map();
  Object.values(tasks).forEach(t=>{
    if(t.completed)return;
    const f=(t.from||'').trim();
    if(!f)return;
    m.set(f,(m.get(f)||0)+1);
  });
  return [...m.entries()].sort((a,b)=>b[1]-a[1]);
}
function renderRequesterStrip(){
  const el=document.getElementById('reqStrip');
  if(!el)return;
  const reqs=uniqueRequesters();
  const unassigned=Object.values(tasks).filter(t=>!t.completed&&!(t.from||'').trim()).length;
  if(!reqs.length&&!unassigned){el.innerHTML='';return}
  let html='<span class="req-strip-label">From</span>';
  html+=`<span class="req-pill ${fFrom==='all'?'active':''}" onclick="setFromFilter('all')">All</span>`;
  reqs.forEach(([name,cnt])=>{
    const safe=esc(name);
    html+=`<span class="req-pill ${fFrom===name?'active':''}" onclick="setFromFilter('${safe.replace(/'/g,"\\'")}')">${safe} <span class="cnt">${cnt}</span></span>`;
  });
  if(unassigned){
    html+=`<span class="req-pill ${fFrom===''?'active':''}" onclick="setFromFilter('')">Mine <span class="cnt">${unassigned}</span></span>`;
  }
  el.innerHTML=html;
}

function openRFIDatePicker(e,btnEl,currentDate,onPick){

function renderRFIDatePicker(){
  const pop=document.getElementById('rfiDatePickerPop');if(!pop)return;
  const months=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const todayStr=new Date().toISOString().slice(0,10);
  const tomorrowStr=(()=>{const d=new Date();d.setDate(d.getDate()+1);return d.toISOString().slice(0,10)})();
  const nextWeek=(()=>{const d=new Date();d.setDate(d.getDate()+7);return d.toISOString().slice(0,10)})();
  const selected=_rfiDpCurrent;
  const first=new Date(_rfiDpYear,_rfiDpMonth,1);
  const startDay=first.getDay();
  const daysInMonth=new Date(_rfiDpYear,_rfiDpMonth+1,0).getDate();
  const dayTasks={};
  Object.values(tasks).forEach(t=>{if(!t.dueDate||t.completed)return;if(!dayTasks[t.dueDate])dayTasks[t.dueDate]=0;dayTasks[t.dueDate]++});
  let html=`<div class="dp-head">
    <button class="dp-nav" onclick="rfiDpNav(-1)">&larr;</button>
    <div class="dp-title">${months[_rfiDpMonth]} ${_rfiDpYear}</div>
    <button class="dp-nav" onclick="rfiDpNav(1)">&rarr;</button>
  </div>
  <div class="dp-grid">
    ${['S','M','T','W','T','F','S'].map(d=>`<div class="dp-dow">${d}</div>`).join('')}`;
  for(let i=0;i<startDay;i++)html+=`<div class="dp-day blank"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${_rfiDpYear}-${String(_rfiDpMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday=ds===todayStr;
    const isSel=ds===selected;
    const isPast=ds<todayStr;
    const count=dayTasks[ds]||0;
    const hasTasks=count>0?'has-tasks':'';
    const badge=count?`<span class="dp-day-count ${isPast?'overdue':''}">${count}</span>`:'';
    html+=`<div class="dp-day ${isToday?'today':''} ${isSel?'selected':''} ${isPast?'past':''} ${hasTasks}" onclick="rfiDpSelect('${ds}')">${d}${badge}</div>`;
  }
  html+=`</div>
  <div class="dp-quick">
    <button onclick="rfiDpSelect('${todayStr}')">Today</button>
    <button onclick="rfiDpSelect('${tomorrowStr}')">Tmrw</button>
    <button onclick="rfiDpSelect('${nextWeek}')">+1wk</button>

}

// Format YYYY-MM-DD → "Apr 21" etc.
function fmtRfiDate(ds){
  if(!ds)return '';
  const d=new Date(ds+'T00:00:00');
  const mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()];
  return mo+' '+d.getDate();
}

function rfiStats(){
  const rfis=Object.entries(tasks).filter(([,t])=>t.category==='rfi');
  const open=rfis.filter(([,t])=>!t.completed&&!t.sent).length;
  const sent=rfis.filter(([,t])=>t.sent&&!t.completed).length;
  const done=rfis.filter(([,t])=>t.completed).length;
  const today=new Date().toISOString().slice(0,10);
  const overdue=rfis.filter(([,t])=>!t.completed&&!t.sent&&t.dueDate&&t.dueDate<today).length;
  const weekAhead=(()=>{const d=new Date();d.setDate(d.getDate()+7);return d.toISOString().slice(0,10)})();
  const dueSoon=rfis.filter(([,t])=>!t.completed&&!t.sent&&t.dueDate&&t.dueDate<=weekAhead&&t.dueDate>=today).length;
  return {rfis,open,sent,done,overdue,dueSoon,total:rfis.length};
}
function rfiRecipients(){
  const m=new Map();
  Object.values(tasks).forEach(t=>{
    if(t.category!=='rfi'||t.completed)return;
    const r=(t.sendTo||'').trim();
    if(!r)return;
    m.set(r,(m.get(r)||0)+1);
  });
  return [...m.entries()].sort((a,b)=>b[1]-a[1]);
}

function renderRFIDashboard(){
  const el=document.getElementById('rfiDashView');
  if(!el)return;
  const {rfis,open,sent,done,overdue,dueSoon,total}=rfiStats();
  const today=new Date();today.setHours(0,0,0,0);

  // ── Next-up RFI
  const nextUp=rfis
    .filter(([,t])=>!t.completed&&!t.sent)
    .sort((a,b)=>(a[1].dueDate||'9999').localeCompare(b[1].dueDate||'9999'))[0];

  // ── Recipient leaderboard
  const recipients=new Map();
  rfis.forEach(([,t])=>{
    const r=(t.sendTo||'').trim()||'(no recipient)';
    if(!recipients.has(r))recipients.set(r,{total:0,open:0,sent:0,done:0});
    const rec=recipients.get(r);
    rec.total++;
    if(t.completed)rec.done++;
    else if(t.sent)rec.sent++;
    else rec.open++;
  });
  const leaderboard=[...recipients.entries()].sort((a,b)=>b[1].total-a[1].total).slice(0,5);
  const maxRec=Math.max(1,...leaderboard.map(([,r])=>r.total));

  // ── Recent activity (last 10 events: sent + closed)
  const activity=[];
  rfis.forEach(([id,t])=>{
    if(t.sent&&t.sentAt)activity.push({ts:t.sentAt,type:'sent',id,t});
    if(t.completed&&t.completedAt)activity.push({ts:t.completedAt,type:'closed',id,t});
    if(t.createdAt)activity.push({ts:t.createdAt,type:'opened',id,t});
  });
  activity.sort((a,b)=>(b.ts||'').localeCompare(a.ts||''));
  const recent=activity.slice(0,10);

  // ── Weekly throughput (last 8 weeks, count of RFIs closed)
  const weeks=[];
  for(let w=7;w>=0;w--){
    const start=new Date(today);start.setDate(today.getDate()-today.getDay()-(w*7));
    const end=new Date(start);end.setDate(start.getDate()+7);
    const count=rfis.filter(([,t])=>{
      if(!t.completedAt)return false;
      const d=new Date(t.completedAt);
      return d>=start&&d<end;
    }).length;
    weeks.push({count,label:(start.getMonth()+1)+'/'+start.getDate()});
  }
  const maxWeek=Math.max(1,...weeks.map(w=>w.count));

  // ── Aging open RFIs (oldest first)
  const openRfis=rfis.filter(([,t])=>!t.completed);
  const aged=openRfis
    .filter(([,t])=>t.createdAt)
    .map(([id,t])=>{
      const d=new Date(t.createdAt);
      const days=Math.floor((today-d)/86400000);
      return {id,t,days};
    })
    .sort((a,b)=>b.days-a.days)
    .slice(0,5);

  // ── Build HTML
  el.innerHTML=`
    <div class="rfi-hero">
      <div class="rfi-hero-big">
        <div class="rfi-hero-lbl">Open RFIs</div>
        <div class="rfi-hero-val">${open+sent}</div>
        <div class="rfi-hero-sub">${open} to send · ${sent} waiting for reply${overdue?' · <span style="color:#ef4444;font-weight:700">'+overdue+' overdue</span>':''}</div>
      </div>
      <div class="rfi-hero-mini">
        <div class="rfi-hero-mini-card" onclick="jumpRFIFilter('tosend')" style="cursor:pointer" title="Show RFIs that still need to be sent">
          <div class="rfi-hero-mini-val">${open}</div>
          <div class="rfi-hero-mini-lbl">To Send</div>
        </div>
        <div class="rfi-hero-mini-card" onclick="jumpRFIFilter('awaiting')" style="cursor:pointer" title="Show sent RFIs still open">
          <div class="rfi-hero-mini-val sent">${sent}</div>
          <div class="rfi-hero-mini-lbl">Awaiting</div>
        </div>
        <div class="rfi-hero-mini-card" onclick="jumpRFIFilter('overdue')" style="cursor:pointer" title="Show open RFIs past due date">
          <div class="rfi-hero-mini-val${overdue?' danger':''}">${overdue}</div>
          <div class="rfi-hero-mini-lbl">Overdue</div>
        </div>
      </div>
    </div>

    ${nextUp?(()=>{
      const [uid,ut]=nextUp;
      const od=ut.dueDate&&ut.dueDate<today.toISOString().slice(0,10);
      const dueLbl=ut.dueDate?(od?'Overdue · ':'Due ')+fmtRfiDate(ut.dueDate):'No due date set';
      const sendTo=ut.sendTo?' → '+esc(ut.sendTo):'';
      const sentOn=!!ut.sent;
      const sendLbl=sentOn?'Sent ✓':'Mark Sent';
      return `<div class="rfi-urgent">
        <span class="rfi-urgent-lbl">Next up</span>
        <div class="rfi-urgent-body">
          <div class="rfi-urgent-title">${esc(ut.rfiNumber||'')} · ${esc(ut.title||'(no subject)')}</div>
          <div class="rfi-urgent-meta">${dueLbl}${sendTo}</div>
        </div>
        <div class="rfi-urgent-actions">
          <button class="rfi-urgent-cta" onclick="toggleRFISent('${uid}')">${sendLbl}</button>
          <button class="rfi-inline-btn close" onclick="toggleRFIDone('${uid}')" title="Close RFI"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 8 7 12 13 4"/></svg>Close</button>
        </div>
      </div>`;
    })():''}

    <div class="rfi-two-col">
      <div class="rfi-panel">
        <h3>Recipient Leaderboard</h3>
        ${leaderboard.length?`<div class="rfi-leader">${leaderboard.map(([name,r])=>`
          <div class="rfi-leader-row">
            <div class="rfi-leader-name">${esc(name)}</div>
            <div class="rfi-leader-stat">${r.open}<span style="color:var(--text-muted)"> open</span> · ${r.sent}<span style="color:var(--text-muted)"> waiting</span></div>
            <div class="rfi-leader-stat"><span class="pct">${r.total}</span></div>
            <div class="rfi-leader-bar"><div class="rfi-leader-bar-fill" style="width:${Math.round(r.total/maxRec*100)}%"></div></div>
          </div>`).join('')}</div>`:'<div style="color:var(--text-muted);font-size:12px">No RFIs with recipients yet.</div>'}
      </div>

      <div class="rfi-panel">
        <h3>Weekly Closed · Last 8 Weeks</h3>
        <div class="rfi-week-bars">
          ${weeks.map(w=>`<div class="rfi-week-bar" data-count="${w.count}" style="height:${Math.round(w.count/maxWeek*100)}%" title="${w.count} closed"></div>`).join('')}
        </div>
        <div class="rfi-week-labels">
          ${weeks.map(w=>`<div>${w.label}</div>`).join('')}
        </div>
        <div style="font-size:11px;color:var(--text-muted);margin-top:10px;text-align:right">
          Total closed: <span style="color:#34d399;font-weight:700">${done}</span>
        </div>
      </div>
    </div>

    <div class="rfi-two-col">
      <div class="rfi-panel">
        <h3>Oldest Open</h3>
        ${aged.length?`<div class="rfi-aging">${aged.map(a=>{
          const old=a.days>=14;
          const sentOn=!!a.t.sent;
          const sendTitle=sentOn?'Unmark sent':'Mark sent';
          return `<div class="rfi-aging-row${old?' old':''}" data-id="${a.id}">
            <span class="rfi-aging-main" onclick="openRFIInList('${a.id}')" title="Open in list">
              <span class="rfi-aging-num">${esc(a.t.rfiNumber||'?')}</span>
              <span class="rfi-aging-title">${esc(a.t.title||'(no subject)')}</span>
              <span class="rfi-aging-days${old?' old':''}">${a.days}d</span>
            </span>
            <span class="rfi-aging-actions">
              <button class="rfi-inline-btn send${sentOn?' on':''}" onclick="event.stopPropagation();toggleRFISent('${a.id}')" title="${sendTitle}"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 8l5 2 7-7-5 12-2-4z"/></svg>${sentOn?'Sent':'Send'}</button>
              <button class="rfi-inline-btn close" onclick="event.stopPropagation();toggleRFIDone('${a.id}')" title="Close RFI"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 8 7 12 13 4"/></svg>Close</button>
            </span>
          </div>`;
        }).join('')}</div>`:'<div style="color:var(--text-muted);font-size:12px">No open RFIs — you’re clear.</div>'}
      </div>

      <div class="rfi-panel">
        <h3>Recent Activity</h3>
        ${recent.length?`<div class="rfi-activity">${recent.map(ev=>{
          const when=fmtActivityWhen(ev.ts);
          const label=ev.type==='sent'?'Sent':ev.type==='closed'?'Closed':'Created';
          return `<div class="rfi-activity-row">
            <span class="rfi-activity-dot ${ev.type}"></span>
            <div class="rfi-activity-text">
              <div class="rfi-activity-action">${label}</div>
              <div class="rfi-activity-body">${esc(ev.t.rfiNumber||'')} · ${esc(ev.t.title||'(no subject)')}</div>

function fmtActivityWhen(iso){
  if(!iso)return '';
  const d=new Date(iso);
  const diffMs=Date.now()-d.getTime();
  const diffDays=Math.floor(diffMs/86400000);
  const diffHrs=Math.floor(diffMs/3600000);
  if(diffDays>=7)return fmtRfiDate(iso.slice(0,10));
  if(diffDays>=1)return diffDays+'d ago';
  if(diffHrs>=1)return diffHrs+'h ago';
  const diffMin=Math.max(1,Math.floor(diffMs/60000));
  return diffMin+'m ago';
}

function renderRFI(){
  // Apply the currently-selected sub-view and delegate accordingly
  const dashEl=document.getElementById('rfiDashView');
  const listEl=document.getElementById('rfiListView');
  if(dashEl)dashEl.style.display=rfiSubView==='dash'?'':'none';
  if(listEl)listEl.style.display=rfiSubView==='list'?'':'none';
  if(rfiSubView==='dash'){
    renderRFIDashboard();
    return;
  }
  const list=document.getElementById('rfiList');
  if(!list)return;
  const {rfis,open,sent,done,overdue,dueSoon,total}=rfiStats();

  // ── Urgent "next to send" callout
  const urgEl=document.getElementById('rfiUrgent');
  if(urgEl){
    // Find the most urgent unsent+open RFI
    const today=new Date().toISOString().slice(0,10);
    const urg=rfis
      .filter(([,t])=>!t.completed&&!t.sent)
      .sort((a,b)=>{
        const ad=a[1].dueDate||'9999';
        const bd=b[1].dueDate||'9999';
        return ad.localeCompare(bd);
      })[0];
    if(urg){
      const [uid,ut]=urg;
      const od=ut.dueDate&&ut.dueDate<today;
      const dueLbl=ut.dueDate?(od?'Overdue · ':'Due ')+fmtRfiDate(ut.dueDate):'No due date';
      const sendTo=ut.sendTo?' → '+esc(ut.sendTo):'';
      urgEl.innerHTML=`<div class="rfi-urgent">
        <span class="rfi-urgent-lbl">Next up</span>
        <div class="rfi-urgent-body">
          <div class="rfi-urgent-title">${esc(ut.rfiNumber||'')} · ${esc(ut.title||'(no subject)')}</div>
          <div class="rfi-urgent-meta">${dueLbl}${sendTo}</div>
        </div>
        <button class="rfi-urgent-cta" onclick="toggleRFISent('${uid}')">Mark Sent</button>
      </div>`;
    }else{
      urgEl.innerHTML='';
    }
  }

  // ── Recipient filter pills (only shown if recipients exist)
  const recs=rfiRecipients();
  const recsEl=document.getElementById('rfiRecipients');
  const recPillsEl=document.getElementById('rfiRecPills');
  if(recsEl&&recPillsEl){
    if(recs.length){
      recsEl.style.display='';
      let pillsHtml=`<span class="rfi-rec-pill ${rfiRecFilter==='all'?'active':''}" onclick="setRFIRecFilter('all')">All</span>`;
      recs.forEach(([n,c])=>{
        const safe=esc(n);
        pillsHtml+=`<span class="rfi-rec-pill ${rfiRecFilter===n?'active':''}" onclick="setRFIRecFilter('${safe.replace(/'/g,"\\'")}')">${safe} <span class="cnt">${c}</span></span>`;
      });
      recPillsEl.innerHTML=pillsHtml;
    }else{
      recsEl.style.display='none';
    }
  }

  // ── List
  let filtered=rfis;
  if(rfiRecFilter!=='all'){
    filtered=filtered.filter(([,t])=>(t.sendTo||'').trim()===rfiRecFilter);
  }
  // Triage filter set by dashboard mini-card clicks
  if(rfiListFilter!=='all'){
    const todayStr=new Date().toISOString().slice(0,10);
    if(rfiListFilter==='tosend')   filtered=filtered.filter(([,t])=>!t.completed&&!t.sent);
    if(rfiListFilter==='awaiting') filtered=filtered.filter(([,t])=>!t.completed&& t.sent);
    if(rfiListFilter==='overdue')  filtered=filtered.filter(([,t])=>!t.completed&&t.dueDate&&t.dueDate<todayStr);
  }
  // Active triage chip above the list
  const chipEl=document.getElementById('rfiFilterChip');
  if(chipEl){
    if(rfiListFilter==='all'){chipEl.style.display='none';chipEl.innerHTML='';}
    else{
      const chipLbl={tosend:'To Send',awaiting:'Awaiting reply',overdue:'Overdue'}[rfiListFilter]||rfiListFilter;
      chipEl.style.display='';
      chipEl.innerHTML=`<span class="rfi-triage-chip"><span class="rfi-triage-dot ${rfiListFilter}"></span>${chipLbl}<button onclick="clearRFIListFilter()" aria-label="Clear filter">×</button></span>`;
    }
  }
  // Sort: unsent first, then sent-waiting, then done. Within group by RFI number desc.
  filtered.sort((a,b)=>{
    const rank=t=>t.completed?2:(t.sent?1:0);
    const ra=rank(a[1]),rb=rank(b[1]);
    if(ra!==rb)return ra-rb;
    const an=parseInt((a[1].rfiNumber||'').match(/\d+/)?.[0]||'0',10);
    const bn=parseInt((b[1].rfiNumber||'').match(/\d+/)?.[0]||'0',10);
    return bn-an;
  });

  if(!filtered.length){
    list.innerHTML=total?'<div class="rfi-empty">No RFIs match this filter.</div>':'<div class="rfi-empty">No RFIs yet. Click <b>+ New RFI</b> to start your list.</div>';
    return;
  }
  const today=new Date().toISOString().slice(0,10);
  list.innerHTML=filtered.map(([id,t])=>{
    const dn=!!t.completed;
    const isSent=!!t.sent;
    const od=t.dueDate&&!dn&&!isSent&&t.dueDate<today;
    const dueLbl=t.dueDate?(od?'Overdue · ':'Due ')+fmtRfiDate(t.dueDate):'Set date';
    const klass=dn?'done':(isSent?'sent':'');
    return `<div class="rfi-card ${klass}" data-id="${id}" data-num="${esc(t.rfiNumber||'')}">
      <div class="rfi-top">
        <span class="rfi-num-badge"><input class="rfi-num-input" value="${esc(t.rfiNumber||'')}" onchange="updateRFI('${id}','rfiNumber',this.value)" spellcheck="false"></span>
        <input class="rfi-subj-input" placeholder="Subject…" value="${esc(t.title||'')}" onchange="updateRFI('${id}','title',this.value)">
        <div class="rfi-status-group">
          <label class="rfi-sent-toggle ${isSent?'on':''}" onclick="event.preventDefault();toggleRFISent('${id}')">
            <input type="checkbox" ${isSent?'checked':''}>
            ${isSent?'Sent':'Send?'}
          </label>
        </div>
      </div>
      <textarea class="rfi-desc" placeholder="Description — what info do you need?" rows="2" onchange="updateRFI('${id}','description',this.value)">${esc(t.description||'')}</textarea>
      <div class="rfi-meta">
        <button class="rfi-meta-btn rfi-date-btn ${t.dueDate?'has-val':''} ${od?'overdue':''}" onclick="openRFIDatePicker(event,this,'${esc(t.dueDate||'')}',ds=>updateRFI('${id}','dueDate',ds))">
          <span>📅</span><span>${dueLbl}</span>
        </button>
        <button class="rfi-meta-btn ${t.sendTo?'has-val':''}" onclick="this.querySelector('.rfi-sendto-input').focus()">
          <span>→</span>
          <input class="rfi-sendto-input" placeholder="Send to…" value="${esc(t.sendTo||'')}" onchange="updateRFI('${id}','sendTo',this.value);this.closest('.rfi-meta-btn').classList.toggle('has-val',!!this.value)" onclick="event.stopPropagation()" list="fromSuggestions">
        </button>
        <div class="rfi-actions">
          <button onclick="toggleRFIDone('${id}')" title="${dn?'Reopen':'Close RFI'}">${dn?'↺ Reopen':'✓ Close'}</button>
          <button class="rfi-del" onclick="deleteRFI('${id}')" title="Delete">×</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

//  Calendar
// ═══════════════════════════════════════════
let calYear=new Date().getFullYear(),calMonth=new Date().getMonth();

function calNav(dir){calMonth+=dir;if(calMonth>11){calMonth=0;calYear++}if(calMonth<0){calMonth=11;calYear--}renderCalendar()}

function renderCalendar(){
  const months=['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('calMonth').textContent=months[calMonth]+' '+calYear;
  const grid=document.getElementById('calGrid');
  const today=new Date();const todayStr=today.toISOString().slice(0,10);
  const first=new Date(calYear,calMonth,1);
  const startDay=first.getDay(); // 0=Sun
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();

  // Build the date → tasks map. For recurring tasks, project all occurrences
  // that fall within the visible month (and a small buffer either side so the
  // padding cells from neighboring months also light up).
  const tMap={};
  const monthStart=new Date(calYear,calMonth,1);
  const monthEnd=new Date(calYear,calMonth+1,0);
  // Buffer 6 days each side to cover the calendar grid padding
  const winStart=new Date(monthStart);winStart.setDate(winStart.getDate()-6);
  const winEnd=new Date(monthEnd);winEnd.setDate(winEnd.getDate()+6);
  const fmt=d=>d.toISOString().slice(0,10);
  Object.entries(tasks).forEach(([id,t])=>{
    if(!t.dueDate)return;
    const rep=t.repeat||'none';
    if(rep==='none'){
      if(!tMap[t.dueDate])tMap[t.dueDate]=[];
      tMap[t.dueDate].push({id,...t});
      return;
    }
    // Walk backwards from the stored dueDate to find the earliest occurrence
    // that lands inside the visible window, then walk forward through it.
    const seed=new Date(t.dueDate+'T00:00:00');
    let cur=new Date(seed);
    if(rep==='daily'){
      // Jump to winStart
      while(cur>winStart)cur.setDate(cur.getDate()-1);
      while(cur<winStart)cur.setDate(cur.getDate()+1);
      while(cur<=winEnd){
        const ds=fmt(cur);
        if(!tMap[ds])tMap[ds]=[];
        tMap[ds].push({id,...t,dueDate:ds,_recurring:true});
        cur.setDate(cur.getDate()+1);
      }
    } else if(rep==='weekly'){
      while(cur>winStart)cur.setDate(cur.getDate()-7);
      while(cur<winStart)cur.setDate(cur.getDate()+7);
      while(cur<=winEnd){
        const ds=fmt(cur);
        if(!tMap[ds])tMap[ds]=[];
        tMap[ds].push({id,...t,dueDate:ds,_recurring:true});
        cur.setDate(cur.getDate()+7);
      }
    } else if(rep==='monthly'){
      while(cur>winStart)cur.setMonth(cur.getMonth()-1);
      while(cur<winStart)cur.setMonth(cur.getMonth()+1);
      while(cur<=winEnd){
        const ds=fmt(cur);
        if(!tMap[ds])tMap[ds]=[];
        tMap[ds].push({id,...t,dueDate:ds,_recurring:true});
        cur.setMonth(cur.getMonth()+1);
      }
    }
  });

  let html='';
  ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d=>{html+=`<div class="cal-day-head">${d}</div>`});

  // Previous month padding
  const prevDays=new Date(calYear,calMonth,0).getDate();
  for(let i=startDay-1;i>=0;i--){
    const d=prevDays-i;
    html+=`<div class="cal-day other"><span class="cal-num">${d}</span></div>`;
  }

  // Current month
  for(let d=1;d<=daysInMonth;d++){
    const dateStr=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday=dateStr===todayStr;
    const dayTasks=tMap[dateStr]||[];
    const doneCount=dayTasks.filter(t=>t.completed).length;
    const heat=doneCount>=3?'3':doneCount>=1?String(doneCount):'0';
    const overdue=dayTasks.some(t=>!t.completed&&dateStr<todayStr);
    const shown=dayTasks.slice(0,2);
    const dots=dayTasks.slice(0,9).map(t=>`<span class="cal-dot ${t.category||'personal'} ${t.completed?'done':''}"></span>`).join('');
    const countBadge=dayTasks.length?`<span class="cal-count ${overdue?'has-overdue':''}">${dayTasks.length}</span>`:'';
    html+=`<div class="cal-day ${isToday?'today':''}" data-done="${heat}" onclick="openDayModal('${dateStr}')">
      <span class="cal-num">${d}</span>
      ${countBadge}
      ${shown.map(t=>`<div class="cal-task ${t.category||'personal'} ${t.completed?'done':''}" onclick="event.stopPropagation();openDayModal('${dateStr}')">${t.dueTime?'<span style="opacity:.6">'+fmtTime12(t.dueTime)+'</span> ':''}${esc(t.title||'')}</div>`).join('')}
      ${dayTasks.length>2?`<div style="font-size:7px;color:var(--text-muted);font-weight:600;margin-top:1px">+${dayTasks.length-2} more</div>`:''}
      ${dots?`<div class="cal-dots">${dots}</div>`:''}
    </div>`;
  }

  // Next month padding
  const totalCells=startDay+daysInMonth;
  const remaining=totalCells%7===0?0:7-totalCells%7;
  for(let i=1;i<=remaining;i++){html+=`<div class="cal-day other"><span class="cal-num">${i}</span></div>`}

  grid.innerHTML=html;
  // Cursor-tracked aurora glow on each day cell
  grid.querySelectorAll('.cal-day').forEach(el=>{
    el.addEventListener('mousemove',e=>{
      const r=el.getBoundingClientRect();
      el.style.setProperty('--cmx',((e.clientX-r.left)/r.width*100)+'%');
      el.style.setProperty('--cmy',((e.clientY-r.top)/r.height*100)+'%');
    });
    el.addEventListener('mouseleave',()=>{
      el.style.setProperty('--cmx','50%');
      el.style.setProperty('--cmy','50%');
    });
  });
}

function openDayModal(dateStr){
  closeDayModal();
  const tEntries=Object.entries(tasks).filter(([,t])=>t.dueDate===dateStr);
  const dt=new Date(dateStr+'T00:00:00');
  const months=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const dateLabel=`${months[dt.getMonth()]} ${dt.getDate()}`;
  const yearLabel=dt.getFullYear();
  const dayLabel=days[dt.getDay()];
  const today=new Date().toISOString().slice(0,10);
  const total=tEntries.length;
  const done=tEntries.filter(([,t])=>t.completed).length;
  const overdueCount=tEntries.filter(([,t])=>!t.completed&&dateStr<today).length;
  const remaining=total-done;

  let html=`<div class="day-modal" id="dayModal" onclick="if(event.target===this)closeDayModal()">
    <div class="day-modal-card">
      <div class="day-modal-head">
        <div>
          <div class="day-modal-date">${dateLabel} <span style="font-size:14px;font-weight:600;opacity:.6">${yearLabel}</span></div>
          <div class="day-modal-day">${dayLabel}${dateStr===today?'<span class="today-pill">TODAY</span>':''}</div>
        </div>
        <button class="day-modal-x" onclick="closeDayModal()" title="Close">&times;</button>
      </div>
      <div class="day-modal-stats">
        <div class="day-stat"><div class="day-stat-val accent">${total}</div><div class="day-stat-label">Total</div></div>
        <div class="day-stat"><div class="day-stat-val done">${done}</div><div class="day-stat-label">Done</div></div>
        <div class="day-stat"><div class="day-stat-val">${remaining}</div><div class="day-stat-label">Remaining</div></div>
        <div class="day-stat"><div class="day-stat-val ${overdueCount?'red':''}">${overdueCount}</div><div class="day-stat-label">Overdue</div></div>
      </div>
      <div class="day-view-toggle">
        <button class="${dayView==='chart'?'active':''}" onclick="setDayView('chart','${dateStr}')">📊 Chart</button>
        <button class="${dayView==='list'?'active':''}" onclick="setDayView('list','${dateStr}')">📋 List</button>
      </div>`;

  // ── CHART VIEW ──
  if(dayView==='chart'&&tEntries.length){
    const cs=getComputedStyle(document.body);
    const a1=cs.getPropertyValue('--accent1').trim()||'#8B5CF6';
    const a2=cs.getPropertyValue('--accent2').trim()||'#3B82F6';
    const a3=cs.getPropertyValue('--accent3').trim()||'#ec4899';
    // Category buckets
    const catColors={work:a2,personal:a1,project:a3};
    const catCounts={work:0,personal:0,project:0};
    tEntries.forEach(([,t])=>{const c=t.category||'personal';if(catCounts[c]!==undefined)catCounts[c]++});
    // Difficulty buckets (count + weight)
    const diffWeights={easy:1,medium:2,hard:4,epic:8};
    const diffColors={easy:'#4ade80',medium:'#fbbf24',hard:'#f97316',epic:a3};
    const diffCounts={easy:0,medium:0,hard:0,epic:0};
    tEntries.forEach(([,t])=>{const d=t.difficulty||'medium';if(diffCounts[d]!==undefined)diffCounts[d]++});
    const totalWeight=Object.entries(diffCounts).reduce((s,[d,n])=>s+n*diffWeights[d],0);
    // Donut SVG
    const r=42,strokeW=12,c=2*Math.PI*r;
    let donut='<svg class="donut-svg" viewBox="0 0 104 104">';
    donut+=`<circle cx="52" cy="52" r="${r}" stroke="rgba(255,255,255,0.06)" stroke-width="${strokeW}" fill="none"/>`;
    let off=0;
    Object.entries(catCounts).forEach(([cat,n])=>{
      if(!n)return;
      const len=n/total*c;
      donut+=`<circle cx="52" cy="52" r="${r}" stroke="${catColors[cat]}" stroke-width="${strokeW}" fill="none" stroke-dasharray="${len.toFixed(2)} ${(c-len).toFixed(2)}" stroke-dashoffset="${(-off).toFixed(2)}" transform="rotate(-90 52 52)" stroke-linecap="round"/>`;
      off+=len;
    });
    donut+=`<text x="52" y="49" class="donut-center">${total}</text>`;
    donut+=`<text x="52" y="64" class="donut-center-label">tasks</text>`;
    donut+='</svg>';
    // Donut legend
    let donutLegend='<div class="donut-legend">';
    Object.entries(catCounts).forEach(([cat,n])=>{
      if(!n)return;
      const pct=Math.round(n/total*100);
      donutLegend+=`<div class="donut-legend-item"><span class="donut-legend-dot" style="background:${catColors[cat]}"></span><span class="donut-legend-name">${cat}</span><span class="donut-legend-count">${n} <span style="color:var(--text-muted);font-weight:600">·${pct}%</span></span></div>`;
    });
    donutLegend+='</div>';
    // Difficulty stacked bar
    let diffBar='<div class="diff-bar-track">';
    const diffOrder=['easy','medium','hard','epic'];
    diffOrder.forEach(d=>{
      const n=diffCounts[d];if(!n)return;
      const weight=n*diffWeights[d];
      const flex=weight;
      const label=n>0?`${n}`:'';
      diffBar+=`<div class="diff-bar-seg" style="background:${diffColors[d]};flex:${flex} 1 0">${label}</div>`;
    });
    diffBar+='</div><div class="diff-bar-legend">';
    diffOrder.forEach(d=>{
      const n=diffCounts[d];
      const weight=n*diffWeights[d];
      diffBar+=`<div class="diff-bar-legend-item"${n?'':' style="opacity:.35"'}><span class="diff-bar-legend-dot" style="background:${diffColors[d]}"></span>${d}${n?' '+n+'×'+diffWeights[d]+'pt':''}</div>`;
    });
    diffBar+='</div>';
    diffBar+=`<div style="font-size:8px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-top:4px">Total weight: <span style="color:var(--accent1);font-size:11px">${totalWeight} pts</span></div>`;
    // Hourly timeline (only if completions exist for this day)
    const dayHistory=Object.values(taskHistory||{}).filter(h=>(h.completedAt||'').slice(0,10)===dateStr);
    let timeline='';
    if(dayHistory.length){
      const W=440,H=64,padL=20,padR=12,padT=6,padB=18;
      const innerW=W-padL-padR;
      timeline+=`<svg class="timeline-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">`;
      // Axis
      timeline+=`<line class="timeline-axis" x1="${padL}" y1="${H-padB}" x2="${W-padR}" y2="${H-padB}"/>`;
      // Hour ticks every 4h
      [0,4,8,12,16,20,24].forEach(h=>{
        const x=padL+(h/24)*innerW;
        timeline+=`<line class="timeline-axis" x1="${x}" y1="${H-padB}" x2="${x}" y2="${H-padB+3}"/>`;
        const lbl=h===0?'12a':h===12?'12p':h<12?h+'a':(h-12)+'p';
        if(h<24)timeline+=`<text class="timeline-tick-label" x="${x}" y="${H-4}">${lbl}</text>`;
      });
      // Dots
      dayHistory.forEach(h=>{
        const d=new Date(h.completedAt);
        const hourFloat=d.getHours()+d.getMinutes()/60;
        const x=padL+(hourFloat/24)*innerW;
        const y=H-padB-Math.random()*22-4;
        const col=catColors[h.category||'personal']||a1;
        timeline+=`<circle class="timeline-dot" cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="3.5" fill="${col}" style="color:${col}"/>`;
      });
      timeline+='</svg>';
    }

    html+='<div class="day-charts">';
    html+='<div class="day-chart-row">';
    html+=`<div class="day-chart-card"><div class="chart-label">Categories</div><div class="donut-wrap">${donut}${donutLegend}</div></div>`;
    html+=`<div class="day-chart-card"><div class="chart-label">Difficulty Mix</div><div class="diff-bar-wrap">${diffBar}</div></div>`;
    html+='</div>';
    if(timeline){
      html+=`<div class="day-chart-card"><div class="chart-label">Completions Today</div>${timeline}</div>`;
    }
    html+='</div>';
  }

  if(!tEntries.length){
    const curTheme=localStorage.getItem('oyt_theme')||'';
    const m=(THEMES[curTheme]||THEMES['']).mascot;
    html+=`<div class="day-modal-empty">
      <span class="day-modal-empty-emoji">${m}</span>
      <div class="day-modal-empty-text">Nothing on the books for this day</div>
    </div>`;
  } else if(dayView==='list') {
    html+=`<div class="day-modal-tasks">`;
    tEntries.sort((a,b)=>{if(a[1].completed!==b[1].completed)return a[1].completed?1:-1;const pri={high:0,medium:1,low:2};return(pri[a[1].priority]||1)-(pri[b[1].priority]||1)});
    tEntries.forEach(([id,t])=>{
      const cc=t.category==='work'?'var(--accent2)':t.category==='project'?'var(--accent3)':t.category==='rfi'?'#fbbf24':'var(--accent1)';
      const od=!t.completed&&dateStr<today;
      const diff=t.difficulty||'medium';
      const diffStars={easy:'★',medium:'★★',hard:'★★★',epic:'★★★★'}[diff];
      html+=`<div class="tc ${t.completed?'done':''}" style="border-left:3px solid ${cc}">
        <button class="ck" onclick="toggleDone('${id}');setTimeout(()=>openDayModal('${dateStr}'),100)">${t.completed?'&#10003;':''}</button>
        <div class="tb">
          <div class="tt">${esc(t.title||'')}</div>
          ${t.notes?`<div class="t-notes">${esc(t.notes)}</div>`:''}
          <div class="tm">
            <span class="pd ${t.priority||'medium'}"></span>
            <span class="cat ${t.category||'personal'}">${t.category||'personal'}</span>
            <span class="t-diff ${diff}">${diffStars}</span>
            ${t.repeat&&t.repeat!=='none'?`<span class="t-repeat">${t.repeat}</span>`:''}
            ${t.dueTime?`<span class="dl">${fmtTime12(t.dueTime)}</span>`:''}
            ${od?`<span class="dl od">Overdue</span>`:''}
          </div>
        </div>
        <div class="ta" style="opacity:1">
          <button class="tab del" onclick="deleteTask('${id}');setTimeout(()=>openDayModal('${dateStr}'),100)">&times;</button>
        </div>
      </div>`;
    });
    html+=`</div>`;
  }

  // ── Completed on this day ──
  // Pull from todo/history (recurring + one-shot completions are logged there).
  const completedHere=Object.values(taskHistory||{})
    .filter(h=>(h.completedAt||'').slice(0,10)===dateStr)
    .sort((a,b)=>(b.completedAt||'').localeCompare(a.completedAt||''));
  if(completedHere.length){
    html+=`<div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--card-border)">
      <div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--accent1);margin-bottom:8px;display:flex;align-items:center;gap:6px">
        <span style="font-size:12px">✓</span> Completed on this day · ${completedHere.length}
      </div>
      <div class="day-modal-tasks">`;
    completedHere.forEach(h=>{
      const cc=h.category==='work'?'var(--accent2)':h.category==='project'?'var(--accent3)':'var(--accent1)';
      const diff=h.difficulty||'medium';
      const diffStars={easy:'★',medium:'★★',hard:'★★★',epic:'★★★★'}[diff];
      const time=new Date(h.completedAt).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
      html+=`<div class="tc done" style="border-left:3px solid ${cc};opacity:.78">
        <div class="ck" style="border-color:${cc};background:${cc};color:#fff">&#10003;</div>
        <div class="tb">
          <div class="tt" style="font-size:13px">${esc(h.title||'(untitled)')}</div>
          <div class="tm">
            <span class="cat ${h.category||'personal'}">${h.category||'personal'}</span>
            <span class="t-diff ${diff}">${diffStars}</span>
            <span class="dl">${time}</span>
          </div>
        </div>
      </div>`;
    });
    html+=`</div></div>`;
  }

  html+=`<div class="day-modal-add-wrap">
      <input class="day-modal-add-input" id="dayModalAddInput" type="text" placeholder="+ Add a task for this day..." onkeydown="if(event.key==='Enter')dayModalAdd('${dateStr}')">
      <button class="day-modal-add-btn" onclick="dayModalAdd('${dateStr}')">Add</button>
    </div>
    </div>
  </div>`;
  document.body.insertAdjacentHTML('beforeend',html);
  setTimeout(()=>document.getElementById('dayModalAddInput')?.focus(),100);
}

function dayModalAdd(dateStr){
  const inp=document.getElementById('dayModalAddInput');
  if(!inp)return;
  const title=inp.value.trim();
  if(!title)return;
  fbPush('todo/tasks',{
    title,priority:'medium',category:newCat||'personal',difficulty:'medium',progress:0,dueDate:dateStr,
    repeat:'none',notes:'',completed:false,completedAt:'',
    createdAt:new Date().toISOString(),order:Date.now()
  });
  setTimeout(()=>openDayModal(dateStr),250);
}

function closeDayModal(){
  document.getElementById('dayModal')?.remove();
}

function addTaskForDate(dateStr){
  const title=prompt('Task title:');
  if(!title)return;
  fbPush('todo/tasks',{
    title,priority:'medium',category:'personal',difficulty:'medium',progress:0,dueDate:dateStr,
    notes:'',completed:false,completedAt:'',
    createdAt:new Date().toISOString(),order:Date.now()
  });
  setTimeout(()=>openDayModal(dateStr),200);
}

//  Stats View
// ═══════════════════════════════════════════
function renderStatsView(){
  const el=document.getElementById('statsView');
  el.innerHTML=renderStatsOverview();
}

function renderStatsOverview(){
  const all=Object.values(tasks);
  const done=all.filter(t=>t.completed);
  const active=all.filter(t=>!t.completed);
  const today=new Date();const todayStr=today.toISOString().slice(0,10);

  // Deadline stats
  const withDue=done.filter(t=>t.dueDate&&t.completedAt);
  let early=0,onTime=0,late=0;
  withDue.forEach(t=>{const c=t.completedAt.slice(0,10);if(c<t.dueDate)early++;else if(c===t.dueDate)onTime++;else late++});
  const beatPct=withDue.length?Math.round((early+onTime)/withDue.length*100):0;

  // Weekly completions (last 7 days)
  const weekData=[];
  for(let i=6;i>=0;i--){
    const d=new Date(today);d.setDate(d.getDate()-i);
    const ds=d.toISOString().slice(0,10);
    const count=done.filter(t=>t.completedAt&&t.completedAt.slice(0,10)===ds).length;
    const dayName=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()];
    weekData.push({day:dayName,count,isToday:i===0});
  }
  const maxWeek=Math.max(...weekData.map(d=>d.count),1);

  // Category breakdown
  const cats={work:{done:0,active:0,color:'var(--accent2)'},personal:{done:0,active:0,color:'var(--accent1)'},project:{done:0,active:0,color:'var(--accent3)'}};
  all.forEach(t=>{const c=t.category||'personal';if(!cats[c])return;t.completed?cats[c].done++:cats[c].active++});

  // Average time
  let avgDays=0;
  if(done.length){avgDays=Math.round(done.reduce((s,t)=>s+(t.completedAt&&t.createdAt?Math.max(0,(new Date(t.completedAt)-new Date(t.createdAt))/86400000):0),0)/done.length*10)/10}

  // Streak
  const streak=calcStreak();

  // Verdict
  // Verdict pool — different message every time the Stats tab opens.
  // Tier picked by deadline-beat %; line picked at random within the tier.
  const VERDICT_POOL={
    him:[
      'YOU ARE HIM','LIGHTS OUT','UNTOUCHABLE','HE IS HIM','BUILT DIFFERENT',
      'CERTIFIED MENACE','SUMMIT REACHED','LEGENDARY','VALHALLA AWAITS','GOATED',
    ],
    locked:[
      'LOCKED IN','IN THE ZONE','ON A HEATER','RHYTHM SECURED','MOMENTUM',
      'DIAL LOCKED','EYES ON IT','CRUISING','FOCUSED MODE','HOT HAND',
    ],
    solid:[
      'SOLID','HOLDING THE LINE','STEADY DOES IT','RESPECTABLE','BUILDING',
      'COOKING SLOWLY','KEEP GOING','NOT BAD','MIDPOINT MOMENTUM','PROVE IT',
    ],
    grind:[
      'GRIND MORE','LOCK IN','GET IT TOGETHER','EXCUSES > RESULTS?','WAKE UP',
      'YOU OWE YOURSELF','THE BOULDER WAITS','SHOW UP','LESS TALK MORE DO','WORK HARDER',
    ],
    nodata:[
      'GET STARTED','THE GRIND BEGINS','LET\u2019S COOK','EMPTY SLATE','CHAPTER ONE',
      'BABY STEPS','PROVE SOMETHING','BEGIN','THE FIRST PUSH','GO',
    ],
  };
  let tier='nodata',vColor='var(--text-muted)';
  if(beatPct>=90){tier='him';vColor='var(--accent1)'}
  else if(beatPct>=70){tier='locked';vColor='var(--accent2)'}
  else if(beatPct>=50){tier='solid';vColor='var(--accent3)'}
  else if(withDue.length){tier='grind';vColor='var(--red)'}
  const pool=VERDICT_POOL[tier];
  const verdict=pool[Math.floor(Math.random()*pool.length)];

  return `
  <div class="stats-section">
    <div class="stats-title">Overview</div>
    <div class="stats-grid">
      <div class="stat-big"><div class="stat-big-val">${all.length}</div><div class="stat-big-label">Total Tasks</div></div>
      <div class="stat-big"><div class="stat-big-val">${done.length}</div><div class="stat-big-label">Completed</div></div>
      <div class="stat-big"><div class="stat-big-val">${active.length}</div><div class="stat-big-label">Active</div></div>
    </div>
  </div>

  <div class="stats-section">
    <div class="stats-title">Verdict</div>
    <div class="verdict-card ${beatPct>=90?'him':beatPct>=70?'locked':''}">
      <div class="verdict-text">${verdict}</div>
      <div class="verdict-meta">${beatPct}% deadlines met · ${streak} day streak · ${avgDays}d avg completion</div>
      <div class="verdict-stats">
        <div class="verdict-stat"><span class="verdict-stat-val" style="color:#34d399">${early}</span><span class="verdict-stat-label">Early</span></div>
        <div class="verdict-stat"><span class="verdict-stat-val" style="color:var(--accent1)">${onTime}</span><span class="verdict-stat-label">On Time</span></div>
        <div class="verdict-stat"><span class="verdict-stat-val" style="color:var(--red)">${late}</span><span class="verdict-stat-label">Late</span></div>
      </div>
    </div>
  </div>

  <div class="stats-section">
    <div class="stats-title">This Week</div>
    <div style="background:var(--card);border-radius:14px;padding:16px;border:1px solid var(--accent1-06)">
      <div class="week-chart">
        ${weekData.map(d=>`<div class="week-bar-wrap">
          <div class="week-bar" style="height:${d.count/maxWeek*100}%;background:linear-gradient(180deg,${d.isToday?'var(--accent3)':'var(--accent1)'},${d.isToday?'var(--accent1)':'var(--accent2)'});box-shadow:${d.isToday?'0 0 12px var(--accent1-10)':'none'}"></div>
          <span class="week-bar-label" style="${d.isToday?'color:var(--accent1)':''}">${d.day}</span>
          ${d.count?`<span style="font-size:8px;font-weight:700;color:var(--text-muted)">${d.count}</span>`:''}
        </div>`).join('')}
      </div>
    </div>
  </div>

  <div class="stats-section">
    <div class="stats-title">By Category</div>
    <div class="cat-breakdown">
      ${Object.entries(cats).map(([name,c])=>`<div class="cat-stat">
        <span class="cat-dot" style="background:${c.color}"></span>
        <div class="cat-stat-info">
          <span class="cat-stat-val">${c.done+c.active}</span>
          <span class="cat-stat-name">${name} (${c.done} done)</span>
        </div>
      </div>`).join('')}
    </div>
  </div>

  <div class="stats-section">
    <div class="stats-title">Priority Breakdown</div>
    <div class="stats-grid">
      <div class="stat-big"><div class="stat-big-val">${active.filter(t=>t.priority==='high').length}</div><div class="stat-big-label">High Active</div></div>
      <div class="stat-big"><div class="stat-big-val">${active.filter(t=>t.priority==='medium').length}</div><div class="stat-big-label">Medium Active</div></div>
      <div class="stat-big"><div class="stat-big-val">${active.filter(t=>t.priority==='low').length}</div><div class="stat-big-label">Low Active</div></div>
    </div>
  </div>

  <div class="stats-section">
    <div class="stats-title">Overdue</div>
    ${active.filter(t=>t.dueDate&&t.dueDate<todayStr).length?
      active.filter(t=>t.dueDate&&t.dueDate<todayStr).map(t=>`<div style="background:var(--card);border:1px solid rgba(239,68,68,0.1);border-radius:10px;padding:8px 12px;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:12px;color:var(--text)">${esc(t.title)}</span>
        <span style="font-size:9px;color:var(--red);font-weight:700">${t.dueDate}</span>
      </div>`).join('')
      :'<div style="text-align:center;padding:20px;color:var(--text-muted);font-size:12px">No overdue tasks</div>'}
  </div>`;
}

// ═══════════════════════════════════════════
//  Wasted (standalone time-waste log)
// ═══════════════════════════════════════════
function fmtMinsShort(m){
  m=Math.max(0,Math.round(m||0));
  if(m>=60){const h=Math.floor(m/60),r=m%60;return h+'h'+(r?' '+r+'m':'')}
  return m+'m';
}

function renderWasted(){
  const el=document.getElementById('wastedView');
  if(!el)return;
  const entries=Object.entries(wastedLog)
    .map(([id,w])=>({id, mins:parseFloat(w.mins)||0, title:w.title||'', description:w.description||'', category:w.category||'', date:w.date||(w.createdAt||'').slice(0,10), createdAt:w.createdAt||''}))
    .sort((a,b)=>{
      if(wastedSort==='biggest')return b.mins-a.mins;
      if(wastedSort==='oldest')return (a.createdAt||'').localeCompare(b.createdAt||'');
      return (b.createdAt||'').localeCompare(a.createdAt||''); // recent (default)
    });
  const total=entries.reduce((s,e)=>s+e.mins,0);
  const catSum={};entries.forEach(e=>{const c=e.category||'uncategorized';catSum[c]=(catSum[c]||0)+e.mins});
  const worst=Object.entries(catSum).sort((a,b)=>b[1]-a[1])[0];
  const avg=entries.length?Math.round(total/entries.length):0;

  const todayIso=new Date().toISOString().slice(0,10);

  let html=`
  <div class="w-hero">
    <div class="w-hero-big">
      <div class="l">Time Wasted</div>
      <div class="v">${fmtMinsShort(total)}</div>
      <div class="s">${entries.length} entr${entries.length===1?'y':'ies'}${worst?' · worst: '+esc(worst[0]):''} · ${avg}m avg</div>
    </div>
    <div class="w-hero-side">
      <div><span class="n">${(total/60).toFixed(1)}</span> <span class="m">hrs</span></div>
      <div><span class="n">${entries.filter(e=>e.category==='rfi').length}</span> <span class="m">rfi burns</span></div>
    </div>
  </div>

  <div class="w-add">
    <div class="w-add-title">Log a time-waster</div>
    <input type="text" id="wAddTitle" placeholder="What was it? (e.g. RFI-012: fastener spec)" onkeydown="if(event.key==='Enter'&&!event.shiftKey&&event.target.value.trim()){document.getElementById('wAddDesc').focus();}">
    <textarea id="wAddDesc" placeholder="Ended-up resolution — what it should have been (e.g. 5-min call to engineer)"></textarea>
    <div class="w-add-row">
      <div class="mins-wrap">
        <input type="number" id="wAddMins" min="0" step="5" placeholder="0">
        <span class="u">min wasted</span>
      </div>
      <select id="wAddCat">
        <option value="work">Work</option>
        <option value="project">Project</option>
        <option value="rfi">RFI</option>
        <option value="personal">Personal</option>
        <option value="">Other</option>
      </select>
      <input type="date" id="wAddDate" value="${todayIso}" style="background:rgba(0,0,0,0.25);border:1px solid rgba(255,255,255,0.06);border-radius:8px;padding:8px 10px;color:var(--text);font-size:12px;color-scheme:dark">
      <button class="w-add-btn" onclick="addWasted()">＋ Add</button>
    </div>
  </div>

  <div class="w-filter">
    <button class="${wastedSort==='recent'?'active':''}" onclick="setWastedSort('recent')">Recent</button>
    <button class="${wastedSort==='biggest'?'active':''}" onclick="setWastedSort('biggest')">Biggest</button>
    <button class="${wastedSort==='oldest'?'active':''}" onclick="setWastedSort('oldest')">Oldest</button>
  </div>`;

  if(!entries.length){
    html+=`<div class="w-empty">
      <div class="g">⏱</div>
      <div class="t">Nothing logged yet</div>
      <div class="h">Use the form above to log any task that ate time it didn't need to. Keep it short — the point is to spot patterns.</div>
    </div>`;
  } else {
    const catColor=c=>c==='work'?'var(--cat-work-fg)':c==='project'?'var(--cat-proj-fg)':c==='rfi'?'#fbbf24':c==='personal'?'var(--cat-pers-fg)':'var(--text-muted)';
    const catBg=c=>c==='work'?'var(--cat-work-bg)':c==='project'?'var(--cat-proj-bg)':c==='rfi'?'rgba(251,191,36,0.1)':c==='personal'?'var(--cat-pers-bg)':'rgba(255,255,255,0.04)';
    html+=entries.map(e=>{
      const isEx=wastedExpanded===e.id;
      const catLbl=e.category||'uncat';
      return `<div class="w-entry${isEx?' expanded':''}">
        <div class="w-entry-body" onclick="toggleWastedExpand('${e.id}')" style="cursor:pointer">
          <div class="w-entry-title">${esc(e.title||'(untitled)')}</div>
          ${e.description?`<div class="w-entry-desc">→ ${esc(e.description)}</div>`:''}
          <div class="w-entry-meta">
            <span style="font-size:8px;padding:2px 6px;border-radius:4px;letter-spacing:0.1em;text-transform:uppercase;font-weight:700;background:${catBg(e.category)};color:${catColor(e.category)}">${catLbl}</span>
            ${e.date?`<span>${e.date}</span>`:''}
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <div class="w-entry-mins">${fmtMinsShort(e.mins)}<span class="u">wasted</span></div>
          <div class="w-entry-actions">
            <button class="edit" title="Edit" onclick="toggleWastedExpand('${e.id}')">✎</button>
            <button class="del" title="Delete" onclick="deleteWasted('${e.id}')">×</button>
          </div>
        </div>
        ${isEx?`<div class="w-edit">
          <input type="text" value="${esc(e.title)}" placeholder="Task" onblur="updateWasted('${e.id}','title',this.value)">
          <textarea placeholder="Ended-up resolution" onblur="updateWasted('${e.id}','description',this.value)">${esc(e.description)}</textarea>
          <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
            <div style="display:inline-flex;align-items:center;gap:6px;background:rgba(0,0,0,0.25);border:1px solid rgba(255,255,255,0.06);border-radius:8px;padding:4px 10px">
              <input type="number" min="0" step="5" value="${e.mins||''}" style="background:transparent;border:0;color:var(--text);font-size:12px;width:60px;padding:5px 0" onchange="updateWasted('${e.id}','mins',parseFloat(this.value)||0)">
              <span style="font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.1em;font-weight:700">min</span>
            </div>
            <select onchange="updateWasted('${e.id}','category',this.value)" style="background:rgba(0,0,0,0.25);border:1px solid rgba(255,255,255,0.06);border-radius:8px;padding:6px 10px;color:var(--text);font-size:11px;cursor:pointer">
              ${['work','project','rfi','personal',''].map(c=>`<option value="${c}" ${e.category===c?'selected':''}>${c||'Other'}</option>`).join('')}
            </select>
            <input type="date" value="${e.date||''}" onchange="updateWasted('${e.id}','date',this.value)" style="background:rgba(0,0,0,0.25);border:1px solid rgba(255,255,255,0.06);border-radius:8px;padding:6px 10px;color:var(--text);font-size:11px;color-scheme:dark">
          </div>
        </div>`:''}
      </div>`;
    }).join('');
  }

  el.innerHTML=html;
}

function setWastedSort(s){ wastedSort=s; renderWasted(); }
function toggleWastedExpand(id){ wastedExpanded=wastedExpanded===id?null:id; renderWasted(); }

function addWasted(){
  const title=(document.getElementById('wAddTitle').value||'').trim();
  const desc=(document.getElementById('wAddDesc').value||'').trim();
  const mins=parseFloat(document.getElementById('wAddMins').value)||0;
  const cat=document.getElementById('wAddCat').value;
  const date=document.getElementById('wAddDate').value||new Date().toISOString().slice(0,10);
  if(!title && !desc){
    const el=document.getElementById('wAddTitle');if(el){el.style.borderColor='#ef4444';setTimeout(()=>el.style.borderColor='',1200)}
    return;
  }
  fbPush('todo/wasted',{
    title, description:desc, mins, category:cat, date,
    createdAt:new Date().toISOString()
  });
  document.getElementById('wAddTitle').value='';
  document.getElementById('wAddDesc').value='';
  document.getElementById('wAddMins').value='';
  // keep cat/date for rapid-fire entry
}

function updateWasted(id,field,value){
  if(!wastedLog[id])return;
  fbSet(`todo/wasted/${id}/${field}`,value);
}

function deleteWasted(id){
  if(!confirm('Delete this entry?'))return;
  fbSet(`todo/wasted/${id}`,null);
  if(wastedExpanded===id)wastedExpanded=null;
}

// Init
const savedTheme=localStorage.getItem('oyt_theme')||'';
setTheme(savedTheme);
if(initFB())attachListeners();
renderTasks();
</script>
</body>
</html>
